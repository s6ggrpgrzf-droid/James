<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
  <div id="root"></div>
  <script async src="https://js.stripe.com/v3/buy-button.js"></script>
  <script src="data.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react,env">
const {useState,useEffect,useCallback,useRef}=React;

const CSS = `...`; // (unchanged - keeping your full CSS)

const LATEST_UPDATE_ID = "2025-01-001";
const UPDATES = [ /* unchanged */ ];

async function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
async function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

const C = { /* unchanged */ };

// ALL YOUR DATA (VIDEOS, ALL_TIPS, LEARN_CATS, MSG_CATS, etc.) — unchanged from what you already have

// ─── Toast & IntroAnimation & VideoPlayer & other components ─── (unchanged)

function App() {
  const [tab, setTab] = useState("tips");
  const [navPop, setNavPop] = useState(null);
  function changeTab(id){ setNavPop(id); setTab(id); setTimeout(()=>setNavPop(null),400); }

  const [cfg, setCfg_] = useState({name:""});
  const [pro, setPro] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [showIntro, setShowIntro] = useState(false);
  const [showUpdate, setShowUpdate] = useState(false);
  const [toast, setToast] = useState(null);

  // Paywall state — simplified
  const [showPay, setShowPay] = useState(false);

  // NEW: Auto-unlock after Stripe success
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    if (params.get("success") === "true") {
      setPro(true);
      save("dp3-elite", true);
      window.history.replaceState({}, '', window.location.pathname); // clean URL
      showToast("✅ Elite access unlocked!");
    }
  }, []);

  useEffect(() => {
    Promise.all([
      load("dp3-cfg",{name:""}),
      load("dp3-elite",false),
      load("dp3-intro-seen",false),
      load("dp3-update-seen",""),
      // ... rest of your loads unchanged
    ]).then(([c,p,seen,updateSeen,...rest]) => {
      setCfg_(c);
      setPro(!!p);
      setLoaded(true);
      if (!seen) setShowIntro(true);
      else if (updateSeen !== LATEST_UPDATE_ID) setShowUpdate(true);
    });
  }, []);

  const setCfg = useCallback(d => { setCfg_(d); save("dp3-cfg", d); }, []);

  function showToast(msg) { setToast(msg); }

  // Simplified paywall — no code needed
  function handleStripeSuccess() {
    setPro(true);
    save("dp3-elite", true);
    setShowPay(false);
    showToast("✅ Elite access unlocked for life!");
  }

  // ... rest of your App functions (logShift, backupData, etc.) remain unchanged

  if (!loaded) return ( /* loading screen unchanged */ );

  if (showIntro) return <IntroAnimation onDone={()=>{setShowIntro(false);save("dp3-intro-seen",true);}}/>;

  return (
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:430,margin:"0 auto",fontFamily:C.sans,color:C.text,display:"flex",flexDirection:"column"}}>
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}

      {/* Header with gear button — unchanged */}

      {/* Settings panel — unchanged */}

      <div style={{flex:1,overflowY:"auto",paddingBottom:80,position:"relative"}}>
        {/* All your tabs (tips, templates, defend, train, basics, track) — unchanged */}

        {/* Paywall modal — now simplified */}
        {showPay && (
          <div style={{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div onClick={()=>setShowPay(false)} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.78)"}}/>
            <div style={{position:"relative",background:"linear-gradient(180deg,#12151a,#0d0f13)",borderTop:"1px solid rgba(255,255,255,0.08)",borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxWidth:430}}>
              <div style={{width:40,height:4,borderRadius:99,background:"rgba(255,255,255,0.15)",margin:"0 auto 22px"}}/>
              <div style={{textAlign:"center",marginBottom:20}}>
                <div style={{fontSize:44,marginBottom:10}}>⚡</div>
                <div style={{fontSize:23,fontWeight:900,marginBottom:6}}>Become Elite</div>
                <div style={{fontSize:14,color:C.text2,lineHeight:1.7}}>One-time $7 • Lifetime access • All updates included</div>
              </div>
              {/* Stripe Buy Button */}
              <div style={{marginBottom:20,borderRadius:16,overflow:"hidden"}}>
                <stripe-buy-button
                  buy-button-id="buy_btn_1TDdtnFiKgrWyiUSvZdQ3WUq"
                  publishable-key="pk_live_51TDCUPFiKgrWyiUST12cAEZcdXtQgUcvVIaLtvN5FxHx1egK06TeD4loMiQD8TdEKLT3sXumDSBVQEJsGvrjhU3I00AHUtMsVD"
                />
              </div>
              <button onClick={()=>setShowPay(false)} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,padding:"14px",fontSize:14,fontWeight:700,width:"100%",color:C.text2}}>Close</button>
            </div>
          </div>
        )}
      </div>

      {/* Bottom nav — unchanged */}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
  <script>
    if("serviceWorker" in navigator){
      window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js"); });
    }
  </script>
</body>
</html>
