<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#07080A"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>DropPilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;}html,body,#root{background:#07080A;width:100%;height:100%;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{height:100%;width:100%;background:#07080A;}
    body{height:100%;width:100%;background:#07080A;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
    #root{height:100%;width:100%;background:#07080A;}
    input,textarea{font-family:inherit;}
    input::placeholder{color:#6B7A8D;}
    input:focus{border-color:#F5A623!important;outline:none;box-shadow:0 0 0 3px rgba(245,166,35,0.15);}
    textarea:focus{border-color:#F5A623!important;outline:none;box-shadow:0 0 0 3px rgba(245,166,35,0.15);}
    ::-webkit-scrollbar{display:none;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 18px rgba(245,166,35,0.3)}50%{box-shadow:0 0 36px rgba(245,166,35,0.65)}}
    @keyframes borderPulse{0%,100%{border-color:rgba(245,166,35,0.35)}50%{border-color:rgba(245,166,35,0.8)}}
    @keyframes iUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    @keyframes iPop{from{opacity:0;transform:scale(0.65)}to{opacity:1;transform:scale(1)}}
    @keyframes vUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes vPop{from{opacity:0;transform:scale(0.65)}to{opacity:1;transform:scale(1)}}
    @keyframes vFade{from{opacity:0}to{opacity:1}}
    @keyframes trainPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,0)}50%{box-shadow:0 0 0 8px rgba(245,166,35,0.2),0 0 28px rgba(245,166,35,0.4)}}
    @keyframes trainShimmer{0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes trainFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.04)}}
    @keyframes toastIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.85)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
    @keyframes toastOut{from{opacity:1;transform:translate(-50%,-50%) scale(1)}to{opacity:0;transform:translate(-50%,-50%) scale(0.85)}}
    @keyframes tabSlide{from{opacity:0;transform:translateY(18px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmerSlide{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes navPop{0%{transform:scale(1)}40%{transform:scale(1.28)}70%{transform:scale(0.92)}100%{transform:scale(1)}}
    @keyframes lockShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
    @keyframes defenderPulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,0)}50%{box-shadow:0 0 0 10px rgba(139,92,246,0.18),0 0 32px rgba(139,92,246,0.35)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
    .page{animation:tabSlide 0.28s cubic-bezier(0.16,1,0.3,1) forwards;}
    .float{animation:floatY 3.5s ease-in-out infinite;}
    .glow{animation:glowPulse 3s ease-in-out infinite;}
    .border-pulse{animation:borderPulse 3s ease-in-out infinite;}
    .iup{animation:iUp 0.5s cubic-bezier(0.16,1,0.3,1) both;}
    .ipop{animation:iPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;}
    .id1{animation-delay:0.15s;opacity:0;}.id2{animation-delay:0.35s;opacity:0;}.id3{animation-delay:0.55s;opacity:0;}
    .card-in{animation:cardIn 0.35s cubic-bezier(0.16,1,0.3,1) both;}
    .c0{animation-delay:0.04s;opacity:0}.c1{animation-delay:0.10s;opacity:0}.c2{animation-delay:0.16s;opacity:0}.c3{animation-delay:0.22s;opacity:0}.c4{animation-delay:0.28s;opacity:0}.c5{animation-delay:0.34s;opacity:0}.c6{animation-delay:0.40s;opacity:0}.c7{animation-delay:0.46s;opacity:0}.c8{animation-delay:0.52s;opacity:0}.c9{animation-delay:0.58s;opacity:0}
    button{transition:all 0.14s cubic-bezier(0.16,1,0.3,1);}
    button:active{opacity:0.82;transform:scale(0.96);}
    .tip{transition:border-color 0.18s,transform 0.14s;}
    .tip:active{transform:scale(0.99);}
    .train-pulse{animation:trainPulse 2.2s ease-in-out infinite;}
    .train-float{animation:trainFloat 3s ease-in-out infinite;}
    .nav-pop{animation:navPop 0.4s cubic-bezier(0.34,1.56,0.64,1);}
    .lock-shake{animation:lockShake 0.5s ease;}
    .defender-pulse{animation:defenderPulse 2.4s ease-in-out infinite;}
    .shimmer-locked{background:linear-gradient(90deg,transparent 30%,rgba(255,255,255,0.04) 50%,transparent 70%);background-size:200% 100%;animation:shimmerSlide 2.2s ease-in-out infinite;}
    .wm{position:fixed;pointer-events:none;user-select:none;-webkit-user-select:none;z-index:50;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,0.045);letter-spacing:1px;white-space:nowrap;transform:rotate(-35deg);transform-origin:center;}

    /* PAYWALL BLUR - FREE USERS SEE THIS */
    .blurred {
      filter: blur(8px);
      opacity: 0.75;
      position: relative;
      pointer-events: none;
    }
    .blurred::after {
      content: '🔒 ELITE ONLY';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(245,166,35,0.95);
      color: #000;
      font-size: 13px;
      font-weight: 900;
      padding: 8px 24px;
      border-radius: 99px;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(245,166,35,0.4);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script async src="https://js.stripe.com/v3/buy-button.js"></script>
  <script src="data.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react,env">
const {useState,useEffect,useCallback}=React;

const C = {
  bg:"#07080A", s1:"#0D0F13", s2:"#12151A", s3:"#1A1E26",
  border:"rgba(255,255,255,0.08)",
  amber:"#F5A623", amberD:"#C8820A", amberL:"#ffc84a",
  green:"#10B981", teal:"#06B6D4", blue:"#3B82F6",
  red:"#F43F5E", purple:"#8B5CF6",
  text:"#EDF0F7", text2:"#8B95A8", text3:"#6B7A8D",
  sans:"'Outfit',system-ui,sans-serif", mono:"'JetBrains Mono','Courier New',monospace"
};

const LATEST_UPDATE_ID = "2025-01-001";
const UPDATES = [
  {id:"2025-01-001",date:"Jan 2025",title:"Backup & Restore + Secure Paywall",items:[
    "Download a backup of your data any time from Settings",
    "Restore your data on a new device in seconds",
    "Paywall is now more secure — unlock code can no longer be found in DevTools",
    "Settings now has a visible gear button in the top right",
  ]},
];

const ELITE_HASH = "9967509c09c9247fa513abbf2e330af4874242c92d0a0f8ddd1082894c45d0b3";

async function hashCode(s){const b=new TextEncoder().encode(s.trim().toUpperCase());const h=await crypto.subtle.digest("SHA-256",b);return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,"0")).join("");}

const load = (k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}};
const save = (k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

const App = () => {
  const [tab, setTab] = useState("tips");
  const [pro, setPro] = useState(load("dp3-pro", false));
  const [showPay, setShowPay] = useState(false);
  const [payStep, setPayStep] = useState("offer");
  const [codeIn, setCodeIn] = useState("");
  const [codeErr, setCodeErr] = useState("");
  const [showUpdate, setShowUpdate] = useState(false);
  const [navPop, setNavPop] = useState(null);

  const [shifts, setShifts] = useState(load("dp3-shifts", []));
  const [journal, setJournal] = useState(load("dp3-journal", []));
  const [journalInput, setJournalInput] = useState("");
  const [preShift, setPreShift] = useState([
    {e:"🔋", t:"Phone charged + car charger ready", done:false},
    {e:"📍", t:"GPS & notifications ON", done:false},
    {e:"🚗", t:"Know your zone & peak hours", done:false},
    {e:"📸", t:"Camera ready for drop photos", done:false},
  ]);

  useEffect(() => {
    const lastSeen = load("dp3-update-seen", "");
    if (lastSeen !== LATEST_UPDATE_ID) setShowUpdate(true);
  }, []);

  const changeTab = (id) => {
    setTab(id);
    setNavPop(id);
    setTimeout(() => setNavPop(null), 400);
  };

  const togglePreShift = (i) => {
    const updated = [...preShift];
    updated[i].done = !updated[i].done;
    setPreShift(updated);
  };

  const resetPreShift = () => setPreShift(preShift.map(item => ({...item, done: false})));

  const addJournal = () => {
    if (!journalInput.trim()) return;
    const entry = {date: new Date().toLocaleDateString("en-US", {month:"short", day:"numeric"}), time: new Date().toLocaleTimeString("en-US", {hour:"numeric", minute:"2-digit"}), text: journalInput};
    const updated = [entry, ...journal];
    setJournal(updated);
    save("dp3-journal", updated);
    setJournalInput("");
  };

  const tryCode = async () => {
    const input = codeIn.trim().toUpperCase().replace(/[\s-]/g, "");
    if (input.length < 12) { setCodeErr("Code must be 12 characters"); return; }
    const hashed = await hashCode(input);
    if (hashed === ELITE_HASH) {
      setPro(true);
      save("dp3-pro", true);
      setShowPay(false);
      setPayStep("done");
      setCodeErr("");
    } else {
      setCodeErr("Invalid code — check your receipt email");
    }
  };

  return React.createElement("div", {style:{height:"100%", background:C.bg, color:C.text, fontFamily:C.sans, overflow:"hidden", display:"flex", flexDirection:"column"}},
    React.createElement("div", {style:{padding:"14px 16px 10px", background:C.s1, borderBottom:`1px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100}},
      React.createElement("div", {style:{display:"flex", alignItems:"center", gap:10}},
        React.createElement("div", {style:{width:36, height:36, borderRadius:12, background:`linear-gradient(135deg,${C.amber},${C.amberD})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:24}}, "🚗"),
        React.createElement("div", {style:{fontSize:22, fontWeight:900, letterSpacing:"-0.5px", background:`linear-gradient(90deg,${C.text},${C.amber})`, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"}}, "DropPilot")
      ),
      React.createElement("div", {style:{display:"flex", alignItems:"center", gap:8}},
        pro && React.createElement("div", {style:{fontSize:11, padding:"2px 10px", background:C.green, color:"#000", borderRadius:99, fontWeight:800}}, "ELITE"),
        React.createElement("button", {onClick:()=>setShowPay(true), style:{background:C.s2, border:`1px solid ${C.border}`, color:C.text3, padding:"6px 14px", borderRadius:99, fontSize:13, fontWeight:700}}, "Upgrade")
      )
    ),

    React.createElement("div", {style:{flex:1, overflowY:"auto", padding:"16px", paddingBottom:80}},
      tab==="tips" && React.createElement("div", {className:"page"}, /* your original tips content remains unchanged */),
      tab==="templates" && React.createElement("div", {style:{display:"flex",flexDirection:"column",gap:12}},
        MSG_CATS.map((cat,i) => React.createElement("div", {key:i, style:{background:C.s1,border:`1px solid ${C.border}`,borderRadius:16,padding:16,position:"relative"}},
          React.createElement("div", {style:{display:"flex",alignItems:"center",gap:12,marginBottom:12}},
            React.createElement("span", {style:{fontSize:28}}, cat.e),
            React.createElement("div", {style:{flex:1}},
              React.createElement("div", {style:{fontSize:17,fontWeight:800}}, cat.t),
              React.createElement("div", {style:{fontSize:13,color:C.text3}}, cat.sub)
            ),
            !pro && React.createElement("div", {style:{background:C.amber,color:"#000",fontSize:11,fontWeight:800,padding:"2px 10px",borderRadius:99}}, "ELITE")
          ),
          React.createElement("div", {className:!pro ? "blurred" : ""},
            cat.secs.map((sec,j) => React.createElement("div", {key:j, style:{marginBottom:12,padding:12,background:C.s2,borderRadius:12}},
              React.createElement("div", {style:{fontSize:14,fontWeight:700,marginBottom:4}}, sec.h),
              React.createElement("div", {style:{fontSize:13,color:C.text2,lineHeight:1.5}}, sec.msg||sec.w)
            ))
          )
        ))
      ),
      tab==="defend" && React.createElement("div", {style:{display:"flex",flexDirection:"column",gap:12}},
        PLATFORMS_DEFEND.map((p,i) => React.createElement("div", {key:i, style:{background:C.s1,border:`1px solid ${C.border}`,borderRadius:16,padding:16,position:"relative"}},
          React.createElement("div", {style:{display:"flex",alignItems:"center",gap:12}},
            React.createElement("span", {style:{fontSize:28}}, p.e),
            React.createElement("div", {style:{flex:1,fontWeight:800,fontSize:17}}, p.label),
            !pro && React.createElement("div", {style:{background:C.amber,color:"#000",fontSize:11,fontWeight:800,padding:"2px 10px",borderRadius:99}}, "ELITE")
          ),
          React.createElement("div", {className:!pro ? "blurred" : "", style:{marginTop:12}},
            PLATFORM_HABITS[p.id].map((h,j) => React.createElement("div", {key:j, style:{marginBottom:12,padding:12,background:C.s2,borderRadius:12}},
              React.createElement("div", {style:{fontSize:14,fontWeight:700}}, h.t),
              React.createElement("div", {style:{fontSize:13,color:C.text2,lineHeight:1.5}}, h.why)
            ))
          )
        ))
      ),
      tab==="basics" && React.createElement("div", {style:{display:"flex",flexDirection:"column",gap:12}},
        BASICS_CATS.map((cat,i) => React.createElement("div", {key:i, style:{background:C.s1,border:`1px solid ${C.border}`,borderRadius:16,padding:16,position:"relative"}},
          React.createElement("div", {style:{display:"flex",alignItems:"center",gap:12,marginBottom:12}},
            React.createElement("span", {style:{fontSize:28}}, cat.e),
            React.createElement("div", {style:{flex:1}},
              React.createElement("div", {style:{fontSize:17,fontWeight:800}}, cat.t),
              React.createElement("div", {style:{fontSize:13,color:C.text3}}, cat.sub)
            ),
            !cat.free && !pro && React.createElement("div", {style:{background:C.amber,color:"#000",fontSize:11,fontWeight:800,padding:"2px 10px",borderRadius:99}}, "ELITE")
          ),
          React.createElement("div", {className:!cat.free && !pro ? "blurred" : ""},
            cat.secs.map((sec,j) => React.createElement("div", {key:j, style:{marginBottom:12,padding:12,background:C.s2,borderRadius:12}},
              React.createElement("div", {style:{fontSize:14,fontWeight:700,marginBottom:4}}, sec.h),
              React.createElement("div", {style:{fontSize:13,color:C.text2,lineHeight:1.5}}, sec.body)
            ))
          )
        ))
      ),
      tab==="train" && React.createElement("div", {style:{display:"flex",flexDirection:"column",gap:12}},
        LEARN_CATS.map((cat,i) => React.createElement("div", {key:i, style:{background:C.s1,border:`1px solid ${C.border}`,borderRadius:16,padding:16,position:"relative"}},
          React.createElement("div", {style:{display:"flex",alignItems:"center",gap:12,marginBottom:12}},
            React.createElement("span", {style:{fontSize:28}}, cat.e),
            React.createElement("div", {style:{flex:1}},
              React.createElement("div", {style:{fontSize:17,fontWeight:800}}, cat.t),
              React.createElement("div", {style:{fontSize:13,color:C.text3}}, cat.sub)
            ),
            !cat.free && !pro && React.createElement("div", {style:{background:C.amber,color:"#000",fontSize:11,fontWeight:800,padding:"2px 10px",borderRadius:99}}, "ELITE")
          ),
          React.createElement("div", {className:!cat.free && !pro ? "blurred" : ""},
            cat.secs.map((sec,j) => React.createElement("div", {key:j, style:{marginBottom:12,padding:12,background:C.s2,borderRadius:12}},
              React.createElement("div", {style:{fontSize:14,fontWeight:700,marginBottom:4}}, sec.h),
              React.createElement("div", {style:{fontSize:13,color:C.text2,lineHeight:1.5}}, sec.body)
            ))
          )
        ))
      )
    ),

    /* Bottom nav */
    React.createElement("nav", {style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(8,10,13,0.96)",backdropFilter:"blur(24px)",borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,paddingBottom:6,paddingTop:4}},
      [{id:"tips",l:"Earn",e:"⭐",ac:C.amber},{id:"templates",l:"Scripts",e:"💬",ac:C.blue},{id:"track",l:"Track",e:"📊",ac:C.green},{id:"defend",l:"Defend",e:"🛡️",ac:C.purple},{id:"basics",l:"Basics",e:"📖",ac:C.teal},{id:"train",l:"Training",e:"🎓",ac:C.amber}].map(n => 
        React.createElement("button", {key:n.id, onClick:()=>changeTab(n.id), style:{flex:1,background:"transparent",border:"none",cursor:"pointer",padding:"5px 0 3px",display:"flex",flexDirection:"column",alignItems:"center",gap:1,position:"relative"}},
          n.id===tab && React.createElement("div", {style:{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:2,borderRadius:"0 0 4px 4px",background:n.ac,boxShadow:`0 0 8px ${n.ac}`}}),
          React.createElement("div", {className:navPop===n.id?"nav-pop":"", style:{width:36,height:26,borderRadius:9,background:n.id===tab?`${n.ac}18`:"transparent",border:n.id===tab?`1px solid ${n.ac}30`:"1px solid transparent",display:"flex",alignItems:"center",justifyContent:"center"}},
            React.createElement("span", {style:{fontSize:n.id===tab?16:14}}, n.e)
          ),
          React.createElement("span", {style:{fontSize:9,fontWeight:n.id===tab?800:600,color:n.id===tab?n.ac:C.text3}}, n.l)
        )
      )
    ),

    /* Paywall modal (your original one) */
    showPay && React.createElement("div", {style:{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}},
      /* your original paywall JSX remains unchanged */
    )
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
