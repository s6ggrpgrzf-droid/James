<!DOCTYPE html>
<html lang="en">
<head>

  <style>

    .blurred::after {
      content: '🔒 ELITE ONLY';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(245,166,35,0.95);
      color: #000;

      font-weight: 900;
      padding: 8px 24px;
      border-radius: 99px;

      z-index: 10;
    }

</head>
<body>
  <div id="root"></div>
  <script async src="https://js.stripe.com/v3/buy-button.js"></script>
  <script src="data.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <script type="text/babel" data-presets="react,env">
const {useState,useEffect,useCallback}=React;

const CSS = `/* [your original CSS string here — unchanged] */`;

// [All your original constants and data functions remain exactly the same]

const App = () => {
  // [All your original state and functions remain exactly the same]
  const [tab, setTab] = useState("tips");
  const [pro, setPro] = useState(false);
  // ... rest of your state ...

  // [Your original useEffect, changeTab, tryCode, etc. — unchanged]

  return (
    <div style={{height:"100%", background:C.bg, color:C.text, fontFamily:C.sans, overflow:"hidden", display:"flex", flexDirection:"column"}}>
      {/* Header unchanged */}

      {/* Main content */}
      <div style={{flex:1, overflowY:"auto", padding:"16px", paddingBottom:80}}>
        {/* Tips tab (free) — unchanged */}
        {tab==="tips"&&(
          <div className="page">
            {/* your original tips content */}
          </div>
        )}

        {/* TEMPLATES TAB — NOW BLURRED FOR FREE USERS */}
        {tab==="templates"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {MSG_CATS.map((cat,i)=>(
              <div key={i} style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:16,padding:16,position:"relative"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                  <span style={{fontSize:28}}>{cat.e}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:17,fontWeight:800}}>{cat.t}</div>
                    <div style={{fontSize:13,color:C.text3}}>{cat.sub}</div>
                  </div>
                  {!pro && <div style={{background:C.amber,color:"#000",fontSize:11,fontWeight:800,padding:"2px 10px",borderRadius:99}}>ELITE</div>}
                </div>
                <div className={!pro ? "blurred" : ""}>
                  {cat.secs.map((sec,j)=>(
                    <div key={j} style={{marginBottom:12,padding:12,background:C.s2,borderRadius:12}}>
                      <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{sec.h}</div>
                      <div style={{fontSize:13,color:C.text2,lineHeight:1.5}}>{sec.msg||sec.w}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* TRACK tab unchanged */}

        {/* DEFEND TAB — NOW BLURRED FOR FREE USERS */}
        {tab==="defend"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {PLATFORMS_DEFEND.map((p,i)=>(
              <div key={i} style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:16,padding:16,position:"relative"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:28}}>{p.e}</span>
                  <div style={{flex:1,fontWeight:800,fontSize:17}}>{p.label}</div>
                  {!pro && <div style={{background:C.amber,color:"#000",fontSize:11,fontWeight:800,padding:"2px 10px",borderRadius:99}}>ELITE</div>}
                </div>
                <div className={!pro ? "blurred" : ""} style={{marginTop:12}}>
                  {PLATFORM_HABITS[p.id].map((h,j)=>(
                    <div key={j} style={{marginBottom:12,padding:12,background:C.s2,borderRadius:12}}>
                      <div style={{fontSize:14,fontWeight:700}}>{h.t}</div>
                      <div style={{fontSize:13,color:C.text2,lineHeight:1.5}}>{h.why}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* BASICS TAB — NOW BLURRED FOR PAID CATEGORIES */}
        {tab==="basics"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {BASICS_CATS.map((cat,i)=>(
              <div key={i} style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:16,padding:16,position:"relative"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                  <span style={{fontSize:28}}>{cat.e}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:17,fontWeight:800}}>{cat.t}</div>
                    <div style={{fontSize:13,color:C.text3}}>{cat.sub}</div>
                  </div>
                  {!cat.free && !pro && <div style={{background:C.amber,color:"#000",fontSize:11,fontWeight:800,padding:"2px 10px",borderRadius:99}}>ELITE</div>}
                </div>
                <div className={!cat.free && !pro ? "blurred" : ""}>
                  {cat.secs.map((sec,j)=>(
                    <div key={j} style={{marginBottom:12,padding:12,background:C.s2,borderRadius:12}}>
                      <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{sec.h}</div>
                      <div style={{fontSize:13,color:C.text2,lineHeight:1.5}}>{sec.body}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* TRAINING TAB — NOW BLURRED FOR FREE USERS */}
        {tab==="train"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {LEARN_CATS.map((cat,i)=>(
              <div key={i} style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:16,padding:16,position:"relative"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                  <span style={{fontSize:28}}>{cat.e}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:17,fontWeight:800}}>{cat.t}</div>
                    <div style={{fontSize:13,color:C.text3}}>{cat.sub}</div>
                  </div>
                  {!cat.free && !pro && <div style={{background:C.amber,color:"#000",fontSize:11,fontWeight:800,padding:"2px 10px",borderRadius:99}}>ELITE</div>}
                </div>
                <div className={!cat.free && !pro ? "blurred" : ""}>
                  {cat.secs.map((sec,j)=>(
                    <div key={j} style={{marginBottom:12,padding:12,background:C.s2,borderRadius:12}}>
                      <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{sec.h}</div>
                      <div style={{fontSize:13,color:C.text2,lineHeight:1.5}}>{sec.body}</div>

                  ))}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Bottom nav unchanged */}

};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
