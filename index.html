<!DOCTYPE html>

<html>
<head><title>Test</title></head>
<body>
<div id="root">Loading...</div>
<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('root').innerHTML = 
    '<pre style="color:red;padding:20px;">ERROR: ' + msg + '\nSRC: ' + src + '\nLINE: ' + line + '</pre>';
  return true;
};
</script>
<script src="data.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">
const {useState} = React;
function App() {
  const [n, setN] = useState(0);
  return (
    <div style={{padding:40,fontFamily:'sans-serif',background:'#07080A',minHeight:'100vh',color:'white'}}>
      <h1 style={{color:'#F5A623'}}>DropPilot Test</h1>
      <p>React is working! Count: {n}</p>
      <p>C.amber = {C.amber}</p>
      <p>ALL_TIPS count: {ALL_TIPS.length}</p>
      <p>VIDEOS count: {VIDEOS.length}</p>
      <button onClick={()=>setN(n+1)} style={{background:'#F5A623',border:'none',padding:'10px 20px',cursor:'pointer'}}>Click me</button>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
