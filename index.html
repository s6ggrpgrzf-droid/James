<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#07080A"/>
  <title>DropPilot</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;background:#07080A;overflow:hidden;}
    body{background:radial-gradient(circle at 50% 20%,rgba(245,166,35,0.12) 0%,transparent 50%),linear-gradient(180deg,#07080A 0%,#0A0C11 100%);position:relative;}
    .card-glass{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:22px;backdrop-filter:blur(16px);box-shadow:0 8px 32px -6px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.15);transition:all 0.22s cubic-bezier(0.16,1,0.3,1);}
    .glow{animation:glowPulse 2.8s ease-in-out infinite;}
    button{transition:all 0.18s cubic-bezier(0.16,1,0.3,1);}
    button:active{transform:scale(0.94);opacity:0.92;}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(245,166,35,0.35)}50%{box-shadow:0 0 42px rgba(245,166,35,0.75)}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
const {useState} = React;

const C = {amber:"#F5A623", text:"#EDF0F7", text2:"#8B95A8", sans:"'Outfit',sans-serif"};

const ALL_TIPS = [
  {e:"👋",t:"Greet with a smile",s:"First impressions decide your rating.",d:"Make brief eye contact and say 'Hi, here's your order!'"},
  {e:"📸",t:"Take a photo on every delivery",s:"Your photo is your protection.",d:"Show food + door number together."},
  {e:"💬",t:"Text when you're 3-4 minutes away",s:"This earns more 5-star ratings.",d:"Quick heads-up sets a professional tone."}
];

const MSG_CATS = [
  {e:"📲",t:"Arrival Texts",sub:"Texts that get 5-star ratings",secs:[{h:"Standard arrival",msg:"Hey! Pulling up now with your order. Enjoy! 😊"}]},
  {e:"⏰",t:"Late Delivery",sub:"Turn bad situations into 5-stars",secs:[{h:"Running late",msg:"Hi! Running a little behind due to traffic. On my way!"}]}
];

function App(){
  const [tab, setTab] = useState("tips");

  const changeTab = (id) => setTab(id);

  return React.createElement('div', {style:{background:C.amber,height:"100vh",display:"flex",flexDirection:"column",fontFamily:C.sans,color:C.text}},
    // Header
    React.createElement('div', {style:{background:"rgba(10,12,16,0.96)",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid rgba(255,255,255,0.1)"}},
      React.createElement('div', {className:"glow", style:{width:44,height:44,borderRadius:16,background:`linear-gradient(135deg,${C.amber},#C8820A)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}, "🚗"),
      React.createElement('div', {}, 
        React.createElement('div', {style:{fontSize:22,fontWeight:900}}, "DropPilot"),
        React.createElement('div', {style:{fontSize:12,color:"#8B95A8",letterSpacing:"2px"}}, "DRIVER COMMAND CENTER")
      )
    ),
    // Content
    React.createElement('div', {style:{flex:1,overflowY:"auto",padding:16}},
      tab==="tips" && React.createElement('div', {style:{animation:"tabSlide 0.3s ease forwards"}},
        React.createElement('div', {className:"card-glass", style:{padding:20,marginBottom:12}}, React.createElement('h2', {style:{fontSize:22,fontWeight:900}}, "⭐ Earn More Every Shift")),
        ALL_TIPS.map((tip,i) => React.createElement('div', {key:i, className:"card-glass", style:{padding:20,marginBottom:12}}, 
          React.createElement('div', {style:{fontSize:18,fontWeight:700}}, tip.e + " " + tip.t),
          React.createElement('div', {style:{fontSize:14,color:C.text2,marginTop:8}}, tip.s)
        ))
      ),
      tab==="templates" && React.createElement('div', {style:{animation:"tabSlide 0.3s ease forwards"}},
        React.createElement('div', {className:"card-glass", style:{padding:20,marginBottom:12}}, React.createElement('h2', {style:{fontSize:22,fontWeight:900}}, "💬 Message Templates")),
        MSG_CATS.map((cat,i) => React.createElement('div', {key:i, className:"card-glass", style:{padding:20,marginBottom:12}}, 
          React.createElement('div', {style:{fontSize:18,fontWeight:700}}, cat.e + " " + cat.t)
        ))
      ),
      tab==="basics" && React.createElement('div', {style:{animation:"tabSlide 0.3s ease forwards"}}, React.createElement('div', {className:"card-glass", style:{padding:20}}, React.createElement('h2', {style:{fontSize:22,fontWeight:900}}, "📖 Basics"))),
      tab==="defend" && React.createElement('div', {style:{animation:"tabSlide 0.3s ease forwards"}}, React.createElement('div', {className:"card-glass", style:{padding:20}}, React.createElement('h2', {style:{fontSize:22,fontWeight:900}}, "🛡️ Defend"))),
      tab==="train" && React.createElement('div', {style:{animation:"tabSlide 0.3s ease forwards"}}, React.createElement('div', {className:"card-glass", style:{padding:20}}, React.createElement('h2', {style:{fontSize:22,fontWeight:900}}, "🎓 Training")))
    ),
    // Bottom Nav
    React.createElement('div', {style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(10,12,16,0.96)",padding:"8px 4px 10px",display:"flex",borderTop:"1px solid rgba(255,255,255,0.1)"}},
      React.createElement('button', {onClick:()=>changeTab("tips"),style:{flex:1,background:"transparent",border:"none",color:tab==="tips"?C.amber:"#888",fontSize:12,fontWeight:700}},"⭐ Earn"),
      React.createElement('button', {onClick:()=>changeTab("templates"),style:{flex:1,background:"transparent",border:"none",color:tab==="templates"?C.amber:"#888",fontSize:12,fontWeight:700}},"💬 Scripts"),
      React.createElement('button', {onClick:()=>changeTab("basics"),style:{flex:1,background:"transparent",border:"none",color:tab==="basics"?C.amber:"#888",fontSize:12,fontWeight:700}},"📖 Basics"),
      React.createElement('button', {onClick:()=>changeTab("defend"),style:{flex:1,background:"transparent",border:"none",color:tab==="defend"?C.amber:"#888",fontSize:12,fontWeight:700}},"🛡️ Defend"),
      React.createElement('button', {onClick:()=>changeTab("train"),style:{flex:1,background:"transparent",border:"none",color:tab==="train"?C.amber:"#888",fontSize:12,fontWeight:700}},"🎓 Training")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
