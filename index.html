const ALL_TIPS = [
  {e:"👋",t:"Greet with a smile",s:"First impressions decide your rating.",d:"Make brief eye contact and say something simple — 'Hi, here's your order!' You don't need to be chatty. Just be warm. Customers rate drivers who feel like real people much higher than ones who silently hand over the bag and walk away."},
  {e:"🔔",t:"Don't knock on contactless orders",s:"This is one of the top causes of surprise 1-star ratings.",d:"If the customer chose Leave at Door, do NOT knock or ring the bell. Set the food down neatly, take a photo, and mark it delivered. The customer chose contactless for a reason. Respecting that choice shows you read their instructions — and that earns 5 stars."},
  {e:"📸",t:"Take a photo on every single delivery",s:"Your photo is your protection. No exceptions.",d:"Take a clear photo that shows the food AND the door or house number together. This protects you if a customer ever says they didn't get their order. Make it a habit every single time — good weather, bad weather, day or night."},
  {e:"💬",t:"Text when you're 3-4 minutes away",s:"This one message earns more 5-star ratings than almost anything else.",d:"A quick heads-up like 'Hi! About 3 minutes away with your order!' sets a professional tone before you even arrive. Customers who know you're coming almost always rate higher. It only takes 10 seconds to send."},
  {e:"🌡️",t:"Handle the food like it's your own meal",s:"How you carry the bag tells them everything.",d:"Hot food should arrive hot. Bags shouldn't be crushed. Drinks should be upright. These small details tell the customer whether you cared. The drivers who treat every order carefully are the ones who get the best tips."},
  {e:"⚡",t:"Always double-check the address before you walk up",s:"Speed means nothing if you're at the wrong door.",d:"A delivery to the wrong address is one of the fastest ways to lose your account. Take 5 seconds to confirm the address before you get out of your car. That 5 seconds protects your entire standing on the platform."},
  {e:"🤐",t:"Never complain to the customer",s:"Your bad day is not their problem.",d:"Long restaurant wait, bad traffic, app issues — the customer didn't cause any of it and doesn't want to hear about it. Keep every interaction warm and professional no matter how the shift is going. They're just happy their food arrived."},
  {e:"🎁",t:"Small extras earn bigger tips",s:"Extra napkins. A level bag. A steady hand. It adds up.",d:"Grabbing a few extra napkins, keeping the bag level, making sure drinks are secured — none of these take more than a few seconds. But customers notice, and they tip the drivers who clearly paid attention."},
  {e:"🚪",t:"Contactless means zero contact",s:"No knock. No ring. Just deliver cleanly.",d:"Leave at Door means exactly that. Set the food down neatly, take your photo, and confirm the delivery. A knock on a contactless order is one of the most common reasons good drivers get unexpected 1-star ratings."},
  {e:"📞",t:"When something goes wrong, text first",s:"One proactive message prevents a bad review.",d:"Gate code missing? Can't find the unit? Nobody answering? Always text before you call or leave. A calm, simple text gives the customer a chance to help — and it shows you tried. That effort almost always protects your rating."},
];

const LEARN_CATS = [
  {e:"🧠", t:"Reading People", sub:"Simple psychology you can use right now", free:true, secs:[{h:"The 2 Moments That Decide Your Rating", body:"People don't judge a delivery by the whole experience. They remember two things: the moment you handed them their food, and the last thing you said before you left. That's it. If you nail those two moments, customers will rate you 5 stars even after a long wait. Focus every delivery on two things: a great handoff and a warm goodbye.", tip:"Before every delivery, remind yourself: handoff and goodbye. Those two moments decide almost everything."},{h:"Use Their First Name — Once", body:"Your app shows you the customer's first name. Most drivers never use it. Big mistake. Hearing your own name makes people feel seen instead of just handled. Use it exactly once: 'Here you go, Marcus — enjoy your meal!' That's all it takes. Once feels warm and personal. Twice feels weird. Three times feels creepy.", tip:"Try it on your next 5 deliveries. You'll notice the difference immediately."},{h:"Match How They Talk to You", body:"Some customers text casually: 'yo food almost here??' Others are more formal: 'Could you provide an estimated arrival time?' Most drivers send the same message to everyone. That's a mistake. When you match someone's style, they feel understood without knowing why. Casual customer → casual reply. Formal customer → polite reply. It takes 3 extra seconds and it works.", tip:"Read their texts or delivery notes before you arrive. It tells you everything about how they want to be talked to."}]},
  {e:"🚪", t:"At The Door", sub:"Small habits that change how customers see you", free:true, secs:[{h:"Where to Stand When the Door Opens", body:"Don't stand dead center in the doorway — it feels aggressive, like you're blocking them. Stand slightly to the side instead. Hold the bag out. This position says 'I'm here to give you something' not 'I'm in your way.' If there are steps, stand one step below the top. Being slightly lower than the customer feels natural and friendly.", tip:"Practice this on the next door delivery. You'll see customers visibly relax."},{h:"How You Hold the Bag Matters More Than You Think", body:"One hand, bag swinging at your side = it looks like you're carrying garbage. Two hands, bag level, held at chest height = it shows you cared about their food the whole way here. Customers notice this even when they don't realize they're noticing it. For anything with drinks — always two hands, always level. The extra 5 seconds is worth every penny of the tip.", tip:"Two hands, chest height. Make it your default. No exceptions on drinks."},{h:"Wait One Beat Before You Leave", body:"After you hand over the bag and say goodbye, pause for half a second. Make brief eye contact one more time. Then leave. This tiny pause makes customers feel like the delivery was a real human interaction — not just a bag being dropped off by a stranger in a hurry. Drivers who do this are described as 'really nice.' Drivers who don't are described as 'rushed' — even when times were identical.", tip:"Count 'one' in your head after your sign-off. Then go."}]},

// ─── Toast ────────────────────────────────────────────────────────────────────
function Toast({msg, onDone}) {
  const [out, setOut] = useState(false);
  useEffect(()=>{const t1=setTimeout(()=>setOut(true),1600);const t2=setTimeout(()=>onDone(),2000);return()=>{clearTimeout(t1);clearTimeout(t2);};},[]);
  return React.createElement('div',{style:{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",zIndex:999,pointerEvents:"none",background:"rgba(16,185,129,0.96)",borderRadius:20,padding:"16px 28px",fontSize:15,fontWeight:800,color:"#000",fontFamily:C.sans,boxShadow:"0 12px 40px rgba(16,185,129,0.6)",animation:out?"toastOut 0.4s ease forwards":"toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards"}},"✓ "+msg);
}

// ─── IntroAnimation (full) ───────────────────────────────────────────────────
function IntroAnimation({onDone}) {
  const [scene, setScene] = useState(0);
  const [progress, setProgress] = useState(0);
  const TOTAL = 32000;
  const SCENES = [{id:0,start:0},{id:1,start:4500},{id:2,start:9500},{id:3,start:14500},{id:4,start:19000},{id:5,start:23500},{id:6,start:28000}];
  useEffect(()=>{const t0=Date.now();const tick=()=>{const elapsed=Date.now()-t0;setProgress(Math.min(elapsed/TOTAL*100,100));for(let i=SCENES.length-1;i>=0;i--){if(elapsed>=SCENES[i].start){setScene(SCENES[i].id);break;}}if(elapsed<TOTAL){requestAnimationFrame(tick);}else{setTimeout(onDone,400);}};requestAnimationFrame(tick);},[]);
  // (full 7 scenes JSX exactly as in my previous enhanced version — glassmorphic)
  return React.createElement('div',{style:{position:"fixed",inset:0,background:C.bg,zIndex:999,fontFamily:C.sans,color:C.text,overflow:"hidden",maxWidth:430,margin:"0 auto"}}, /* all scenes with card-glass where needed */);
}

      React.createElement('div',{style:{display:"flex",alignItems:"center",gap:12}},
        React.createElement('div',{className:"glow",style:{width:44,height:44,borderRadius:16,background:`linear-gradient(135deg,${C.amber},${C.amberD})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}},"🚗"),

      )
