<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#07080A"/>
  <title>DropPilot</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;background:#07080A;overflow:hidden;}
    body{background:radial-gradient(circle at 50% 20%,rgba(245,166,35,0.12) 0%,transparent 50%),linear-gradient(180deg,#07080A 0%,#0A0C11 100%);position:relative;}
    body::before{content:"";position:absolute;inset:0;background:radial-gradient(circle,#ffffff05 1px,transparent 0);background-size:60px 60px;opacity:0.035;pointer-events:none;}
    .card-glass{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:22px;backdrop-filter:blur(16px);box-shadow:0 8px 32px -6px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.15);transition:all 0.22s cubic-bezier(0.16,1,0.3,1);}
    .card-glass:hover{transform:translateY(-2px);box-shadow:0 12px 40px -8px rgba(245,166,35,0.3);}
    .glow{animation:glowPulse 2.8s ease-in-out infinite;}
    button{transition:all 0.18s cubic-bezier(0.16,1,0.3,1);}
    button:active{transform:scale(0.94);opacity:0.92;}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(245,166,35,0.35)}50%{box-shadow:0 0 42px rgba(245,166,35,0.75)}}
    @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
const {useState}=React;

const C = {amber:"#F5A623", text:"#EDF0F7", text2:"#8B95A8", sans:"'Outfit',sans-serif"};

function App(){
  const [tab,setTab]=useState("tips");
  return React.createElement('div',{style:{background:C.amber,height:"100vh",display:"flex",flexDirection:"column",fontFamily:C.sans,color:C.text}},
    // Header
    React.createElement('div',{style:{background:"rgba(10,12,16,0.96)",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid rgba(255,255,255,0.1)"}},
      React.createElement('div',{className:"glow",style:{width:44,height:44,borderRadius:16,background:"linear-gradient(135deg,#F5A623,#C8820A)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}},"🚗"),
      React.createElement('div',{},React.createElement('div',{style:{fontSize:22,fontWeight:900}},"DropPilot"),React.createElement('div',{style:{fontSize:12,color:"#8B95A8",letterSpacing:"2px"}},"DRIVER COMMAND CENTER"))
    ),
    // Content
    React.createElement('div',{style:{flex:1,padding:16,overflowY:"auto"}},
      React.createElement('div',{style:{textAlign:"center",marginBottom:20}},React.createElement('h1',{style:{fontSize:28,fontWeight:900}},"Welcome to DropPilot")),
      React.createElement('div',{className:"card-glass",style:{padding:20,marginBottom:16}},React.createElement('div',{style:{fontSize:18,fontWeight:700}},"⭐ Quick Tips")),
      React.createElement('div',{className:"card-glass",style:{padding:20,marginBottom:16}},React.createElement('div',{style:{fontSize:18,fontWeight:700}},"💬 Message Scripts")),
      React.createElement('div',{className:"card-glass",style:{padding:20,marginBottom:16}},React.createElement('div',{style:{fontSize:18,fontWeight:700}},"🛡️ Account Defense")),
      React.createElement('div',{className:"card-glass",style:{padding:20,marginBottom:16}},React.createElement('div',{style:{fontSize:18,fontWeight:700}},"🎓 Training")),
      React.createElement('div',{className:"card-glass",style:{padding:20}},React.createElement('div',{style:{fontSize:18,fontWeight:700}},"📖 Basics"))
    ),
    // Bottom Nav
    React.createElement('div',{style:{background:"rgba(10,12,16,0.96)",display:"flex",padding:"8px 0",borderTop:"1px solid rgba(255,255,255,0.1)"}},
      React.createElement('button',{onClick:()=>setTab("tips"),style:{flex:1,background:"transparent",border:"none",color:tab==="tips"?C.amber:"#888",fontSize:12,fontWeight:700}},"⭐ Earn"),
      React.createElement('button',{onClick:()=>setTab("templates"),style:{flex:1,background:"transparent",border:"none",color:tab==="templates"?C.amber:"#888",fontSize:12,fontWeight:700}},"💬 Scripts"),
      React.createElement('button',{onClick:()=>setTab("basics"),style:{flex:1,background:"transparent",border:"none",color:tab==="basics"?C.amber:"#888",fontSize:12,fontWeight:700}},"📖 Basics"),
      React.createElement('button',{onClick:()=>setTab("defend"),style:{flex:1,background:"transparent",border:"none",color:tab==="defend"?C.amber:"#888",fontSize:12,fontWeight:700}},"🛡️ Defend"),
      React.createElement('button',{onClick:()=>setTab("train"),style:{flex:1,background:"transparent",border:"none",color:tab==="train"?C.amber:"#888",fontSize:12,fontWeight:700}},"🎓 Training")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
