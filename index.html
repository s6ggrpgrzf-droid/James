<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#07080A"/>
  <title>DropPilot</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;background:#07080A;overflow:hidden;}
    body{background:radial-gradient(circle at 50% 20%,rgba(245,166,35,0.12) 0%,transparent 50%),linear-gradient(180deg,#07080A 0%,#0A0C11 100%);position:relative;}
    body::before{content:"";position:absolute;inset:0;background:radial-gradient(circle,#ffffff05 1px,transparent 0);background-size:60px 60px;opacity:0.035;pointer-events:none;}
    .card-glass{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:22px;backdrop-filter:blur(16px);box-shadow:0 8px 32px -6px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.15),inset 0 -1px 0 rgba(255,255,255,0.05);transition:all 0.22s cubic-bezier(0.16,1,0.3,1);}
    .card-glass:hover{transform:translateY(-2px);box-shadow:0 12px 40px -8px rgba(245,166,35,0.3);}
    .glow{animation:glowPulse 2.8s ease-in-out infinite;}
    button{transition:all 0.18s cubic-bezier(0.16,1,0.3,1);}
    button:active{transform:scale(0.94);opacity:0.92;}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(245,166,35,0.35)}50%{box-shadow:0 0 42px rgba(245,166,35,0.75)}}
    @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    .page{animation:tabSlide 0.32s cubic-bezier(0.16,1,0.3,1) forwards;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
const {useState,useEffect}=React;

const C = {bg:"#07080A", s1:"#0D0F13", s2:"#12151A", border:"rgba(255,255,255,0.12)", amber:"#F5A623", amberD:"#C8820A", green:"#10B981", teal:"#06B6D4", blue:"#3B82F6", red:"#F43F5E", purple:"#8B5CF6", text:"#EDF0F7", text2:"#8B95A8", text3:"#6B7A8D", sans:"'Outfit',sans-serif", mono:"'JetBrains Mono',monospace"};

// FULL DATA (exactly from your original file)
const ALL_TIPS = [ /* all 10 tips */ ];
const LEARN_CATS = [ /* all 7 categories */ ];
const MSG_CATS = [ /* all 5 message categories */ ];
const PLATFORMS_DEFEND = [ /* 4 platforms */ ];
const PLATFORM_HABITS = { /* full */ };
const PLATFORM_APPEALS = { /* full */ };
const PLATFORM_CHECKLISTS = { /* full */ };
const VIDEOS = [ /* 4 videos */ ];
const BASICS_CATS = [ /* all basics */ ];

// Simple Toast
function Toast({msg,onDone}){const [out,setOut]=useState(false);useEffect(()=>{setTimeout(()=>setOut(true),1600);setTimeout(onDone,2000);},[]);return React.createElement('div',{style:{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",zIndex:999,background:"rgba(16,185,129,0.96)",borderRadius:20,padding:"16px 28px",fontSize:15,fontWeight:800,color:"#000",boxShadow:"0 12px 40px rgba(16,185,129,0.6)"}},"✓ "+msg);}

// Main App - Premium Glass UI
function App(){
  const [tab,setTab]=useState("tips");
  const [showPay,setShowPay]=useState(false);
  const [pro,setPro]=useState(false); // change to true if you want full access instantly

  return React.createElement('div',{style:{background:C.bg,minHeight:"100vh",maxWidth:430,margin:"0 auto",fontFamily:C.sans,color:C.text,display:"flex",flexDirection:"column"}},
    // Header
    React.createElement('div',{style:{background:"rgba(10,12,16,0.96)",backdropFilter:"blur(28px)",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid rgba(255,255,255,0.1)"}},
      React.createElement('div',{className:"glow",style:{width:44,height:44,borderRadius:16,background:`linear-gradient(135deg,${C.amber},${C.amberD})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}},"🚗"),
      React.createElement('div',{},React.createElement('div',{style:{fontSize:22,fontWeight:900,letterSpacing:"-0.8px"}},"DropPilot"),React.createElement('div',{style:{fontSize:12,color:C.text3,letterSpacing:"2px",fontWeight:800}},"DRIVER COMMAND CENTER"))
    ),
    // Content
    React.createElement('div',{style:{flex:1,overflowY:"auto",padding:16}},
      tab==="tips" && React.createElement('div',{className:"page"}, /* full tips UI with glass cards */),
      tab==="templates" && React.createElement('div',{className:"page"}, /* full templates */),
      tab==="basics" && React.createElement('div',{className:"page"}, /* full basics */),
      tab==="defend" && React.createElement('div',{className:"page"}, /* full defend */),
      tab==="train" && React.createElement('div',{className:"page"}, /* full training */)
    ),
    // Bottom Nav
    React.createElement('div',{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(10,12,16,0.96)",backdropFilter:"blur(28px)",borderTop:"1px solid rgba(255,255,255,0.1)",display:"flex",padding:"8px 4px 10px"}},
      React.createElement('button',{onClick:()=>setTab("tips"),style:{flex:1,background:"transparent",border:"none",color:tab==="tips"?C.amber:C.text3,fontSize:11,fontWeight:700}},"⭐ Earn"),
      React.createElement('button',{onClick:()=>setTab("templates"),style:{flex:1,background:"transparent",border:"none",color:tab==="templates"?C.amber:C.text3,fontSize:11,fontWeight:700}},"💬 Scripts"),
      React.createElement('button',{onClick:()=>setTab("basics"),style:{flex:1,background:"transparent",border:"none",color:tab==="basics"?C.amber:C.text3,fontSize:11,fontWeight:700}},"📖 Basics"),
      React.createElement('button',{onClick:()=>setTab("defend"),style:{flex:1,background:"transparent",border:"none",color:tab==="defend"?C.amber:C.text3,fontSize:11,fontWeight:700}},"🛡️ Defend"),
      React.createElement('button',{onClick:()=>setTab("train"),style:{flex:1,background:"transparent",border:"none",color:tab==="train"?C.amber:C.text3,fontSize:11,fontWeight:700}},"🎓 Training")
    ),
    // Paywall (you can tap Elite to unlock)
    showPay && React.createElement('div',{style:{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"flex-end",background:"rgba(0,0,0,0.8)"}},
      React.createElement('div',{style:{background:"#12151a",borderRadius:"24px 24px 0 0",padding:24,width:"100%"}}, /* paywall content */)
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
