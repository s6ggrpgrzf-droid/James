<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>

  <title>DropPilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet"/>
  <style>*{margin:0;padding:0;}html,body,#root{background:#07080A;width:100%;height:100%;}</style>
</head>
<body>
  <div id="root"></div>
  <script async src="https://js.stripe.com/v3/buy-button.js"></script>
  <script src="data.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react,env">
const {useState,useEffect,useCallback,useRef}=React;

const CSS = `...`; // (your full CSS remains exactly the same)

const LATEST_UPDATE_ID = "2025-01-001";
const UPDATES = [ /* your updates array */ ];

async function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
async function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

const C = { /* your color palette */ };

// ALL YOUR DATA (VIDEOS, ALL_TIPS, LEARN_CATS, MSG_CATS, PLATFORM_*, BASICS_CATS, etc.) — unchanged

// Toast, IntroAnimation, VideoPlayer, and all other components — unchanged

function App() {
  const [tab, setTab] = useState("tips");
  const [navPop, setNavPop] = useState(null);
  function changeTab(id){ setNavPop(id); setTab(id); setTimeout(()=>setNavPop(null),400); }

  const [cfg, setCfg_] = useState({name:""});
  const [pro, setPro] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [showIntro, setShowIntro] = useState(false);
  const [showUpdate, setShowUpdate] = useState(false);
  const [toast, setToast] = useState(null);

  const [showPay, setShowPay] = useState(false);

  // Auto-unlock after Stripe success
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    if (params.get("success") === "true") {
      setPro(true);
      save("dp3-elite", true);
      window.history.replaceState({}, '', window.location.pathname);
      showToast("✅ Elite access unlocked!");
    }
  }, []);

  useEffect(() => {
    Promise.all([ /* your existing load calls */ ]).then(([c,p,seen,updateSeen,...rest]) => {
      setCfg_(c);
      setPro(!!p);
      setLoaded(true);
      if (!seen) setShowIntro(true);
      else if (updateSeen !== LATEST_UPDATE_ID) setShowUpdate(true);
    });
  }, []);

  const setCfg = useCallback(d => { setCfg_(d); save("dp3-cfg", d); }, []);

  function showToast(msg) { setToast(msg); }

  // Your existing functions (logShift, backupData, restoreData, etc.) — unchanged

  if(!loaded) return ( /* your loading screen */ );

  if(showIntro) return <IntroAnimation onDone={()=>{setShowIntro(false);save("dp3-intro-seen",true);}}/>;

  return (
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:430,margin:"0 auto",fontFamily:C.sans,color:C.text,display:"flex",flexDirection:"column"}}>

      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}

      {/* ── Header (Home button REMOVED) ────────────────────────────────── */}
      <div style={{background:"rgba(10,12,16,0.94)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"13px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:60}}>
        <div style={{display:"flex",alignItems:"center",gap:10,userSelect:"none",WebkitUserSelect:"none"}}>
          <div className="glow" style={{width:38,height:38,borderRadius:12,background:`linear-gradient(135deg,${C.amber},${C.amberD})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🚗</div>
          <div>
            <div style={{fontSize:18,fontWeight:900,letterSpacing:"-0.5px",background:`linear-gradient(110deg,${C.text} 40%,${C.amber})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>DropPilot</div>
            <div style={{fontSize:12,color:C.text3,letterSpacing:"1.5px",fontWeight:700}}>DRIVER COMMAND CENTER</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setShowCfg(o=>!o)} aria-label="Settings" style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:17,flexShrink:0}}>⚙️</button>
        </div>
      </div>

      {/* The rest of your app (tabs, content, paywall, bottom nav, etc.) is unchanged */}
      {/* ... your full app code continues here exactly as before ... */}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
  <script>
    if("serviceWorker" in navigator){
      window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js"); });
    }
  </script>
</body>
</html>
