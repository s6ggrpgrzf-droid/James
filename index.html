<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DropPilot</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet"/>

  <style>
    body {
      margin: 0;
      background: #07080A;
      color: #fff;
      font-family: "Outfit", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      padding: 30px;
      border-radius: 16px;
      background: #111317;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      margin: 10px 0;
    }

    button {
      margin-top: 20px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #F5A623;
      color: #000;
      font-weight: 600;
      cursor: pointer;
    }

    input {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- React (no Babel needed) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    const e = React.createElement;
    const { useState, useEffect } = React;

    function App() {
      const [loaded, setLoaded] = useState(false);
      const [code, setCode] = useState("");
      const [unlocked, setUnlocked] = useState(false);
      const [error, setError] = useState("");

      const ACCESS_CODE = "DROP123"; // change this

      useEffect(() => {
        setLoaded(true);
      }, []);

      function handleUnlock() {
        if (code.trim() === ACCESS_CODE) {
          setUnlocked(true);
          setError("");
        } else {
          setError("Invalid code");
        }
      }

      if (!loaded) {
        return e("div", null, "Loading...");
      }

      if (!unlocked) {
        return e("div", { className: "card" },
          e("div", { style: { fontSize: 40 } }, "🚗"),
          e("h1", null, "DropPilot"),
          e("p", null, "Enter access code"),
          e("input", {
            value: code,
            onChange: (ev) => setCode(ev.target.value),
            placeholder: "Enter code"
          }),
          error && e("p", { style: { color: "red" } }, error),
          e("button", { onClick: handleUnlock }, "Unlock")
        );
      }

      return e("div", { className: "card" },
        e("div", { style: { fontSize: 40 } }, "🚗"),
        e("h1", null, "DropPilot"),
        e("p", null, "App is running successfully."),
        e("button", {
          onClick: () => alert("Next step: adding your full features back cleanly.")
        }, "Continue")
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(App));
  </script>
</body>
</html>
