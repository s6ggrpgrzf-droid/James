// ─── Toast ────────────────────────────────────────────────────────────────────
function Toast({msg, onDone}) {
  const [out, setOut] = useState(false);
  useEffect(()=>{
    const t1=setTimeout(()=>setOut(true),1600);
    const t2=setTimeout(()=>onDone(),2000);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[]);
  return(
    <div style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",zIndex:999,pointerEvents:"none",
      background:"rgba(16,185,129,0.95)",borderRadius:16,padding:"14px 24px",
      fontSize:14,fontWeight:800,color:"#000",fontFamily:C.sans,
      animation:out?"toastOut 0.4s ease forwards":"toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards",
      boxShadow:"0 8px 32px rgba(16,185,129,0.5)",whiteSpace:"nowrap"}}>
      ✓ {msg}
    </div>
  );
}

      const elapsed=Date.now()-t0;

function VideoPlayer({video}) {
  const [scene, setScene] = useState(0);
  const [progress, setProgress] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [narOn, setNarOn] = useState(false);
  const elapsed = useRef(0);
  const rafRef = useRef(null);
  const t0Ref = useRef(null);

  useEffect(()=>{
    restart(false);
    return()=>{
      if(rafRef.current)cancelAnimationFrame(rafRef.current);
      window.speechSynthesis && window.speechSynthesis.cancel();
    };
  },[video.id]);

  useEffect(()=>{
    if(!narOn) return;
    const sc = video.scenes[scene];
    if(!sc || !sc.narr) return;
    window.speechSynthesis.cancel();

    const PREFERRED = [
      "Samantha","Karen","Moira","Tessa",
      "Google US English","Google UK English Female",
      "Microsoft Aria Online","Microsoft Jenny Online",
    ];

    function pickVoice(voices){
      // Try exact name matches first
      for(const name of PREFERRED){
        const v = voices.find(v=>v.name===name);
        if(v) return v;
      }
      // Then partial matches — Google, natural, premium, neural
      const fallbacks = [
        v => v.name.includes("Google") && v.name.includes("US") && v.lang.startsWith("en"),
        v => v.name.includes("Google") && v.lang.startsWith("en"),
        v => /natural|premium|neural/i.test(v.name) && v.lang.startsWith("en"),
        v => v.lang==="en-US",
        v => v.lang.startsWith("en"),
      ];
      for(const fn of fallbacks){
        const v = voices.find(fn);
        if(v) return v;
      }
      return null;
    }

    function speak(voice){
      const utt = new SpeechSynthesisUtterance(sc.narr);
      utt.rate = 0.88; utt.pitch = 0.95; utt.volume = 1;
      if(voice) utt.voice = voice;
      window.speechSynthesis.speak(utt);
    }

    // getVoices() is async in most browsers — wait until the list is populated
    function trySpeak(){
      const voices = window.speechSynthesis.getVoices();
      if(voices.length > 0){
        speak(pickVoice(voices));
      } else {
        // Voices not ready yet — listen for when they load
        const handler = ()=>{
          window.speechSynthesis.onvoiceschanged = null;
          const v = window.speechSynthesis.getVoices();
          speak(pickVoice(v));
        };
        window.speechSynthesis.onvoiceschanged = handler;
        // Hard timeout fallback — if onvoiceschanged never fires, speak anyway
        setTimeout(()=>{
          if(window.speechSynthesis.onvoiceschanged===handler){
            window.speechSynthesis.onvoiceschanged = null;
            speak(null);
          }
        }, 1000);
      }
    }

    trySpeak();
  },[scene, narOn]);

  function restart(autoplay=true){
    if(rafRef.current)cancelAnimationFrame(rafRef.current);
    window.speechSynthesis && window.speechSynthesis.cancel();
    elapsed.current=0; t0Ref.current=null;
    setScene(0); setProgress(0); setPlaying(autoplay);
    if(autoplay) rafRef.current=requestAnimationFrame(tick);
  }

  function tick(ts){
    if(!t0Ref.current) t0Ref.current=ts;
    elapsed.current=ts-t0Ref.current;
    setProgress(Math.min(elapsed.current/video.dur*100,100));
    let sc=0;
    for(let i=video.scenes.length-1;i>=0;i--){if(elapsed.current>=video.scenes[i].t){sc=i;break;}}
    setScene(sc);
    if(elapsed.current<video.dur){rafRef.current=requestAnimationFrame(tick);}
    else{setPlaying(false);}
  }

  function togglePlay(){
    if(!playing && elapsed.current>=video.dur){restart(true);return;}
    if(playing){
      cancelAnimationFrame(rafRef.current);
      window.speechSynthesis && window.speechSynthesis.cancel();
      setPlaying(false);
    } else {
      const saved=elapsed.current; t0Ref.current=null;
      rafRef.current=requestAnimationFrame(ts=>{t0Ref.current=ts-saved;tick(ts);});
      setPlaying(true);
    }
  }

  function jumpToScene(si){
    if(rafRef.current)cancelAnimationFrame(rafRef.current);
    window.speechSynthesis && window.speechSynthesis.cancel();
    const targetMs=video.scenes[si].t;
    elapsed.current=targetMs; t0Ref.current=null;
    setScene(si); setProgress(targetMs/video.dur*100);
    const saved=targetMs;
    rafRef.current=requestAnimationFrame(ts=>{t0Ref.current=ts-saved;tick(ts);});
    setPlaying(true);
  }

  const sc=video.scenes[scene];
  const vc=video.color;
  const A="#F5A623",G="#10B981",R="#F43F5E";

  return(
    <div style={{position:"relative",borderRadius:22,overflow:"hidden",background:"#07080A",border:`1px solid ${vc}30`}}>
      <div style={{position:"absolute",top:0,left:0,height:3,width:`${progress}%`,background:`linear-gradient(90deg,${vc},#fff)`,boxShadow:`0 0 8px ${vc}`,transition:"width 0.1s linear",zIndex:10}}/>
      <div style={{minHeight:320,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"28px 22px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-30,width:180,height:180,borderRadius:"50%",background:`radial-gradient(circle,${vc}20,transparent 65%)`,pointerEvents:"none"}}/>
        <div style={{position:"absolute",bottom:-40,left:-20,width:140,height:140,borderRadius:"50%",background:`radial-gradient(circle,${vc}15,transparent 65%)`,pointerEvents:"none"}}/>
        <div key={`${video.id}-${scene}`} style={{position:"relative",zIndex:1,width:"100%",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
          {sc.tag&&<div style={{fontSize:12,fontWeight:800,color:`${vc}CC`,letterSpacing:2,textTransform:"uppercase",animation:"vUp 0.4s cubic-bezier(0.16,1,0.3,1) both"}}>{sc.tag}</div>}
          {sc.emoji&&!sc.stat&&<div style={{fontSize:sc.hed?48:64,animation:"vPop 0.4s 0.1s cubic-bezier(0.34,1.56,0.64,1) both",opacity:0}}>{sc.emoji}</div>}
          {sc.stat&&<div style={{fontSize:72,fontWeight:900,letterSpacing:"-3px",color:G,lineHeight:1,animation:"vPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both"}}>{sc.stat}</div>}
          {sc.statSub&&<div style={{fontSize:18,fontWeight:800,color:"rgba(255,255,255,0.8)",animation:"vUp 0.4s 0.15s both",opacity:0}}>{sc.statSub}</div>}
          {sc.hed&&<div style={{fontSize:sc.hed.length>30?24:30,fontWeight:900,lineHeight:1.2,textAlign:"center",letterSpacing:"-0.8px",background:`linear-gradient(135deg,#fff 30%,${vc})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",whiteSpace:"pre-line",animation:"vUp 0.5s 0.15s cubic-bezier(0.16,1,0.3,1) both",opacity:0}}>{sc.hed}</div>}
          <div style={{width:32,height:2,borderRadius:99,background:`linear-gradient(90deg,${vc},#fff)`,animation:"vFade 0.4s 0.3s both",opacity:0}}/>
          {sc.sub&&<div style={{fontSize:12,color:"rgba(255,255,255,0.55)",textAlign:"center",lineHeight:1.75,animation:"vUp 0.5s 0.3s both",opacity:0}} dangerouslySetInnerHTML={{__html:sc.sub.replace(/\n/g,'<br/>')}}/>}
          {sc.hi&&<div style={{width:"100%",background:`${sc.hi.color}10`,border:`1px solid ${sc.hi.color}40`,borderRadius:12,padding:"11px 14px",animation:"vUp 0.5s 0.45s both",opacity:0}}><div style={{fontSize:12,fontWeight:700,color:sc.hi.color,lineHeight:1.7,whiteSpace:"pre-line"}}>{sc.hi.text}</div></div>}
          {sc.cite&&<div style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontStyle:"italic",textAlign:"center",animation:"vFade 0.4s 0.6s both",opacity:0}}>{sc.cite}</div>}
          {sc.vs&&<div style={{display:"flex",gap:8,width:"100%",animation:"vUp 0.5s 0.3s both",opacity:0}}>
            <div style={{flex:1,background:`${R}10`,border:`1px solid ${R}30`,borderRadius:12,padding:12,textAlign:"center"}}>
              <div style={{fontSize:12,fontWeight:800,color:R,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{sc.vs.bad[0]}</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",fontStyle:"italic",lineHeight:1.5}}>{sc.vs.bad[1]}</div>
            </div>
            <div style={{flex:1,background:`${G}10`,border:`1px solid ${G}30`,borderRadius:12,padding:12,textAlign:"center"}}>
              <div style={{fontSize:12,fontWeight:800,color:G,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{sc.vs.good[0]}</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.7)",fontStyle:"italic",lineHeight:1.5}}>{sc.vs.good[1]}</div>
            </div>
          </div>}
          {sc.why&&<div style={{width:"100%",background:`${sc.why.color}10`,border:`1px solid ${sc.why.color}35`,borderRadius:12,padding:"11px 14px",animation:"vUp 0.5s 0.45s both",opacity:0}}><div style={{fontSize:12,fontWeight:700,color:sc.why.color,lineHeight:1.7}}>{sc.why.text}</div></div>}
          {sc.vs2&&<div style={{display:"flex",flexDirection:"column",gap:8,width:"100%",animation:"vUp 0.5s 0.3s both",opacity:0}}>
            {sc.vs2.map(([e,label,txt,col],i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:`${col}10`,border:`1px solid ${col}25`,borderRadius:12}}>
                <span style={{fontSize:22,flexShrink:0}}>{e}</span>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:800,color:col,marginBottom:3}}>{label}</div><div style={{fontSize:13,color:"rgba(255,255,255,0.55)",lineHeight:1.5}}>{txt}</div></div>
              </div>
            ))}
          </div>}
          {sc.math&&<div style={{display:"flex",flexDirection:"column",gap:7,width:"100%",animation:"vUp 0.5s 0.3s both",opacity:0}}>
            {sc.math.map(([label,val,big],i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:big?"rgba(245,166,35,0.1)":"rgba(255,255,255,0.04)",borderRadius:12,padding:"10px 14px",border:big?"1px solid rgba(245,166,35,0.3)":"1px solid rgba(255,255,255,0.07)"}}>
                <span style={{fontSize:12,color:big?"rgba(255,255,255,0.8)":"rgba(255,255,255,0.5)",fontWeight:big?700:400}}>{label}</span>
                <span style={{fontSize:big?20:15,fontWeight:900,color:A}}>{val}</span>
              </div>
            ))}
          </div>}
          {sc.listBad&&<div style={{display:"flex",flexDirection:"column",gap:7,width:"100%",animation:"vUp 0.5s 0.2s both",opacity:0}}>
            {sc.listBad.map((t,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:`${R}10`,border:`1px solid ${R}25`,borderRadius:12}}>
                <span style={{color:R,fontWeight:900,fontSize:14}}>✗</span><span style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}>{t}</span>
              </div>
            ))}
          </div>}
          {sc.listGood&&<div style={{display:"flex",flexDirection:"column",gap:7,width:"100%",animation:"vUp 0.5s 0.2s both",opacity:0}}>
            {sc.listGood.map(([e,t],i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:`${G}10`,border:`1px solid ${G}25`,borderRadius:12}}>
                <span style={{fontSize:18,flexShrink:0}}>{e}</span><span style={{fontSize:12,color:"rgba(255,255,255,0.8)",fontWeight:600}}>{t}</span>
              </div>
            ))}
          </div>}
          {sc.steps&&<div style={{display:"flex",flexDirection:"column",gap:8,width:"100%",animation:"vUp 0.5s 0.2s both",opacity:0}}>
            {sc.steps.map(([num,txt,col],i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:`${col}10`,border:`1px solid ${col}28`,borderRadius:12}}>
                <div style={{width:26,height:26,borderRadius:"50%",background:`${col}22`,border:`1px solid ${col}60`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:col,flexShrink:0}}>{num}</div>
                <span style={{fontSize:13,color:"rgba(255,255,255,0.8)",fontWeight:600,lineHeight:1.4}}>{txt}</span>
              </div>
            ))}
          </div>}
          {sc.bars&&<div style={{width:"100%",animation:"vUp 0.5s 0.3s both",opacity:0}}>
            {sc.bars.map(([label,stars,pct,col],i)=>(
              <div key={i} style={{marginBottom:i<sc.bars.length-1?14:0}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"rgba(255,255,255,0.45)",marginBottom:6}}><span>{label}</span><span>{stars}</span></div>
                <div style={{background:"rgba(255,255,255,0.07)",borderRadius:99,height:9,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${col},${col}CC)`,borderRadius:99}}/></div>
              </div>
            ))}
          </div>}
          {sc.takeaway&&<div style={{width:"100%",background:`linear-gradient(135deg,${vc}14,${vc}07)`,border:`2px solid ${vc}50`,borderRadius:14,padding:"14px 16px",animation:"vUp 0.5s 0.5s both",opacity:0,textAlign:"center"}}>
            <div style={{fontSize:10,fontWeight:800,color:`${vc}99`,letterSpacing:"2px",textTransform:"uppercase",marginBottom:6}}>Your Takeaway</div>
            <div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.85)",lineHeight:1.65}}>{sc.takeaway}</div>
          </div>}
        </div>
      </div>
      {/* Controls */}
      <div style={{padding:"10px 16px 4px",borderTop:`1px solid ${vc}20`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:10}}>
          {video.scenes.map((_,si)=>(
            <button key={si} onClick={()=>jumpToScene(si)} style={{width:si===scene?20:8,height:8,borderRadius:99,background:si===scene?vc:"rgba(255,255,255,0.15)",border:"none",cursor:"pointer",padding:0,transition:"all 0.2s"}}/>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,paddingBottom:14}}>
          <button onClick={togglePlay} style={{background:`${vc}18`,border:`1px solid ${vc}40`,borderRadius:20,padding:"7px 14px",fontSize:13,fontWeight:700,cursor:"pointer",color:vc,fontFamily:"'Outfit',sans-serif"}}>
            {playing?"⏸ Pause":elapsed.current>=video.dur?"↺ Replay":"▶ Play"}
          </button>
          <button onClick={()=>restart(false)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"7px 12px",fontSize:13,fontWeight:700,cursor:"pointer",color:"rgba(255,255,255,0.5)",fontFamily:"'Outfit',sans-serif"}}>↺</button>
          <button onClick={()=>{
            const next=!narOn;
            setNarOn(next);
            if(!next) window.speechSynthesis && window.speechSynthesis.cancel();
          }} style={{background:narOn?`${vc}20`:"rgba(255,255,255,0.06)",border:`1px solid ${narOn?vc+"50":"rgba(255,255,255,0.1)"}`,borderRadius:20,padding:"7px 12px",fontSize:13,fontWeight:700,cursor:"pointer",color:narOn?vc:"rgba(255,255,255,0.5)",fontFamily:"'Outfit',sans-serif",transition:"all 0.2s"}}>
            {narOn?"🔊 On":"🔇 Off"}
          </button>
          <div style={{flex:1,background:"rgba(255,255,255,0.07)",borderRadius:99,height:4,overflow:"hidden",marginLeft:2}}>
            <div style={{height:"100%",width:`${progress}%`,background:`linear-gradient(90deg,${vc},#fff)`,borderRadius:99,transition:"width 0.1s linear"}}/>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]           = useState("tips");
  const [navPop, setNavPop]     = useState(null);
  function changeTab(id){
    setNavPop(id);
    setTab(id);
    setTimeout(()=>setNavPop(null), 400);
  }
  const [cfg, setCfg_]          = useState({name:""});
  const [pro, setPro]           = useState(false);
  const [loaded, setLoaded]     = useState(false);
  const [showIntro, setShowIntro] = useState(false);
  const [showUpdate, setShowUpdate] = useState(false);
  const [toast, setToast]       = useState(null);

  // Modals
  const [showPay, setShowPay]   = useState(false);
  const [payStep, setPayStep]   = useState("offer");
  const [codeIn, setCodeIn]     = useState("");
  const [codeErr, setCodeErr]   = useState("");
  const [showCfg, setShowCfg]   = useState(false);
  // Secret tap counter for settings
  const tapCount = useRef(0);
  const tapTimer = useRef(null);
  function handleSecretTap(){
    tapCount.current+=1;
    if(tapTimer.current) clearTimeout(tapTimer.current);
    if(tapCount.current>=5){tapCount.current=0;setShowCfg(o=>!o);}
    else{tapTimer.current=setTimeout(()=>{tapCount.current=0;},1500);}
  }

  // Tips state
  const [tipOpen, setTipOpen]   = useState(null);
  const [learnOpen, setLearnOpen] = useState(null);
  const [learnSub, setLearnSub] = useState(null);
  const [favTips, setFavTips]   = useState(new Set());

  // Basics
  const [basicsOpen, setBasicsOpen] = useState(null);
  const [basicsSub, setBasicsSub]   = useState(null);

  // Templates
  const [msgOpen, setMsgOpen]   = useState(null);
  const [subOpen, setSubOpen]   = useState(null);
  const [copied, setCopied]     = useState(null);
  const [templateSearch, setTemplateSearch] = useState("");
  const [favTemplates, setFavTemplates] = useState(new Set());

  // Training
  const [activeVideo, setActiveVideo] = useState(0);

  // Defend
  const [defPlatform, setDefPlatform]   = useState(null);
  const [defSection, setDefSection]     = useState("habits");
  const [appealOpen, setAppealOpen]     = useState(null);
  const [appealSub, setAppealSub]       = useState(null);
  const [checks, setChecks]             = useState([]);
  const [noteInput, setNoteInput]       = useState("");
  const [notes, setNotes]               = useState([]);

  // Track tab
  const [shifts, setShifts]             = useState([]);
  const [shiftInput, setShiftInput]     = useState({tips:"",rating:"",deliveries:"",note:""});
  const [shiftView, setShiftView]       = useState("log"); // log | journal | preshift
  const [journalInput, setJournalInput] = useState("");
  const [journal, setJournal]           = useState([]);
  const [preShift, setPreShift]         = useState([]);

  const STRIPE_LINK = "https://buy.stripe.com/5kQeVd8XofwO78v8ZU48001";

  useEffect(()=>{
    Promise.all([
      load("dp3-cfg",{name:""}),
      load("dp3-elite",false),
      load("dp3-intro-seen",false),
      load("dp3-update-seen",""),
      load("dp3-fav-tips",[]),
      load("dp3-fav-tpl",[]),
      load("dp3-notes",[]),
      load("dp3-shifts",[]),
      load("dp3-journal",[]),
      load("dp3-preshift",[
        {e:"🔋",t:"Phone charged to 100%",done:false},
        {e:"🔌",t:"Car charger packed",done:false},
        {e:"📍",t:"GPS turned on",done:false},
        {e:"🎒",t:"Delivery bag / hot bag ready",done:false},
        {e:"💧",t:"Water bottle packed",done:false},
        {e:"📱",t:"Delivery app logged in and working",done:false},
        {e:"🧾",t:"Gas tank not on empty",done:false},
      ]),
    ]).then(([c,p,seen,updateSeen,ft,ftpl,n,sh,jn,ps])=>{
      setCfg_(c); setPro(!!p); setLoaded(true);
      setFavTips(new Set(ft));
      setFavTemplates(new Set(ftpl));
      setNotes(n);
      setShifts(sh);
      setJournal(jn);
      setPreShift(ps);
      if(!seen){ setShowIntro(true); }
      else if(updateSeen !== LATEST_UPDATE_ID){ setShowUpdate(true); }
    });
  },[]);

  const setCfg = useCallback(d=>{setCfg_(d); save("dp3-cfg",d);},[]);

  function showToast(msg){setToast(msg);}

  async function tryCode(){
    if(!codeIn.trim()){setCodeErr("Please enter your unlock code.");return;}
    const h=await hashCode(codeIn);
    if(h===ELITE_HASH){
      setPro(true); save("dp3-elite",true); setPayStep("done");
    } else {
      setCodeErr("That code isn't correct. Check your receipt email from Stripe.");
    }
  }

  function copyMsg(text,key){
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>{setCopied(key);showToast("Copied to clipboard!");});}
    else{setCopied(key);showToast("Copied to clipboard!");}
  }

  function logShift(){
    if(!shiftInput.tips&&!shiftInput.rating&&!shiftInput.deliveries) return;
    const entry={
      date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),
      time:new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),
      tips:parseFloat(shiftInput.tips)||0,
      rating:parseFloat(shiftInput.rating)||0,
      deliveries:parseInt(shiftInput.deliveries)||0,
      note:shiftInput.note.trim(),
    };
    const updated=[entry,...shifts].slice(0,90);
    setShifts(updated);
    save("dp3-shifts",updated);
    setShiftInput({tips:"",rating:"",deliveries:"",note:""});
    showToast("Shift logged!");
  }

  function addJournal(){
    if(!journalInput.trim()) return;
    const entry={text:journalInput.trim(),date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),time:new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})};
    const updated=[entry,...journal].slice(0,200);
    setJournal(updated);
    save("dp3-journal",updated);
    setJournalInput("");
    showToast("Entry saved!");
  }

  function togglePreShift(i){
    const updated=preShift.map((item,idx)=>idx===i?{...item,done:!item.done}:item);
    setPreShift(updated);
    save("dp3-preshift",updated);
  }

  function resetPreShift(){
    const updated=preShift.map(item=>({...item,done:false}));
    setPreShift(updated);
    save("dp3-preshift",updated);
  }

  const trackLast7=shifts.slice(0,7);
  const trackAvgTips=trackLast7.length?(trackLast7.reduce((a,s)=>a+s.tips,0)/trackLast7.length).toFixed(2):null;
  const trackRated=trackLast7.filter(s=>s.rating>0);
  const trackAvgRating=trackRated.length?(trackRated.reduce((a,s)=>a+s.rating,0)/trackRated.length).toFixed(2):null;
  const trackDeliveries=trackLast7.reduce((a,s)=>a+s.deliveries,0);
  const trackTrendUp=shifts.length>=6&&(shifts.slice(0,3).reduce((a,s)=>a+s.tips,0)/3)>(shifts.slice(3,6).reduce((a,s)=>a+s.tips,0)/3);

  function toggleCheck(i){
    const updated=checks.map((c,idx)=>idx===i?{...c,done:!c.done}:c);
    setChecks(updated);
    if(defPlatform) save(`dp3-checks-${defPlatform}`,updated);
  }

  function selectPlatform(id){
    if(defPlatform===id){setDefPlatform(null);return;}
    setDefPlatform(id);
    setDefSection("habits");
    setAppealOpen(null);
    setAppealSub(null);

                  <button key={i} className={`card-in c${Math.min(i,9)}`} onClick={()=>togglePreShift(i)}
                    style={{background:item.done?`rgba(16,185,129,0.08)`:C.s1,border:`1px solid ${item.done?"rgba(16,185,129,0.3)":C.border}`,borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left",transition:"all 0.18s",boxShadow:item.done?`0 0 14px rgba(16,185,129,0.18)`:"none"}}>
                    <div style={{width:26,height:26,borderRadius:8,border:`2px solid ${item.done?C.green:"rgba(255,255,255,0.15)"}`,background:item.done?C.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.18s"}}>
                      {item.done&&<span style={{color:"#000",fontSize:14,fontWeight:900}}>✓</span>}
                    </div>
                    <span style={{fontSize:14,fontWeight:600,color:item.done?C.green:C.text,flex:1}}>{item.e} {item.t}</span>
                  </button>
                ))}
                <div style={{display:"flex",gap:8,marginTop:4}}>
                  <button onClick={resetPreShift} style={{flex:1,background:"transparent",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"12px",fontSize:13,fontWeight:700,cursor:"pointer",color:C.text3}}>Reset for Next Shift</button>
                  {preShift.filter(i=>i.done).length===preShift.length&&preShift.length>0&&(
                    <div style={{flex:1,background:`rgba(16,185,129,0.1)`,border:`1px solid rgba(16,185,129,0.3)`,borderRadius:12,padding:"12px",textAlign:"center",fontSize:13,fontWeight:800,color:C.green}}>🚀 Ready to roll!</div>
                  )}
                </div>
              </div>
            )}

            {/* ── SHIFT JOURNAL ── */}
            {shiftView==="journal"&&(
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={{background:`rgba(59,130,246,0.07)`,border:`1px solid rgba(59,130,246,0.2)`,borderRadius:12,padding:"11px 14px",display:"flex",gap:10,alignItems:"flex-start"}}>
                  <span style={{fontSize:18,flexShrink:0}}>📓</span>
                  <div style={{fontSize:13,color:C.text2,lineHeight:1.65}}>Record how your shifts go. What worked, what didn't, anything worth remembering. Only you can see this.</div>
                </div>
                <textarea
                  value={journalInput}
                  onChange={e=>setJournalInput(e.target.value)}
                  placeholder={"e.g. Good shift tonight — the arrival text trick worked on almost every delivery. One customer was upset about cold food, used the recovery script and they seemed fine. Trying the two-handed handoff starting tomorrow."}
                  rows={4}
                  style={{background:C.s1,border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"12px 14px",color:C.text,fontSize:13,resize:"none",lineHeight:1.7,width:"100%"}}
                />
                <button onClick={addJournal} style={{background:`linear-gradient(135deg,${C.blue},#1d4ed8)`,border:"none",borderRadius:12,padding:"13px",fontSize:14,fontWeight:800,cursor:"pointer",color:"#fff",boxShadow:`0 4px 16px rgba(59,130,246,0.3)`}}>Save Entry</button>

                {journal.length===0&&(
                  <div style={{textAlign:"center",padding:"28px 16px",color:C.text3,fontSize:13,background:C.s1,borderRadius:16}}>
                    <div style={{fontSize:32,marginBottom:10}}>📓</div>
                    <div style={{fontWeight:700,color:C.text2,marginBottom:4}}>No entries yet</div>
                    <div>Write your first entry above. Even one sentence per shift makes a difference.</div>
                  </div>
                )}

                {journal.map((entry,i)=>(
                  <div key={i} className={`card-in c${Math.min(i,9)}`} style={{background:C.s1,border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"13px 15px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <div style={{fontSize:11,color:C.text3,fontWeight:600}}>{entry.date} · {entry.time}</div>
                      <button onClick={()=>{const u=journal.filter((_,idx)=>idx!==i);setJournal(u);save("dp3-journal",u);}} style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:15,padding:"0 2px"}}>✕</button>
                    </div>
                    <div style={{fontSize:13,color:C.text,lineHeight:1.75}}>{entry.text}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

      </div>

      {/* ── Elite content notice ── */}
      {pro&&(
        <div style={{position:"fixed",bottom:56,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:49,pointerEvents:"none"}}>
          <div style={{margin:"0 16px",background:"rgba(7,8,10,0.85)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",borderTop:"1px solid rgba(255,255,255,0.05)",padding:"5px 16px",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <span style={{fontSize:10,color:"rgba(255,255,255,0.18)",fontWeight:700,letterSpacing:"0.5px"}}>🔒 Elite content · For your personal use only · Please don't share</span>
          </div>
        </div>
      )}

      {/* ── Bottom Nav ──────────────────────────────────────────────────────── */}
      <nav role="navigation" aria-label="Main navigation" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(8,10,13,0.96)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",zIndex:100,paddingBottom:6,paddingTop:4}}>
        {[{id:"tips",l:"Earn",e:"⭐",ac:C.amber},{id:"templates",l:"Scripts",e:"💬",ac:C.blue},{id:"track",l:"Track",e:"📊",ac:C.green},{id:"defend",l:"Defend",e:"🛡️",ac:C.purple},{id:"basics",l:"Basics",e:"📖",ac:C.teal},{id:"train",l:"Training",e:"🎓",ac:C.amber}].map(n=>{
          const active=tab===n.id;
          const popping=navPop===n.id;
          return(
            <button key={n.id} onClick={()=>changeTab(n.id)} aria-label={n.l} aria-current={active?"page":undefined} style={{flex:1,background:"transparent",border:"none",cursor:"pointer",padding:"5px 0 3px",display:"flex",flexDirection:"column",alignItems:"center",gap:1,position:"relative",transition:"all 0.18s"}}>
              {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:2,borderRadius:"0 0 4px 4px",background:n.ac,boxShadow:`0 0 8px ${n.ac}`}}/>}
              <div className={popping?"nav-pop":""} style={{width:36,height:26,borderRadius:9,background:active?`${n.ac}18`:"transparent",border:active?`1px solid ${n.ac}30`:"1px solid transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.18s,border 0.18s"}}>
                <span style={{fontSize:active?16:14,transition:"font-size 0.18s"}}>{n.e}</span>
              </div>
              <span style={{fontSize:9,fontWeight:active?800:600,color:active?n.ac:C.text3,fontFamily:C.sans,letterSpacing:"0.1px"}}>{n.l}</span>
            </button>
          );
        })}
      </nav>

      {/* ── What's New Modal ───────────────────────────────────────────────── */}
      {showUpdate&&(
        <div style={{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={()=>{setShowUpdate(false);save("dp3-update-seen",LATEST_UPDATE_ID);}} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.78)"}}/>
          <div style={{position:"relative",background:`linear-gradient(180deg,${C.s2},${C.s1})`,borderTop:"1px solid rgba(255,255,255,0.08)",borderRadius:"24px 24px 0 0",padding:24,paddingBottom:44,width:"100%",maxWidth:430,zIndex:1,maxHeight:"80vh",overflowY:"auto"}}>
            <div style={{width:40,height:4,borderRadius:99,background:"rgba(255,255,255,0.15)",margin:"0 auto 22px"}}/>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
              <div style={{width:44,height:44,borderRadius:13,background:`linear-gradient(135deg,${C.amber},${C.amberD})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🚗</div>
              <div>
                <div style={{fontSize:11,fontWeight:800,color:C.amber,letterSpacing:"2px",textTransform:"uppercase",marginBottom:2}}>What's New</div>
                <div style={{fontSize:20,fontWeight:900,letterSpacing:"-0.5px"}}>DropPilot Update</div>
              </div>
            </div>
            {UPDATES.map((u,ui)=>(
              <div key={ui} style={{marginBottom:ui<UPDATES.length-1?22:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:800,color:C.text3,letterSpacing:"1.5px",textTransform:"uppercase"}}>{u.date}</div>
                  <div style={{flex:1,height:1,background:"rgba(255,255,255,0.06)"}}/>
                </div>
                <div style={{fontSize:15,fontWeight:800,marginBottom:10,color:C.text}}>{u.title}</div>
                <div style={{display:"flex",flexDirection:"column",gap:7}}>
                  {u.items.map((item,ii)=>(
                    <div key={ii} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:11}}>
                      <div style={{width:6,height:6,borderRadius:"50%",background:C.amber,flexShrink:0,marginTop:5}}/>
                      <div style={{fontSize:13,color:C.text2,lineHeight:1.55}}>{item}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
            <button onClick={()=>{setShowUpdate(false);save("dp3-update-seen",LATEST_UPDATE_ID);}} style={{background:`linear-gradient(135deg,${C.amber},${C.amberD})`,border:"none",borderRadius:14,padding:"15px",fontSize:15,fontWeight:800,cursor:"pointer",width:"100%",color:"#000",marginTop:22}}>Got it →</button>
          </div>
        </div>
      )}

      {showPay&&(
        <div style={{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={()=>{setShowPay(false);setPayStep("offer");setCodeIn("");setCodeErr("");}} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.78)"}}/>
          <div style={{position:"relative",background:"linear-gradient(180deg,#12151a,#0d0f13)",borderTop:"1px solid rgba(255,255,255,0.08)",borderRadius:"24px 24px 0 0",padding:24,paddingBottom:40,width:"100%",maxWidth:430,zIndex:1,maxHeight:"88vh",overflowY:"auto"}}>
            <div style={{width:40,height:4,borderRadius:99,background:"rgba(255,255,255,0.15)",margin:"0 auto 22px"}}/>

            {payStep==="offer"&&(
              <div>
                <div style={{textAlign:"center",marginBottom:20}}>
                  <div style={{fontSize:44,marginBottom:10}}>⚡</div>
                  <div style={{fontSize:23,fontWeight:900,marginBottom:6}}>Become Elite</div>
                  <div style={{fontSize:14,color:C.text2,lineHeight:1.7}}>One-time $7. Lifetime access. Every update included free.</div>
                </div>
                <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:16,marginBottom:18}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:12,marginBottom:14,borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                    <span style={{fontSize:15,fontWeight:700}}>Elite Access</span>
                    <span style={{fontSize:24,fontWeight:900,color:C.amber,fontFamily:C.mono}}>$7</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:9}}>
                    {[["💬","30 message scripts — one tap to copy, ready to send"],["🛡️","Appeal letters for false complaints & unfair ratings"],["🎓","6 training videos on psychology & what actually earns tips"],["📖","Full beginner guide — all 4 platforms explained simply"],["🧠","Deeper learning — tip science, de-escalation & more"],["📊","Shift tracker, pre-shift checklist & shift journal"]].map(([e,f],i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:10,fontSize:13,color:C.text2}}>
                        <span style={{fontSize:15,flexShrink:0}}>{e}</span>{f}
                      </div>
                    ))}
                  </div>
                </div>
                {/* Stripe Buy Button - stays on page */}
                <div style={{marginBottom:8,borderRadius:16,overflow:"hidden"}}>
                  <stripe-buy-button
                    buy-button-id="buy_btn_1TDdtnFiKgrWyiUSvZdQ3WUq"
                    publishable-key="pk_live_51TDCUPFiKgrWyiUST12cAEZcdXtQgUcvVIaLtvN5FxHx1egK06TeD4loMiQD8TdEKLT3sXumDSBVQEJsGvrjhU3I00AHUtMsVD"
                  />
                </div>
                <div style={{textAlign:"center",fontSize:12,color:C.text3,marginBottom:20}}>Secure checkout · Lifetime access · Free updates forever</div>
                <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:16}}>
                  <div style={{fontSize:13,color:C.text2,fontWeight:700,marginBottom:8}}>Already paid? Enter your unlock code:</div>
                  <input value={codeIn} onChange={e=>{setCodeIn(e.target.value);setCodeErr("");}} placeholder="Enter code from your receipt..." style={{background:"rgba(0,0,0,0.3)",border:`1.5px solid ${codeErr?"rgba(244,63,94,0.6)":"rgba(255,255,255,0.1)"}`,borderRadius:12,padding:"13px",color:C.text,fontSize:15,width:"100%",marginBottom:8}}/>
                  {codeErr&&<div style={{fontSize:12,color:C.red,marginBottom:8}}>{codeErr}</div>}
                  <button onClick={tryCode} style={{background:C.green,border:"none",borderRadius:12,padding:"14px",fontSize:14,fontWeight:800,cursor:"pointer",width:"100%",color:"#000",marginBottom:10}}>Unlock with Code</button>
                  <button onClick={()=>setPayStep("restore")} style={{background:"transparent",border:"none",color:C.text3,cursor:"pointer",fontSize:12,width:"100%",padding:"4px"}}>Lost your code? Restore purchase →</button>
                </div>
              </div>
            )}

            {payStep==="code"&&(
              <div>
                <div style={{textAlign:"center",marginBottom:20}}>
                  <div style={{fontSize:44,marginBottom:10}}>💳</div>
                  <div style={{fontSize:20,fontWeight:900,marginBottom:8}}>Finish Your Payment</div>
                  <div style={{fontSize:13,color:C.text2,lineHeight:1.7,marginBottom:16}}>Stripe opened in a new tab. After paying, Stripe emails you a receipt with your unlock code.</div>
                  <button onClick={()=>window.open(STRIPE_LINK,"_blank")} style={{background:"rgba(59,130,246,0.12)",border:"1px solid rgba(59,130,246,0.3)",borderRadius:12,padding:"10px 20px",color:C.blue,cursor:"pointer",fontSize:13,fontWeight:700,marginBottom:20}}>Reopen Stripe</button>
                </div>
                <input value={codeIn} onChange={e=>{setCodeIn(e.target.value);setCodeErr("");}} placeholder="Enter unlock code from receipt..." style={{background:"rgba(0,0,0,0.3)",border:`1.5px solid ${codeErr?"rgba(244,63,94,0.6)":"rgba(255,255,255,0.1)"}`,borderRadius:12,padding:"14px",color:C.text,fontSize:15,width:"100%",marginBottom:8}}/>
                {codeErr&&<div style={{fontSize:12,color:C.red,marginBottom:8}}>{codeErr}</div>}
                <button onClick={tryCode} style={{background:C.green,border:"none",borderRadius:14,padding:"15px",fontSize:15,fontWeight:800,cursor:"pointer",width:"100%",color:"#000",marginBottom:10}}>Unlock Full Access</button>
                <button onClick={()=>setPayStep("offer")} style={{background:"transparent",border:"none",color:C.text3,cursor:"pointer",fontSize:13,width:"100%",padding:"8px"}}>← Go back</button>
              </div>
            )}

            {payStep==="restore"&&(
              <div>
                <div style={{textAlign:"center",marginBottom:20}}>
                  <div style={{fontSize:44,marginBottom:10}}>📧</div>
                  <div style={{fontSize:20,fontWeight:900,marginBottom:8}}>Lost Your Code?</div>
                  <div style={{fontSize:13,color:C.text2,lineHeight:1.75}}>Check your Stripe receipt email first — the unlock code is in there. Can't find it? Email us directly and we'll sort it out fast.</div>
                </div>
                <div style={{background:"rgba(59,130,246,0.07)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:14,padding:"16px 18px",marginBottom:16,textAlign:"center"}}>
                  <div style={{fontSize:13,color:C.text2,marginBottom:8}}>Email us with your Stripe receipt and we'll send your code:</div>
                  <a href="mailto:support@droppilot.app" style={{fontSize:15,fontWeight:800,color:C.blue,textDecoration:"none"}}>support@droppilot.app</a>
                </div>
                <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:16,marginBottom:12}}>
                  <div style={{fontSize:13,color:C.text2,fontWeight:700,marginBottom:8}}>Or enter your code if you have it:</div>
                  <input value={codeIn} onChange={e=>{setCodeIn(e.target.value);setCodeErr("");}} placeholder="Enter unlock code..." style={{background:"rgba(0,0,0,0.3)",border:`1.5px solid ${codeErr?"rgba(244,63,94,0.6)":"rgba(255,255,255,0.1)"}`,borderRadius:12,padding:"13px",color:C.text,fontSize:15,width:"100%",marginBottom:8}}/>
                  {codeErr&&<div style={{fontSize:12,color:C.red,marginBottom:8}}>{codeErr}</div>}
                  <button onClick={tryCode} style={{background:C.green,border:"none",borderRadius:12,padding:"13px",fontSize:14,fontWeight:800,cursor:"pointer",width:"100%",color:"#000"}}>Unlock with Code</button>
                </div>
                <button onClick={()=>setPayStep("offer")} style={{background:"transparent",border:"none",color:C.text3,cursor:"pointer",fontSize:13,width:"100%",padding:"8px"}}>← Go back</button>
              </div>
            )}

            {payStep==="done"&&(
              <div style={{textAlign:"center",padding:"10px 0"}}>
                <div style={{fontSize:64,marginBottom:14}}>🎉</div>
                <div style={{fontSize:26,fontWeight:900,marginBottom:8,background:`linear-gradient(135deg,${C.text} 20%,${C.amber})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>You're Elite.</div>
                <div style={{fontSize:14,color:C.text2,marginBottom:10,lineHeight:1.75}}>Welcome to the full DropPilot system. Every script, video, defense tool, and update we ever ship — yours forever.</div>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24,textAlign:"left"}}>
                  {[["💬","Start with Scripts — copy a message before your next delivery"],["🛡️","Check Defend — set up your platform habits now"],["📖","New to this? Start in Basics"],["📊","Log your first shift in Track to start measuring progress"]].map(([e,f],i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:"rgba(245,166,35,0.06)",borderRadius:10,padding:"10px 13px",border:"1px solid rgba(245,166,35,0.12)"}}>
                      <span style={{fontSize:15,flexShrink:0}}>{e}</span>
                      <span style={{fontSize:13,color:C.text2}}>{f}</span>
                    </div>
                  ))}
                </div>
                <button onClick={()=>{setShowPay(false);setPayStep("offer");setTab("templates");}} style={{background:`linear-gradient(135deg,${C.amber},${C.amberD},${C.amberL})`,border:"none",borderRadius:16,padding:"16px",fontSize:16,fontWeight:800,cursor:"pointer",width:"100%",color:"#000",boxShadow:"0 6px 24px rgba(245,166,35,0.4)",marginBottom:10}}>Go to Scripts →</button>
                <button onClick={()=>{setShowPay(false);setPayStep("offer");}} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%",color:C.text2}}>Explore the App</button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}

  </script>
</body>
