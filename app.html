async function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
async function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch(e){console.warn("Save failed:",k,e);return false;}}

// ─── Free Tips ────────────────────────────────────────────────────────────────
const ALL_TIPS = [
  {e:"👋",t:"Greet with a smile",s:"First impressions decide your rating.",d:"Make brief eye contact and say something simple — 'Hi, here's your order!' You don't need to be chatty. Just be warm. Customers rate drivers who feel like real people much higher than ones who silently hand over the bag and walk away."},
  {e:"🔔",t:"Don't knock on contactless orders",s:"This is one of the top causes of surprise 1-star ratings.",d:"If the customer chose Leave at Door, do NOT knock or ring the bell. Set the food down neatly, take a photo, and mark it delivered. The customer chose contactless for a reason. Respecting that choice shows you read their instructions — and that earns 5 stars."},
  {e:"📸",t:"Take a photo on every single delivery",s:"Your photo is your protection. No exceptions.",d:"Take a clear photo that shows the food AND the door or house number together. This protects you if a customer ever says they didn't get their order. Make it a habit every single time — good weather, bad weather, day or night."},
  {e:"💬",t:"Text when you're 3-4 minutes away",s:"This one message earns more 5-star ratings than almost anything else.",d:"A quick heads-up like 'Hi! About 3 minutes away with your order!' sets a professional tone before you even arrive. Customers who know you're coming almost always rate higher. It only takes 10 seconds to send."},
  {e:"🌡️",t:"Handle the food like it's your own meal",s:"How you carry the bag tells them everything.",d:"Hot food should arrive hot. Bags shouldn't be crushed. Drinks should be upright. These small details tell the customer whether you cared. The drivers who treat every order carefully are the ones who get the best tips."},
  {e:"⚡",t:"Always double-check the address before you walk up",s:"Speed means nothing if you're at the wrong door.",d:"A delivery to the wrong address is one of the fastest ways to lose your account. Take 5 seconds to confirm the address before you get out of your car. That 5 seconds protects your entire standing on the platform."},
  {e:"🤐",t:"Never complain to the customer",s:"Your bad day is not their problem.",d:"Long restaurant wait, bad traffic, app issues — the customer didn't cause any of it and doesn't want to hear about it. Keep every interaction warm and professional no matter how the shift is going. They're just happy their food arrived."},
  {e:"🎁",t:"Small extras earn bigger tips",s:"Extra napkins. A level bag. A steady hand. It adds up.",d:"Grabbing a few extra napkins, keeping the bag level, making sure drinks are secured — none of these take more than a few seconds. But customers notice, and they tip the drivers who clearly paid attention."},
  {e:"🚪",t:"Contactless means zero contact",s:"No knock. No ring. Just deliver cleanly.",d:"Leave at Door means exactly that. Set the food down neatly, take your photo, and confirm the delivery. A knock on a contactless order is one of the most common reasons good drivers get unexpected 1-star ratings."},
  {e:"📞",t:"When something goes wrong, text first",s:"One proactive message prevents a bad review.",d:"Gate code missing? Can't find the unit? Nobody answering? Always text before you call or leave. A calm, simple text gives the customer a chance to help — and it shows you tried. That effort almost always protects your rating."},
];

// ─── Educational Content ──────────────────────────────────────────────────────
const LEARN_CATS = [
  {
    e:"🧠", t:"Reading People", sub:"Simple psychology you can use right now", free:true,
    secs:[
      {h:"The 2 Moments That Decide Your Rating", body:"People don't judge a delivery by the whole experience. They remember two things: the moment you handed them their food, and the last thing you said before you left. That's it. If you nail those two moments, customers will rate you 5 stars even after a long wait. Focus every delivery on two things: a great handoff and a warm goodbye.", tip:"Before every delivery, remind yourself: handoff and goodbye. Those two moments decide almost everything."},
      {h:"Use Their First Name — Once", body:"Your app shows you the customer's first name. Most drivers never use it. Big mistake. Hearing your own name makes people feel seen instead of just handled. Use it exactly once: 'Here you go, Marcus — enjoy your meal!' That's all it takes. Once feels warm and personal. Twice feels weird. Three times feels creepy.", tip:"Try it on your next 5 deliveries. You'll notice the difference immediately."},
      {h:"Match How They Talk to You", body:"Some customers text casually: 'yo food almost here??' Others are more formal: 'Could you provide an estimated arrival time?' Most drivers send the same message to everyone. That's a mistake. When you match someone's style, they feel understood without knowing why. Casual customer → casual reply. Formal customer → polite reply. It takes 3 extra seconds and it works.", tip:"Read their texts or delivery notes before you arrive. It tells you everything about how they want to be talked to."},
    ]
  },
  {
    e:"🚪", t:"At The Door", sub:"Small habits that change how customers see you", free:true,
    secs:[
      {h:"Where to Stand When the Door Opens", body:"Don't stand dead center in the doorway — it feels aggressive, like you're blocking them. Stand slightly to the side instead. Hold the bag out. This position says 'I'm here to give you something' not 'I'm in your way.' If there are steps, stand one step below the top. Being slightly lower than the customer feels natural and friendly.", tip:"Practice this on your next door delivery. You'll see customers visibly relax."},
      {h:"How You Hold the Bag Matters More Than You Think", body:"One hand, bag swinging at your side = it looks like you're carrying garbage. Two hands, bag level, held at chest height = it shows you cared about their food the whole way here. Customers notice this even when they don't realize they're noticing it. For anything with drinks — always two hands, always level. The extra 5 seconds is worth every penny of the tip.", tip:"Two hands, chest height. Make it your default. No exceptions on drinks."},
      {h:"Wait One Beat Before You Leave", body:"After you hand over the bag and say goodbye, pause for half a second. Make brief eye contact one more time. Then leave. This tiny pause makes customers feel like the delivery was a real human interaction — not just a bag being dropped off by a stranger in a hurry. Drivers who do this are described as 'really nice.' Drivers who don't are described as 'rushed' — even when times were identical.", tip:"Count 'one' in your head after your sign-off. Then go."},
    ]
  },
  {
    e:"🔥", t:"Handling Difficult Situations", sub:"What to say when things go wrong", free:false,
    secs:[
      {h:"The 3-Step Formula When Someone Is Upset", body:"When a customer is frustrated, use this: Step 1 — 'I understand how you feel.' This shows you heard them. Step 2 — 'A lot of customers feel the same way.' This makes their frustration feel normal, not dramatic. Step 3 — 'What I've found is...' — now give them a next step. Example for a late delivery: 'I completely understand how you feel — waiting is frustrating. A lot of customers feel the same after a long wait. What I've found is that a quick message to support usually fixes this fast.' You're not saying it's your fault. You're saying their frustration makes sense. That's all they need.", tip:"Memorize: Feel, Felt, Found. Three steps. Works every time."},
      {h:"Slow Down When Someone Is Angry", body:"When a customer is angry, your brain wants to talk faster to explain yourself. Don't. Slow down instead. Take a breath before you respond. Lower your voice slightly. This works because calm is contagious — just like anger is. You can't out-argue an angry person. But you can out-calm them. Don't interrupt. Don't list reasons it isn't your fault. Just be steady and slow. Most people will follow your lead within 30 seconds.", tip:"The moment you feel defensive, that's your cue to speak slower and quieter — not faster and louder."},
      {h:"When the Customer Is Wrong — And You Can't Say So", body:"Sometimes a customer insists something happened that you know didn't. You cannot tell them they're wrong — that just creates a fight you can't win. Instead, redirect them to support. 'I'm really sorry to hear that — reach out to [platform] support directly. They deal with this all the time and they'll make it right fast.' You're not admitting fault. You're not arguing. You're pointing them at the fastest solution. That's the only smart move here.", tip:"Your job is not to win the argument. Your job is to end the interaction with a calm customer who has a path forward."},
    ]
  },
  {
    e:"💰", t:"The Science of Tips", sub:"Why people tip — and how to make it happen", free:false,
    secs:[
      {h:"The Two-Handed Handoff", body:"Research on service and tipping found that a brief, real moment of physical exchange during a transaction increases tips significantly. You can't manufacture extra contact at someone's door. But a two-handed bag presentation is the delivery version of this. When you use two hands to present the bag — facing the customer, at chest height — it creates a real exchange instead of a drop-off. Customers feel the difference without knowing why. Try it for one week straight and track your tips.", tip:"Two hands every time. It's not just about the bag staying level — it's about what it communicates."},
      {h:"Mention the Bad Weather", body:"Studies show that briefly mentioning the weather in an empathetic way — not complaining, just acknowledging — increases tips. 'Stayed moving fast for you out there — cold one tonight!' Or: 'Kept it as dry as I could!' This works because it creates a human moment. You went through something to get their food here. Saying it (without whining) makes customers feel grateful. The key is empathy, not complaint. Empathy earns tips. Complaints ask for sympathy. Those are very different things.", tip:"One sentence. Warm, not whiny. 'Kept it moving fast for you out there!'"},
      {h:"Small Unexpected Extras Trigger Tipping", body:"When someone gives you something you didn't expect — even something tiny — you feel an urge to give something back. This is one of the most reliable patterns in human behavior. Extra napkins you grabbed = unexpected gift. Keeping drinks perfectly upright and mentioning it = unexpected gift. A warm confirmation text after a drop-off = unexpected gift. Here's the key: you have to mention it out loud. 'Grabbed a few extra napkins in case you need them!' If you don't say it, they might not notice. If you do, you've created a gift — and gifts make people tip.", tip:"The mention is as important as the gesture. Say it out loud."},
      {h:"Protecting Tips That Were Pre-Set", body:"Many platforms now let customers tip before the delivery. That tip was based on their hope that you'd do a good job. Your job is to confirm that hope. A customer who pre-tipped and then gets a warm handoff and a clean drop-off photo almost never changes their tip. A customer who pre-tipped and feels like their food was handled carelessly sometimes does. Every delivery, you're either confirming or breaking the promise they made when they added that tip.", tip:"Think of every delivery as confirming a promise the customer already made when they tipped upfront."},
    ]
  },
  {
    e:"📋", t:"Recovery Scripts", sub:"Exactly what to say when there's a problem", free:false,
    secs:[
      {h:"Cold Food — Without Blaming the Restaurant", body:"Cold food is almost always the restaurant's fault — but saying that out loud makes the customer feel like you're making excuses. Don't do it. Instead: 'I'm really sorry about that. I'd contact [platform] support directly — they take temperature issues seriously and usually fix it fast.' You're not taking the blame. You're giving them the fastest path to a solution. That's what they actually want.", tip:"Never say 'the restaurant had it sitting out.' Even if it's true. Redirect to support every time."},
      {h:"Missing Item — What Not to Say", body:"Never say 'I checked the bag and everything was in there.' Even if you believe it. The moment you say that, you're in an unwinnable argument. Instead: 'I'm so sorry — I picked up the sealed bag right from the restaurant. The fastest fix is to contact [platform] support right now — they'll sort it out for you.' Let the platform handle it. That's literally what they're there for. Your rating stays clean and the customer gets their problem solved.", tip:"Never claim you checked the bag. Always redirect to support. Every time."},
      {h:"When You Actually Made the Mistake", body:"If the mistake was genuinely yours — wrong address, took too long, dropped something — own it fully and briefly. 'That was completely my fault and I'm sorry. I should have [done X] and I didn't.' Then stop talking. No 'but traffic was bad.' No 'my app was glitching.' Full ownership, no excuses, short. Studies on customer service show that customers rate a service higher after a mistake that's handled with real ownership than after a delivery where nothing went wrong at all. Own it and they'll respect you for it.", tip:"Own it fully. One sentence. Then stop. No explanations."},
    ]
  },
  {
    e:"🗺️", t:"Know Your Delivery", sub:"Different situations need different approaches", free:false,
    secs:[
      {h:"Grocery Orders vs. Restaurant Orders — Very Different", body:"Restaurant customers want their food fast and hot. That's it. Be efficient and warm. Grocery customers are completely different — they care about whether you picked good produce, whether you handled their eggs carefully, and whether you communicated about anything that was out of stock. They're stocking their kitchen, not feeding a craving right now. With grocery: be thorough, communicate everything, handle items with care. With restaurant: be fast, keep it warm, nail the handoff.", tip:"Ask yourself before each delivery: is this a 'speed and warmth' order or a 'care and communication' order?"},
      {h:"Apartments vs. Houses", body:"Houses are straightforward: walk to the door like you belong there, knock once, step back, wait. If contactless: place the bag neatly, photograph the door number, confirm. Apartments are completely different. Always text before trying to get in: 'Hi! At the main entrance with your order — could you buzz me in or meet me in the lobby?' Never stand silently outside. The customer has no idea you're there. If you can't get in, say so immediately. Quick communication in apartments earns better ratings than a slow, silent delivery every single time.", tip:"Apartment rule: text first, always. Don't assume — communicate."},
      {h:"Time of Day Changes Everything", body:"Lunch (11am–2pm): Customers are on a work break. Be fast. Keep it brief. Dinner (5pm–9pm): Customers are relaxed at home. Warmth matters most here. A genuine 'enjoy your meal' earns more at dinner than any other time. Late night (10pm–2am): Be quiet. No loud knocks. Clean drop, good photo, fast confirm. These customers tip well when you exceed their low expectations. Morning (5am–10am): Be upbeat. The bar is low early in the day and a little friendliness stands out.", tip:"Read the time like it's an instruction. It tells you how to adjust your approach before you even arrive."},
    ]
  },
  {
    e:"🏆", t:"Staying Sharp", sub:"How to keep earning more over the long run", free:true,
    secs:[
      {h:"Every Delivery Is a Fresh Start", body:"In a regular job, one bad day doesn't ruin your whole career. In gig delivery, every single order is rated on its own — by a different person who knows absolutely nothing about your last delivery. That's actually good news. A bad delivery doesn't have to affect the next one — unless you carry the frustration with you. The most valuable skill in this job isn't driving. It's starting fresh every single time.", tip:"The customer you're about to deliver to has never met you. They're ready to give you 5 stars. Don't bring someone else's frustration to their door."},
      {h:"The 60-Second Reset Between Bad Deliveries", body:"After a rough delivery, take 60 seconds before accepting the next order. Don't look at your rating. Don't replay what happened. Do this: 1. Breathe. It's over. You can't change it. 2. Remind yourself the next customer is a completely different person. 3. Pick one small thing to do well on the next delivery — just one. That's the whole reset. Drivers who do something like this are more consistent, rate higher, and earn more over time. 60 seconds is worth it.", tip:"Set one small intention before each delivery. 'I'm going to nail the handoff on this one.'"},
      {h:"Burnout Warning Signs", body:"Burnout doesn't usually hit all at once. It sneaks up. Watch for these: You stop texting customers proactively. The bag handoff becomes a drop-and-go. Low ratings make you angry instead of motivated. You're not making eye contact at the door anymore. If any of these sound familiar, the fix is usually not quitting — it's adjusting. Fewer hours. A different zone. Tracking your weekly tip average instead of every single rating. Consistency over time is where the real money is.", tip:"Track your weekly tip average — not individual ratings. Trends motivate. Single data points just hurt."},
    ]
  },
];

// ─── Message Templates ────────────────────────────────────────────────────────
const MSG_CATS = [
  {e:"📲",t:"What to Say When You Arrive",sub:"Texts that get 5-star ratings",secs:[
    {h:"Standard arrival",msg:"Hey! Pulling up now with your order from [restaurant]. I'll leave it at your door. Enjoy! 😊",w:"Sets expectations before they open the app. Customers often rate you before they even see the food."},
    {h:"A few minutes away",msg:"Hi! Just a heads up — about 3-4 minutes away with your food. See you soon!",w:"Advance notice means they meet you at the door or are ready when you arrive. Cuts your wait time too."},
    {h:"Apartment building",msg:"Hi! I'm at the main entrance with your order. Could you buzz me in or meet me at the lobby? Thanks!",w:"Always text before calling for apartments. Most people respond in under 30 seconds when their food is outside."},
    {h:"Leave at door confirmation",msg:"Your order has been left at your door. Enjoy your meal! 🍕",w:"A quick confirmation nearly eliminates false non-delivery complaints."},
    {h:"Office or business",msg:"Hi! Downstairs at [building] with your order. Happy to leave it at the front desk or you can meet me!",w:"Offering options signals professionalism and saves you a wasted trip."},
  ]},
  {e:"⏰",t:"When You Are Running Late",sub:"How to turn a bad situation into a 5-star",secs:[
    {h:"Restaurant taking forever",msg:"Hey! Your order is still being prepared at the restaurant. I'm here and will head your way as soon as it's ready. Thanks for your patience!",w:"Customers who hear nothing assume you forgot them. One text flips that completely. 'Thanks for your patience' credits the customer — 'sorry for the wait' puts you in a guilty position for something that isn't your fault."},
    {h:"Stuck in traffic",msg:"Hi! Running a little behind due to traffic. On my way and will be there as soon as I can — thanks for your patience!",w:"Never blame the app or restaurant. Own it briefly and stay positive."},
    {h:"Significantly late",msg:"Hi! Really sorry for the delay tonight. Dealing with [traffic / long restaurant wait] and I'll be there in about [X] minutes. I truly appreciate your patience.",w:"Bigger delays need a bigger acknowledgment. Be direct, give a real ETA."},
    {h:"Follow up after a late delivery",msg:"Just dropped off your order — really sorry for the wait tonight. Hope everything still tastes great! Have a good evening.",w:"Almost no drivers do this. It often turns a 3-star into a 5-star."},
  ]},
  {e:"🚨",t:"When Something Goes Wrong",sub:"Scripts that protect your rating",secs:[
    {h:"Cannot find the address",msg:"Hi! Having a little trouble locating you. I'm near [landmark]. Could you help with directions or a gate code?",w:"Always text before calling. Give them something specific to work with."},
    {h:"Need a gate code",msg:"Hi! At the gate but need a code to get in. Could you send it over? Right here!",w:"People respond in seconds when their food is right outside."},
    {h:"No one answers the door",msg:"Hi! At your door and knocked. I'll wait a couple minutes — if I don't hear back I may need to leave it at the door. Just want to make sure you get it!",w:"Documents your attempt and gives them a chance to respond."},
    {h:"Safe drop-off with photo",msg:"Your order has been left at your door. Took a photo as confirmation. Enjoy!",w:"Mentioning the photo casually shields you from false complaints."},
    {h:"Large apartment complex",msg:"Hi! I'm in the [building/complex name] parking lot but having trouble finding your unit. Could you help — which building number, entrance, or stairwell? Almost there!",w:"Asking for a specific landmark gets you a useful answer fast."},

// ─── Toast ────────────────────────────────────────────────────────────────────
function Toast({msg, onDone}) {
  const [out, setOut] = useState(false);
  useEffect(()=>{
    const t1=setTimeout(()=>setOut(true),1600);
    const t2=setTimeout(()=>onDone(),2000);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[]);
  return(
    <div role="status" aria-live="polite" aria-atomic="true" style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",zIndex:999,pointerEvents:"none",
      background:"rgba(16,185,129,0.95)",borderRadius:16,padding:"14px 24px",
      fontSize:14,fontWeight:800,color:"#000",fontFamily:C.sans,
      animation:out?"toastOut 0.4s ease forwards":"toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards",
      boxShadow:"0 8px 32px rgba(16,185,129,0.5)",whiteSpace:"nowrap"}}>
      ✓ {msg}
    </div>
  );
}

// ─── Video Player ─────────────────────────────────────────────────────────────
function VideoPlayer({video}) {
  const [scene, setScene] = useState(0);
  const [progress, setProgress] = useState(0);
  const [playing, setPlaying] = useState(false);
  const elapsed = useRef(0);
  const rafRef = useRef(null);
  const t0Ref = useRef(null);

  useEffect(()=>{restart(false); return()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current);};},[video.id]);

  function restart(autoplay=true){
    if(rafRef.current)cancelAnimationFrame(rafRef.current);
    elapsed.current=0; t0Ref.current=null;
    setScene(0); setProgress(0); setPlaying(autoplay);
    if(autoplay) rafRef.current=requestAnimationFrame(tick);
  }

  function tick(ts){
    if(!t0Ref.current) t0Ref.current=ts;
    elapsed.current=ts-t0Ref.current;
    setProgress(Math.min(elapsed.current/video.dur*100,100));
    let sc=0;
    for(let i=video.scenes.length-1;i>=0;i--){if(elapsed.current>=video.scenes[i].t){sc=i;break;}}
    setScene(sc);
    if(elapsed.current<video.dur){rafRef.current=requestAnimationFrame(tick);}
    else{setPlaying(false);}
  }

  function togglePlay(){
    if(!playing && elapsed.current>=video.dur){restart(true);return;}
    if(playing){cancelAnimationFrame(rafRef.current);setPlaying(false);}
    else{
      const saved=elapsed.current; t0Ref.current=null;
      rafRef.current=requestAnimationFrame(ts=>{t0Ref.current=ts-saved;tick(ts);});
      setPlaying(true);
    }
  }

  function jumpToScene(si){
    if(rafRef.current)cancelAnimationFrame(rafRef.current);
    const targetMs=video.scenes[si].t;
    elapsed.current=targetMs; t0Ref.current=null;
    setScene(si); setProgress(targetMs/video.dur*100);
    const saved=targetMs;
    rafRef.current=requestAnimationFrame(ts=>{t0Ref.current=ts-saved;tick(ts);});
    setPlaying(true);
  }

  const sc=video.scenes[scene];
  const vc=video.color;
  const A="#F5A623",G="#10B981",R="#F43F5E";

  return(
    <div style={{position:"relative",borderRadius:22,overflow:"hidden",background:"#07080A",border:`1px solid ${vc}30`}}>
      <div style={{position:"absolute",top:0,left:0,height:4,width:`${progress}%`,background:`linear-gradient(90deg,${vc},#fff)`,boxShadow:`0 0 10px ${vc}`,transition:"width 0.1s linear",zIndex:10}}>
        <div style={{position:"absolute",right:-5,top:-3,width:10,height:10,borderRadius:"50%",background:"#fff",boxShadow:`0 0 8px ${vc},0 0 16px ${vc}80`}}/>
      </div>
      <div style={{minHeight:320,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"28px 22px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-30,width:180,height:180,borderRadius:"50%",background:`radial-gradient(circle,${vc}20,transparent 65%)`,pointerEvents:"none"}}/>
        <div style={{position:"absolute",bottom:-40,left:-20,width:140,height:140,borderRadius:"50%",background:`radial-gradient(circle,${vc}15,transparent 65%)`,pointerEvents:"none"}}/>
        <div key={`${video.id}-${scene}`} style={{position:"relative",zIndex:1,width:"100%",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
          {sc.tag&&<div style={{fontSize:11,fontWeight:800,color:vc,letterSpacing:1.5,textTransform:"uppercase",animation:"vUp 0.4s cubic-bezier(0.16,1,0.3,1) both",background:`${vc}15`,border:`1px solid ${vc}35`,borderRadius:99,padding:"4px 12px"}}>{sc.tag}</div>}
          {sc.emoji&&!sc.stat&&<div style={{fontSize:sc.hed?48:64,animation:"vPop 0.4s 0.1s cubic-bezier(0.34,1.56,0.64,1) both",opacity:0}}>{sc.emoji}</div>}
          {sc.stat&&<div style={{fontSize:72,fontWeight:900,letterSpacing:"-3px",color:G,lineHeight:1,animation:"vPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both"}}>{sc.stat}</div>}
          {sc.statSub&&<div style={{fontSize:18,fontWeight:800,color:"rgba(255,255,255,0.8)",animation:"vUp 0.4s 0.15s both",opacity:0}}>{sc.statSub}</div>}
          {sc.hed&&<div style={{fontSize:sc.hed.length>30?24:30,fontWeight:900,lineHeight:1.2,textAlign:"center",letterSpacing:"-0.8px",background:`linear-gradient(135deg,#fff 30%,${vc})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",whiteSpace:"pre-line",animation:"vUp 0.5s 0.15s cubic-bezier(0.16,1,0.3,1) both",opacity:0}}>{sc.hed}</div>}
          <div style={{width:32,height:2,borderRadius:99,background:`linear-gradient(90deg,${vc},#fff)`,animation:"vFade 0.4s 0.3s both",opacity:0}}/>
          {sc.sub&&<div style={{fontSize:12,color:"rgba(255,255,255,0.55)",textAlign:"center",lineHeight:1.75,animation:"vUp 0.5s 0.3s both",opacity:0}} dangerouslySetInnerHTML={{__html:sc.sub.replace(/\n/g,'<br/>')}}/>}
          {sc.hi&&<div style={{width:"100%",background:`${sc.hi.color}10`,border:`1px solid ${sc.hi.color}40`,borderRadius:12,padding:"11px 14px",animation:"vUp 0.5s 0.45s both",opacity:0}}><div style={{fontSize:12,fontWeight:700,color:sc.hi.color,lineHeight:1.7,whiteSpace:"pre-line"}}>{sc.hi.text}</div></div>}
          {sc.cite&&<div style={{fontSize:12,color:"rgba(255,255,255,0.25)",fontStyle:"italic",textAlign:"center",animation:"vFade 0.4s 0.6s both",opacity:0}}>{sc.cite}</div>}
          {sc.vs&&<div style={{display:"flex",gap:8,width:"100%",animation:"vUp 0.5s 0.3s both",opacity:0}}>
            <div style={{flex:1,background:`${R}10`,border:`1px solid ${R}30`,borderRadius:12,padding:12,textAlign:"center"}}>
              <div style={{fontSize:12,fontWeight:800,color:R,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{sc.vs.bad[0]}</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",fontStyle:"italic",lineHeight:1.5}}>{sc.vs.bad[1]}</div>
            </div>
            <div style={{flex:1,background:`${G}10`,border:`1px solid ${G}30`,borderRadius:12,padding:12,textAlign:"center"}}>
              <div style={{fontSize:12,fontWeight:800,color:G,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{sc.vs.good[0]}</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.7)",fontStyle:"italic",lineHeight:1.5}}>{sc.vs.good[1]}</div>
            </div>
          </div>}
          {sc.why&&<div style={{width:"100%",background:`${sc.why.color}10`,border:`1px solid ${sc.why.color}35`,borderRadius:12,padding:"11px 14px",animation:"vUp 0.5s 0.45s both",opacity:0}}><div style={{fontSize:12,fontWeight:700,color:sc.why.color,lineHeight:1.7}}>{sc.why.text}</div></div>}
          {sc.vs2&&<div style={{display:"flex",flexDirection:"column",gap:8,width:"100%",animation:"vUp 0.5s 0.3s both",opacity:0}}>
            {sc.vs2.map(([e,label,txt,col],i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:`${col}10`,border:`1px solid ${col}25`,borderRadius:12}}>
                <span style={{fontSize:22,flexShrink:0}}>{e}</span>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:800,color:col,marginBottom:3}}>{label}</div><div style={{fontSize:13,color:"rgba(255,255,255,0.55)",lineHeight:1.5}}>{txt}</div></div>
              </div>
            ))}
          </div>}
          {sc.math&&<div style={{display:"flex",flexDirection:"column",gap:7,width:"100%",animation:"vUp 0.5s 0.3s both",opacity:0}}>
            {sc.math.map(([label,val,big],i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:big?"rgba(245,166,35,0.1)":"rgba(255,255,255,0.04)",borderRadius:12,padding:"10px 14px",border:big?"1px solid rgba(245,166,35,0.3)":"1px solid rgba(255,255,255,0.07)"}}>
                <span style={{fontSize:12,color:big?"rgba(255,255,255,0.8)":"rgba(255,255,255,0.5)",fontWeight:big?700:400}}>{label}</span>
                <span style={{fontSize:big?20:15,fontWeight:900,color:A}}>{val}</span>
              </div>
            ))}
          </div>}
          {sc.listBad&&<div style={{display:"flex",flexDirection:"column",gap:7,width:"100%",animation:"vUp 0.5s 0.2s both",opacity:0}}>
            {sc.listBad.map((t,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:`${R}10`,border:`1px solid ${R}25`,borderRadius:12}}>
                <span style={{color:R,fontWeight:900,fontSize:14}}>✗</span><span style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}>{t}</span>
              </div>
            ))}
          </div>}
          {sc.listGood&&<div style={{display:"flex",flexDirection:"column",gap:7,width:"100%",animation:"vUp 0.5s 0.2s both",opacity:0}}>
            {sc.listGood.map(([e,t],i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:`${G}10`,border:`1px solid ${G}25`,borderRadius:12}}>
                <span style={{fontSize:18,flexShrink:0}}>{e}</span><span style={{fontSize:12,color:"rgba(255,255,255,0.8)",fontWeight:600}}>{t}</span>
              </div>
            ))}
          </div>}
          {sc.bars&&<div style={{width:"100%",animation:"vUp 0.5s 0.3s both",opacity:0}}>
            {sc.bars.map(([label,stars,pct,col],i)=>(
              <div key={i} style={{marginBottom:i<sc.bars.length-1?14:0}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"rgba(255,255,255,0.45)",marginBottom:6}}><span>{label}</span><span>{stars}</span></div>
                <div style={{background:"rgba(255,255,255,0.07)",borderRadius:99,height:9,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${col},${col}CC)`,borderRadius:99}}/></div>
              </div>
            ))}
          </div>}
          {sc.cta&&<div style={{textAlign:"center",animation:"vUp 0.5s 0.45s both",opacity:0}}>
            <div style={{background:"rgba(245,166,35,0.12)",border:"2px solid rgba(245,166,35,0.5)",borderRadius:14,padding:"11px 20px",display:"inline-block"}}>
              <div style={{fontSize:13,fontWeight:800,color:A}}>Free to explore — droppilot.app</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginTop:2}}>Full access — $7 one time</div>
            </div>
          </div>}
        </div>
      </div>
      {/* Controls */}
      <div style={{padding:"12px 16px 18px",borderTop:`1px solid ${vc}20`}}>
        {/* Scene dots + counter */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7,marginBottom:14}}>
          {video.scenes.map((_,si)=>(
            <button key={si} onClick={()=>jumpToScene(si)} aria-label={`Scene ${si+1}`} style={{width:si===scene?22:9,height:9,borderRadius:99,background:si===scene?vc:"rgba(255,255,255,0.15)",border:"none",cursor:"pointer",padding:0,transition:"all 0.2s"}}/>
          ))}
          <span style={{fontSize:11,color:`${vc}90`,fontWeight:800,marginLeft:6,letterSpacing:"0.5px",fontFamily:"'JetBrains Mono',monospace"}}>{scene+1}/{video.scenes.length}</span>
        </div>
        {/* Play controls */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14}}>
          <button onClick={()=>restart(false)} aria-label="Restart" style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:99,width:42,height:42,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:17,color:"rgba(255,255,255,0.4)"}}>↺</button>
          <button onClick={togglePlay} aria-label={playing?"Pause":"Play"} style={{background:`linear-gradient(135deg,${vc},${vc}BB)`,border:"none",borderRadius:50,width:56,height:56,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:22,boxShadow:`0 6px 22px ${vc}45`,flexShrink:0,transition:"transform 0.15s",fontFamily:"inherit"}}>
            {playing?"⏸":elapsed.current>=video.dur?"↺":"▶"}
          </button>
          <div style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:99,width:42,height:42,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:`${vc}90`}}>
            {Math.max(0,Math.ceil(video.dur*(1-progress/100)/1000))}s
          </div>
        </div>
      </div>
    </div>
  );
}

      {h:"The 4.7 rating — why it's the key number", body:"Instacart shoppers rated below 4.7 see fewer batches and lower-paying ones. Above 4.7 keeps you in good standing. Above 4.8 unlocks premium batches. Your rating is based on your last 100 deliveries. Bad ratings caused by store conditions, out-of-stock items, or app errors can sometimes be removed — but you need to ask support and explain clearly what happened."},
    ]
  },
  {
    e:"📦", t:"Flex — The Basics", sub:"Platform-specific things every Flex driver needs to know",
    secs:[
      {h:"What Flex delivery actually is", body:"Flex is a package delivery service where you work independently. Instead of food or groceries, you deliver boxes and packages in bulk batches called 'blocks.' You claim a block in the app for a specific time window, pick up packages from a delivery station, and deliver them to the addresses on your list. It's different from food delivery — you're covering a whole neighborhood in one shift, not one order at a time."},
      {h:"How blocks work and how to get them", body:"A 'block' is a scheduled delivery shift — usually 3 to 6 hours. You claim blocks in the Flex app ahead of time when they open up, or through 'instant offers' that appear last-minute. Popular blocks fill up fast, so check the app often. When you claim a block, you're committing to show up at the station at that time to pick up your packages. Missing a claimed block hurts your standing."},
      {h:"TBA numbers — what they are and why they matter", body:"Every package in your block has a TBA number — a unique tracking ID. These are how packages are identified in the system. If you ever have a problem with a delivery (missing package complaint, wrong address), support needs the TBA number to find the record. Get in the habit of photographing your manifest or noting TBA numbers on any delivery that feels off before you move on."},
      {h:"Your standing — what it means and how to protect it", body:"Flex tracks your reliability with a 'standing' system. Missing blocks, failing to return undeliverable packages, or receiving missing package complaints hurts your standing. Good standing keeps you eligible for better blocks. Poor standing can limit your access or lead to deactivation. The best protection: show up for every block you claim, photo every drop-off in the app, and return undeliverables the same day with the correct reason code."},
    ]
  },
  {
    e:"🚙", t:"Lyft — The Basics", sub:"Platform-specific things every Lyft driver needs to know",
    secs:[
      {h:"How Lyft is different from delivery apps", body:"Lyft is a ride-share service — you carry people, not packages or food. A passenger requests a ride through the Lyft app, you drive to their pickup location, they get in, and you drive them to their destination. The biggest difference from delivery: customer service happens face-to-face, in your car, for the entire ride. Your vehicle is your workspace. How it looks, smells, and feels directly determines your rating and your income."},
      {h:"The Lyft rating system for drivers", body:"After every ride, passengers rate you 1 to 5 stars. Your score is the average of your last 500 rides. Lyft requires drivers to maintain at least 4.6 stars — below that, you risk deactivation. Serious Lyft drivers target 4.85 or higher, which unlocks priority access to better rides and higher earnings. The three biggest rating drivers: car cleanliness, not forcing conversation, and confirming the passenger's name professionally at pickup."},
      {h:"Confirming your passenger — and why you must always do it", body:"Before any passenger gets in your car, ask: 'What's your name?' and wait for them to answer. Do NOT say their name first — if you ask 'Are you Sarah?' a stranger could say yes and get in. This is both a safety rule and Lyft's official policy. If the name doesn't match, politely decline: 'I'm waiting for [correct name] — your driver might be just nearby.' This protects you, the real passenger, and your standing."},
      {h:"Lyft tiers — what they are and how to reach them", body:"Lyft has driver tiers: Standard, Silver, Gold, Platinum, Elite. Higher tiers unlock better pay rates, priority for high-value rides like airport pickups, and dedicated support. Silver requires 200+ rides and a 4.7+ rating. Platinum (the most rewarding tier for regular drivers) requires 1,000+ rides and a 4.9+ rating. Don't stress about tiers early on — focus on clean service and consistent habits, and the tier will follow naturally."},
    ]
  },
];

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]           = useState("tips");
  const [navPop, setNavPop]     = useState(null);
  function changeTab(id){
    setNavPop(id);
    setTab(id);
    setTimeout(()=>setNavPop(null), 400);
  }
  const [cfg, setCfg_]          = useState({name:""});
  const [pro, setPro]           = useState(false);
  const [watch, setWatch]       = useState(false);
  const [loaded, setLoaded]     = useState(false);
  const [showIntro, setShowIntro] = useState(false);
  const [toast, setToast]       = useState(null);

  // Modals
  const [showPay, setShowPay]   = useState(false);
  const [payStep, setPayStep]   = useState("offer");
  const [showCfg, setShowCfg]   = useState(false);

  // Secret tap counter for settings
  const tapCount = useRef(0);
  const tapTimer = useRef(null);
  function handleSecretTap(){
    tapCount.current+=1;
    if(tapTimer.current) clearTimeout(tapTimer.current);
    if(tapCount.current>=5){tapCount.current=0;setShowCfg(o=>!o);}
    else{tapTimer.current=setTimeout(()=>{tapCount.current=0;},1500);}
  }

  // Tips state
  const [tipOpen, setTipOpen]   = useState(null);
  const [learnOpen, setLearnOpen] = useState(null);
  const [learnSub, setLearnSub] = useState(null);
  const [favTips, setFavTips]   = useState(new Set());

  // Basics
  const [basicsOpen, setBasicsOpen] = useState(null);
  const [basicsSub, setBasicsSub]   = useState(null);

  // Templates
  const [msgOpen, setMsgOpen]   = useState(null);
  const [subOpen, setSubOpen]   = useState(null);
  const [copied, setCopied]     = useState(null);
  const [templateSearch, setTemplateSearch] = useState("");
  const [favTemplates, setFavTemplates] = useState(new Set());

  // Training
  const [activeVideo, setActiveVideo] = useState(0);

  // Language
  const [lang, setLang] = useState("en");
  const t=(en,es)=>lang==="en"?en:es;

  // Quick Help
  const [showQuickHelp, setShowQuickHelp] = useState(false);
  const [qhActive, setQhActive] = useState(null);
  const [qhCopied, setQhCopied] = useState(false);

  // Fill-in appeal letters
  const [fillKey, setFillKey] = useState(null);
  const [fillVals, setFillVals] = useState({});

  // Shift Mode
  const [shiftMode, setShiftMode] = useState(false);
  const [shiftPlatform, setShiftPlatform] = useState(null);
  const [showPlatformPicker, setShowPlatformPicker] = useState(false);

  function startShift(platId){
    setShiftPlatform(platId);
    setShiftMode(true);
    setShowPlatformPicker(false);
    load(`dp3-checks-${platId}`, PLATFORM_CHECKLISTS[platId]||[]).then(saved=>{
      const base=(PLATFORM_CHECKLISTS[platId]||[]).map(c=>({...c,done:false}));
      setChecks(saved.length?saved.map((s,i)=>({...(base[i]||s),done:s.done})):base);
    });
  }

  function endShift(){
    setShiftMode(false);
    setShiftPlatform(null);
  }

  // User profile panel
  const [showProfile, setShowProfile] = useState(false);
  const [notifOn, setNotifOn]   = useState(false);
  const [notifPerm, setNotifPerm] = useState(()=>typeof Notification!=="undefined"?Notification.permission:"unsupported");
  const [faqOpen, setFaqOpen] = useState(null);

  // Defend
  const [defPlatform, setDefPlatform]   = useState(null);
  const [defSection, setDefSection]     = useState("habits");
  const [appealOpen, setAppealOpen]     = useState(null);
  const [appealSub, setAppealSub]       = useState(null);
  const [checks, setChecks]             = useState([]);
  const [noteInput, setNoteInput]       = useState("");
  const [notes, setNotes]               = useState([]);

  const STRIPE_LINK = "https://buy.stripe.com/5kQeVd8XofwO78v8ZU48001";
  const searchDebounce = useRef(null);
  const [searchDisplay, setSearchDisplay] = useState("");

  // Escape key closes paywall modal
  useEffect(()=>{
    const h=e=>{if(e.key==="Escape"&&showPay){setShowPay(false);setPayStep("offer");}};
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[showPay]);

  // Daily tip notification — fires once per day on app open if enabled + granted
  useEffect(()=>{
    if(!loaded||!notifOn) return;
    if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
    const today=new Date().toDateString();
    const last=localStorage.getItem("dp3-notif-last");
    if(last===today) return;
    const tip=ALL_TIPS[Math.floor(new Date().getDate()-1)%ALL_TIPS.length];
    try{
      new Notification("DropPilot — Tip of the Day",{body:`${tip.e} ${tip.t}: ${tip.s}`});
      localStorage.setItem("dp3-notif-last",today);
    }catch(e){}
  },[loaded,notifOn]);

  async function toggleNotif(){
    if(typeof Notification==="undefined"){showToast("Notifications not supported on this browser.");return;}
    if(!notifOn){
      const perm=await Notification.requestPermission();
      setNotifPerm(perm);
      if(perm==="granted"){
        setNotifOn(true); save("dp3-notif",true);
        const tip=ALL_TIPS[0];
        try{new Notification("DropPilot — Tip of the Day",{body:`${tip.e} ${tip.t}: ${tip.s}`});localStorage.setItem("dp3-notif-last",new Date().toDateString());}catch(e){}
        showToast("Tip of the Day enabled!");
      } else if(perm==="denied"){
        showToast("Blocked — enable notifications in browser settings.");
      }
    } else {
      setNotifOn(false); save("dp3-notif",false);
      showToast("Tip of the Day turned off.");
    }
  }

  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const fromStripe = params.get("dp3")==="elite";
    const fromStripeWatch = params.get("dp3")==="watch";
    if(fromStripe){
      save("dp3-elite",true);
      history.replaceState(null,"",window.location.pathname);
    }
    if(fromStripeWatch){
      const expires = Date.now() + 31*24*60*60*1000;
      save("dp3-watch",{active:true,expires});
      history.replaceState(null,"",window.location.pathname);
    }
    Promise.all([
      load("dp3-cfg",{name:""}),
      load("dp3-elite",false),
      load("dp3-intro-seen",false),
      load("dp3-fav-tips",[]),
      load("dp3-fav-tpl",[]),
      load("dp3-notes",[]),
      load("dp3-notif",false),
      load("dp3-lang","en"),
      load("dp3-watch",null),
    ]).then(([c,p,seen,ft,ftpl,n,notif,l,w])=>{
      setCfg_(c); setPro(fromStripe||!!p); setLoaded(true);
      setFavTips(new Set(ft.filter(f=>typeof f==="number"&&f>=0&&f<ALL_TIPS.length)));
      setFavTemplates(new Set(ftpl.filter(k=>typeof k==="string")));
      setNotes(n);
      setNotifOn(!!notif);
      setLang(l||"en");
      const watchActive = fromStripeWatch || (w&&w.active&&w.expires>Date.now());
      setWatch(!!watchActive);
      if(fromStripe){ setShowPay(true); setPayStep("done"); }
      else if(fromStripeWatch){ showToast("📡 Policy Watch activated!"); }
      else if(!seen) setShowIntro(true);
    });
  },[]);

  const setCfg = useCallback(d=>{setCfg_(d); save("dp3-cfg",d);},[]);

  function copyMsg(text,key){
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>{setCopied(key);showToast("Copied to clipboard!");});}
    else{setCopied(key);showToast("Copied to clipboard!");}
  }

  function getPlaceholders(text){
    const found=[],seen=new Set();
    let m;const re=/\[([^\]]+)\]/g;
    while((m=re.exec(text))!==null){if(!seen.has(m[1])){found.push(m[1]);seen.add(m[1]);}}
    return found;
  }

  function applyFill(text,vals){
    return text.replace(/\[([^\]]+)\]/g,(_,k)=>vals[k]||`[${k}]`);
  }

  function toggleLang(){
    const nl=lang==="en"?"es":"en";
    setLang(nl); save("dp3-lang",nl);
    setMsgOpen(null); setSubOpen(null);
  }

  function toggleCheck(i){
    const updated=checks.map((c,idx)=>idx===i?{...c,done:!c.done}:c);
    setChecks(updated);
    if(defPlatform) save(`dp3-checks-${defPlatform}`,updated);
  }

  function selectPlatform(id){
    if(defPlatform===id){setDefPlatform(null);return;}
    setDefPlatform(id);
    setDefSection("habits");
    setAppealOpen(null);
    setAppealSub(null);
    load(`dp3-checks-${id}`,(PLATFORM_CHECKLISTS[id]||[]).map(c=>({...c,done:false}))).then(saved=>{
      setChecks(saved);
    });
  }

  function toggleFavTip(i){
    const next=new Set(favTips);
    if(next.has(i)){next.delete(i);}else{next.add(i);if(next.size===1)showToast("Tip saved! Upgrade to Elite for full access.");}
    setFavTips(next);
    save("dp3-fav-tips",[...next]);
  }

  function toggleFavTemplate(key){
    const next=new Set(favTemplates);
    next.has(key)?next.delete(key):next.add(key);
    setFavTemplates(next);
    save("dp3-fav-tpl",[...next]);
  }

  function addNote(){
    if(!noteInput.trim()) return;
    const newNote={text:noteInput.trim(),date:new Date().toLocaleDateString()};
    const updated=[newNote,...notes].slice(0,50);
    if(notes.length>=50) showToast("Note limit reached — oldest removed.");
    setNotes(updated);
    save("dp3-notes",updated);
    setNoteInput("");
  }

  function deleteNote(i){
    const updated=notes.filter((_,idx)=>idx!==i);
    setNotes(updated);
    save("dp3-notes",updated);
  }

  function handleSearchChange(val){
    setSearchDisplay(val);
    if(searchDebounce.current) clearTimeout(searchDebounce.current);
    searchDebounce.current=setTimeout(()=>setTemplateSearch(val),200);
  }

  // Filter templates by search
  const ACTIVE_MSG_CATS = lang==="en"?MSG_CATS:MSG_CATS_ES;
  const filteredCats = templateSearch.trim()
    ? ACTIVE_MSG_CATS.map(cat=>({
        ...cat,
        secs: cat.secs.filter(s=>
          s.h.toLowerCase().includes(templateSearch.toLowerCase()) ||
          s.msg.toLowerCase().includes(templateSearch.toLowerCase())
        )
      })).filter(cat=>cat.secs.length>0)
    : ACTIVE_MSG_CATS;

  if(!loaded) return(
    <div style={{background:C.bg,height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,fontFamily:C.sans}}>
      <div style={{fontSize:52,animation:"floatY 2s ease-in-out infinite"}}>🚗</div>
      <div style={{color:C.amber,fontSize:17,fontWeight:800}}>Loading DropPilot...</div>
    </div>
  );

  if(showIntro) return <IntroAnimation onDone={()=>{setShowIntro(false);save("dp3-intro-seen",true);}}/>;

  return(
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:430,margin:"0 auto",fontFamily:C.sans,color:C.text,display:"flex",flexDirection:"column"}}>

      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}

      {/* ── Header ──────────────────────────────────────────────────────────── */}
      <div style={{background:"rgba(10,12,16,0.94)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"13px 18px",display:"flex",alignItems:"center",position:"sticky",top:0,zIndex:60}}>
        <div onClick={handleSecretTap} style={{display:"flex",alignItems:"center",gap:10,userSelect:"none",WebkitUserSelect:"none",cursor:"default",flex:1}}>
          <div className="glow" style={{width:38,height:38,borderRadius:12,background:shiftMode&&shiftPlatform?`linear-gradient(135deg,${PLATFORMS_DEFEND.find(p=>p.id===shiftPlatform)?.color||C.amber},${C.amberD})`:`linear-gradient(135deg,${C.amber},${C.amberD})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{shiftMode&&shiftPlatform?PLATFORMS_DEFEND.find(p=>p.id===shiftPlatform)?.e:"🚗"}</div>
          <div>
            <div style={{fontSize:18,fontWeight:900,letterSpacing:"-0.5px",background:`linear-gradient(110deg,${C.text} 40%,${C.amber})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>DropPilot</div>
            {shiftMode&&shiftPlatform?(
              <div style={{fontSize:10,fontWeight:800,letterSpacing:"1px",textTransform:"uppercase",color:PLATFORMS_DEFEND.find(p=>p.id===shiftPlatform)?.color||C.amber}}>● {PLATFORMS_DEFEND.find(p=>p.id===shiftPlatform)?.label} Shift Active</div>
            ):(
              <div style={{fontSize:10,color:C.text3,letterSpacing:"1.5px",fontWeight:700,textTransform:"uppercase"}}>Customer Service · Gig Edition</div>
            )}
          </div>
        </div>
        <button onClick={toggleLang} aria-label="Toggle language" style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"0 10px",height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:11,fontWeight:800,color:C.text2,letterSpacing:"0.5px",flexShrink:0,marginRight:6,fontFamily:C.mono}}>{lang==="en"?"ES":"EN"}</button>
        <button onClick={()=>setShowProfile(o=>!o)} aria-label="Profile & Settings" style={{background:showProfile?`${C.amber}18`:"rgba(255,255,255,0.05)",border:`1px solid ${showProfile?`${C.amber}40`:"rgba(255,255,255,0.08)"}`,borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:17,flexShrink:0,transition:"all 0.15s"}}>⚙️</button>
      </div>

      {/* ── Admin Settings Panel (secret 5-tap) ────────────────────────────── */}
      {showCfg&&(
        <div style={{background:C.s2,borderBottom:"1px solid rgba(255,255,255,0.07)",padding:18}}>
          <div style={{fontSize:15,fontWeight:800,marginBottom:16}}>⚙ Admin Settings</div>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:14,marginBottom:14}}>

            {pro&&<button onClick={()=>{setPro(false);save("dp3-elite",false);}} style={{background:"rgba(244,63,94,0.08)",border:"1px solid rgba(244,63,94,0.2)",borderRadius:11,padding:"11px 12px",color:C.red,fontSize:13,width:"100%",cursor:"pointer",marginBottom:8}}>Reset Elite Access</button>}
            {watch&&<button onClick={()=>{setWatch(false);save("dp3-watch",null);}} style={{background:"rgba(244,63,94,0.08)",border:"1px solid rgba(244,63,94,0.2)",borderRadius:11,padding:"11px 12px",color:C.red,fontSize:13,width:"100%",cursor:"pointer"}}>Reset Policy Watch</button>}
          </div>
          <button onClick={()=>setShowCfg(false)} style={{background:`linear-gradient(135deg,${C.amber},${C.amberD})`,border:"none",borderRadius:13,padding:"14px",fontSize:14,fontWeight:800,cursor:"pointer",width:"100%",color:"#000"}}>Save & Close</button>
        </div>
      )}

      {/* ── User Profile Panel (⚙️ button) ─────────────────────────────────── */}
      {showProfile&&(
        <div style={{background:C.s2,borderBottom:"1px solid rgba(255,255,255,0.07)",padding:18,animation:"slideUp 0.22s cubic-bezier(0.16,1,0.3,1)"}}>

          </div>

            <div style={{fontSize:11,fontWeight:700,color:C.text3,marginBottom:10,textTransform:"uppercase",letterSpacing:"1px"}}>⭐ Access</div>
            {pro?(
              <div style={{background:`${C.green}0D`,border:`1px solid ${C.green}30`,borderRadius:12,padding:"11px 14px",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:18}}>⭐</span>
                <div>
                  <div style={{fontSize:13,fontWeight:800,color:C.green}}>Elite Active</div>
                  <div style={{fontSize:11,color:C.text3,marginTop:2}}>Lifetime access — all features unlocked</div>
                </div>
              </div>
            ):(
              <button onClick={()=>{setShowProfile(false);setShowPay(true);setPayStep("offer");}} style={{background:`linear-gradient(135deg,${C.amber},${C.amberD})`,border:"none",borderRadius:12,padding:"13px",fontSize:14,fontWeight:800,cursor:"pointer",width:"100%",color:"#000",boxShadow:`0 6px 20px ${C.amber}30`}}>Upgrade to Elite — $7 one time</button>
            )}
          </div>

          {/* Notifications */}
          <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:14,marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:C.text3,marginBottom:10,textTransform:"uppercase",letterSpacing:"1px"}}>🔔 Notifications</div>
            <div style={{background:C.s1,border:`1px solid ${notifOn?`${C.green}35`:"rgba(255,255,255,0.08)"}`,borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,transition:"border-color 0.2s"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,color:C.text}}>Tip of the Day</div>
                <div style={{fontSize:11,color:C.text3,marginTop:3,lineHeight:1.4}}>
                  {notifPerm==="denied"?"Blocked — enable in your browser settings":notifOn?"Sends a fresh tip each time you open the app":"Get a customer service tip every day"}
                </div>
              </div>
              <button onClick={toggleNotif} style={{background:notifOn?`${C.green}18`:"rgba(255,255,255,0.07)",border:`1px solid ${notifOn?`${C.green}40`:"rgba(255,255,255,0.12)"}`,borderRadius:99,padding:"7px 16px",fontSize:12,fontWeight:800,cursor:"pointer",color:notifOn?C.green:C.text3,flexShrink:0,transition:"all 0.15s"}}>
                {notifOn?"On ✓":"Enable"}
              </button>
            </div>
          </div>

          {/* FAQ */}
          <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:14,marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:C.text3,marginBottom:10,textTransform:"uppercase",letterSpacing:"1px"}}>❓ FAQ</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {[
                ["What's free and what's Elite?",
                 "The Earn tab — all 10 tips and the first two psychology guides — is completely free, forever. Elite ($7 one-time) unlocks everything else: all scripts, appeal letters, platform guides, training videos, and all future app feature updates."],
                ["I paid but my access didn't unlock. What do I do?",
                 "After payment, Stripe sends you back to the app and it unlocks automatically. If something went wrong, close and reopen the app — your purchase is saved. Still not working? Check the email from your Stripe receipt for a support contact."],
                ["How do I add DropPilot to my home screen?",

                    <button onClick={()=>{setShowPay(true);setPayStep("offer");}} style={{background:`linear-gradient(135deg,${C.teal},#0891b2)`,border:"none",borderRadius:16,padding:"16px",fontSize:15,fontWeight:900,cursor:"pointer",width:"100%",color:"#000",boxShadow:`0 8px 28px rgba(6,182,212,0.4)`}}>Unlock Elite Access — $7</button>
                    <div style={{fontSize:12,color:C.text3,marginTop:9}}>Lifetime access · Free updates forever</div>
                  </div>
                </div>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={{background:`rgba(6,182,212,0.07)`,border:`1px solid rgba(6,182,212,0.2)`,borderRadius:14,padding:"13px 16px",display:"flex",gap:12,alignItems:"flex-start"}}>
                  <span style={{fontSize:20,flexShrink:0}}>💡</span>
                  <div style={{fontSize:13,color:C.text2,lineHeight:1.7}}>This section covers everything from scratch. Whether you're brand new or just need a refresher — start wherever makes sense for you.</div>
                </div>
                {BASICS_CATS.map((cat,ci)=>{
                  const catOpen=basicsOpen===ci;
                  return(
                    <div key={ci} className={`card-in c${Math.min(ci,9)}`} style={{background:C.s1,border:`1px solid ${catOpen?`rgba(6,182,212,0.4)`:C.border}`,borderRadius:18,overflow:"hidden",transition:"border-color 0.18s"}}>
                      <div onClick={()=>{setBasicsOpen(catOpen?null:ci);setBasicsSub(null);}} style={{padding:"16px 18px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                        <div style={{width:44,height:44,borderRadius:13,background:catOpen?`rgba(6,182,212,0.12)`:"rgba(255,255,255,0.05)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{cat.e}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:15,fontWeight:700}}>{cat.t}</div>
                          <div style={{fontSize:13,color:C.text2,marginTop:2}}>{cat.sub}</div>
                        </div>
                        <div style={{color:C.text3,fontSize:13,transition:"transform 0.18s",transform:catOpen?"rotate(180deg)":"none"}}>▾</div>
                      </div>
                      {catOpen&&(
                        <div style={{padding:"0 14px 14px",display:"flex",flexDirection:"column",gap:10,animation:"slideUp 0.25s cubic-bezier(0.16,1,0.3,1)"}}>
                          {cat.secs.map((sec,si)=>{
                            const key=`b${ci}-${si}`;
                            const open2=basicsSub===key;
                            return(
                              <div key={si} style={{background:C.s2,border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,overflow:"hidden"}}>
                                <div onClick={()=>setBasicsSub(open2?null:key)} style={{padding:"13px 15px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                                  <span style={{fontSize:14,fontWeight:700,flex:1}}>{sec.h}</span>
                                  <div style={{color:C.text3,fontSize:12,transition:"transform 0.18s",transform:open2?"rotate(180deg)":"none",flexShrink:0}}>▾</div>
                                </div>
                                {open2&&(
                                  <div style={{padding:"0 15px 15px",animation:"slideUp 0.2s cubic-bezier(0.16,1,0.3,1)"}}>
                                    <p style={{fontSize:14,color:C.text2,lineHeight:1.85,margin:0}}>{sec.body}</p>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>

      {/* ── Quick Help Floating Button ──────────────────────────────────────── */}
      <button onClick={()=>{setShowQuickHelp(true);setQhActive(null);setQhCopied(false);}} aria-label="Quick Help" style={{position:"fixed",bottom:74,right:16,zIndex:90,width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${C.blue},#1d4ed8)`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:"0 4px 20px rgba(59,130,246,0.55)",WebkitTapHighlightColor:"transparent"}}>⚡</button>

      {/* ── Quick Help Panel ────────────────────────────────────────────────── */}
      {showQuickHelp&&(
        <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={()=>{setShowQuickHelp(false);setQhActive(null);}} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.75)"}}/>
          <div style={{position:"relative",background:"linear-gradient(180deg,#12151a,#0d0f13)",borderTop:"1px solid rgba(255,255,255,0.08)",borderRadius:"24px 24px 0 0",padding:20,paddingBottom:36,width:"100%",maxWidth:430,zIndex:1,maxHeight:"80vh",overflowY:"auto"}}>
            <div style={{width:40,height:4,borderRadius:99,background:"rgba(255,255,255,0.15)",margin:"0 auto 18px"}}/>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <div>
                <div style={{fontSize:16,fontWeight:900}}>⚡ {t("Quick Scripts","Scripts Rápidos")}</div>
                <div style={{fontSize:12,color:C.text3,marginTop:2}}>{t("What's happening right now?","¿Qué está pasando ahora?")}</div>
              </div>
              <button onClick={()=>{setShowQuickHelp(false);setQhActive(null);}} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,width:32,height:32,cursor:"pointer",color:C.text3,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>

            {qhActive===null?(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {QUICK_SITUATIONS.map((s,i)=>{
                  const cats=lang==="en"?MSG_CATS:MSG_CATS_ES;
                  const sec=cats[s.ci]?.secs[s.si];
                  if(!sec) return null;
                  return(
                    <button key={i} onClick={()=>setQhActive(i)} style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 12px",minHeight:80,display:"flex",flexDirection:"column",alignItems:"flex-start",gap:6,cursor:"pointer",textAlign:"left",WebkitTapHighlightColor:"transparent"}}>
                      <span style={{fontSize:22}}>{s.e}</span>
                      <span style={{fontSize:12,fontWeight:700,color:C.text,lineHeight:1.3}}>{lang==="en"?s.l:s.le}</span>
                    </button>
                  );
                })}
              </div>
            ):(()=>{
              const s=QUICK_SITUATIONS[qhActive];
              const cats=lang==="en"?MSG_CATS:MSG_CATS_ES;
              const sec=cats[s.ci]?.secs[s.si];
              if(!sec) return null;
              const phs=getPlaceholders(sec.msg);
              const filled=applyFill(sec.msg,fillVals);
              return(
                <div>
                  <button onClick={()=>{setQhActive(null);setFillVals({});setQhCopied(false);}} style={{background:"transparent",border:"none",color:C.text3,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",gap:5,marginBottom:14,padding:"8px 0",WebkitTapHighlightColor:"transparent"}}>← {t("Back","Atrás")}</button>
                  <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>{s.e} {lang==="en"?s.l:s.le}</div>
                  <div style={{background:"rgba(0,0,0,0.3)",borderRadius:12,padding:"13px 14px",marginBottom:12,fontSize:13,color:C.text,lineHeight:1.75,whiteSpace:"pre-wrap",fontFamily:C.mono}}>{filled}</div>
                  {phs.length>0&&(
                    <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:12,marginBottom:12}}>
                      <div style={{fontSize:11,fontWeight:800,color:C.text3,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.5px"}}>{t("Fill in details","Completa los detalles")}</div>
                      <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        {phs.map(ph=>(
                          <input key={ph} value={fillVals[ph]||""} onChange={e=>setFillVals(v=>({...v,[ph]:e.target.value}))} placeholder={ph} style={{background:"rgba(0,0,0,0.3)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"12px 12px",color:C.text,fontSize:16,width:"100%"}}/>
                        ))}
                      </div>
                    </div>
                  )}
                  <button onClick={()=>{
                    if(navigator.clipboard){navigator.clipboard.writeText(filled).then(()=>{setQhCopied(true);setTimeout(()=>{setShowQuickHelp(false);setQhActive(null);setFillVals({});setQhCopied(false);},800);});}
                    else{setQhCopied(true);setTimeout(()=>{setShowQuickHelp(false);setQhActive(null);setFillVals({});setQhCopied(false);},800);}
                  }} style={{background:qhCopied?C.green:C.blue,border:"none",borderRadius:13,padding:"14px",fontSize:14,fontWeight:800,cursor:"pointer",color:qhCopied?"#000":"#fff",width:"100%",transition:"background 0.2s",boxShadow:`0 4px 16px ${C.blue}40`}}>
                    {qhCopied?t("✓ Copied!","✓ ¡Copiado!"):t("Copy & Close","Copiar y cerrar")}
                  </button>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {/* ── Bottom Nav ──────────────────────────────────────────────────────── */}
      {shiftMode?(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(8,10,13,0.97)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderTop:`1px solid ${PLATFORMS_DEFEND.find(p=>p.id===shiftPlatform)?.color||C.amber}40`,display:"flex",gap:10,zIndex:100,padding:"10px 14px 20px"}}>
          <button onClick={()=>{setShowQuickHelp(true);setQhActive(null);setQhCopied(false);}} style={{flex:1,background:`${C.blue}15`,border:`1.5px solid ${C.blue}35`,borderRadius:15,padding:"14px 10px",display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
            <span style={{fontSize:20}}>⚡</span>
            <span style={{fontSize:14,fontWeight:800,color:C.blue}}>{t("Quick Script","Script Rápido")}</span>
          </button>
          <button onClick={endShift} style={{flex:1,background:"rgba(244,63,94,0.1)",border:"1.5px solid rgba(244,63,94,0.3)",borderRadius:15,padding:"14px 10px",display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
            <span style={{fontSize:20}}>🏁</span>
            <span style={{fontSize:14,fontWeight:800,color:C.red}}>{t("End Shift","Fin de Turno")}</span>
          </button>
        </div>
      ):(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(8,10,13,0.96)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",zIndex:100,paddingBottom:6,paddingTop:4}}>
          {[{id:"tips",l:"Earn",e:"⭐",ac:C.amber},{id:"templates",l:"Scripts",e:"💬",ac:C.blue},{id:"basics",l:"Basics",e:"📖",ac:C.teal},{id:"defend",l:"Defend",e:"🛡️",ac:C.purple},{id:"train",l:"Training",e:"🎓",ac:C.amber}].map(n=>{
            const active=tab===n.id;
            const popping=navPop===n.id;
            return(
              <button key={n.id} onClick={()=>changeTab(n.id)} style={{flex:1,background:"transparent",border:"none",cursor:"pointer",padding:"6px 1px 3px",display:"flex",flexDirection:"column",alignItems:"center",gap:1,position:"relative",transition:"all 0.18s"}}>
                {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:28,height:2,borderRadius:"0 0 4px 4px",background:n.ac,boxShadow:`0 0 8px ${n.ac}`}}/>}
                <div className={popping?"nav-pop":""} style={{width:40,height:28,borderRadius:10,background:active?`${n.ac}18`:"transparent",border:active?`1px solid ${n.ac}30`:"1px solid transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.18s,border 0.18s"}}>
                  <span style={{fontSize:active?18:15,transition:"font-size 0.18s"}}>{n.e}</span>
                </div>
                <span style={{fontSize:10,fontWeight:active?800:600,color:active?n.ac:C.text3,fontFamily:C.sans,letterSpacing:"0.1px"}}>{n.l}</span>
              </button>
            );
          })}
        </div>
      )}

      {/* ── Paywall Modal ────────────────────────────────────────────────────── */}
      {showPay&&(
        <div style={{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={()=>{setShowPay(false);setPayStep("offer");}} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.78)"}}/>
          <div style={{position:"relative",background:"linear-gradient(180deg,#12151a,#0d0f13)",borderTop:"1px solid rgba(255,255,255,0.08)",borderRadius:"24px 24px 0 0",padding:24,paddingBottom:40,width:"100%",maxWidth:430,zIndex:1,maxHeight:"88vh",overflowY:"auto"}}>
            <div style={{width:40,height:4,borderRadius:99,background:"rgba(255,255,255,0.15)",margin:"0 auto 22px"}}/>

            {payStep==="offer"&&(
              <div>
                <div style={{textAlign:"center",marginBottom:18}}>
                  <div style={{fontSize:44,marginBottom:10}}>🔒</div>
                  <div style={{fontSize:22,fontWeight:900,marginBottom:6}}>Become Elite</div>
                  <div style={{fontSize:14,color:C.text2,lineHeight:1.7}}>Everything you need to earn more, protect your account, and stay sharp — all in one place.</div>
                </div>

                <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:16,marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:12,marginBottom:12,borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                    <span style={{fontSize:15,fontWeight:700}}>Elite Access</span>
                    <span style={{fontSize:22,fontWeight:900,color:C.amber,fontFamily:C.mono}}>$7</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:9}}>
                    {["4 free tips + 6 more with full psychology breakdowns","7 in-depth learning sections — psychology, tip science, de-escalation & more","30 message templates with one-tap copy","5 training videos — the science behind what earns more","Platform habits & appeal scripts for all 6 platforms","Per-delivery checklists + safety score per platform","Notes log for problem addresses and difficult customers"].map((f,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:12,color:C.text2}}>
                        <span style={{color:C.green,fontWeight:900,fontSize:13,flexShrink:0}}>✓</span>{f}
                      </div>
                    ))}
                  </div>
                </div>
                <button onClick={()=>{ window.location.href=STRIPE_LINK; }} style={{background:`linear-gradient(135deg,${C.amber},${C.amberD},${C.amberL})`,border:"none",borderRadius:16,padding:"17px",fontSize:16,fontWeight:900,cursor:"pointer",color:"#000",width:"100%",boxShadow:"0 8px 28px rgba(245,166,35,0.45)",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:8}}>
                  <span style={{fontSize:20}}>💳</span>
                  <div style={{textAlign:"left"}}>
                    <div>Become Elite — $7</div>
                    <div style={{fontSize:13,fontWeight:500,opacity:0.75,marginTop:2}}>Secure Stripe checkout · unlocks instantly on return</div>
                  </div>
                </button>
                <div style={{textAlign:"center",fontSize:12,color:C.text3,marginBottom:4}}>One-time payment · Lifetime access · No recurring charges, ever</div>
                <div style={{textAlign:"center",fontSize:11,color:"rgba(107,122,141,0.7)",marginTop:8,lineHeight:1.5,padding:"0 4px"}}>DropPilot is not affiliated with, endorsed by, or connected to DoorDash, Uber Eats, Walmart Spark, Instacart, Lyft, or Amazon Flex.</div>
              </div>
            )}

            {payStep==="done"&&(
              <div style={{textAlign:"center",padding:"10px 0"}}>
                <div style={{fontSize:64,marginBottom:16}}>🎉</div>
                <div style={{fontSize:24,fontWeight:900,marginBottom:8}}>You're Elite.</div>
                <div style={{fontSize:14,color:C.text2,marginBottom:26,lineHeight:1.7}}>You now have lifetime access to everything in DropPilot — every template, script, training video, and all future app feature updates. Yours forever.</div>
                <button onClick={()=>{setShowPay(false);setPayStep("offer");setTab("defend");}} style={{background:C.purple,border:"none",borderRadius:16,padding:"16px",fontSize:16,fontWeight:800,cursor:"pointer",width:"100%",color:"#fff",boxShadow:"0 6px 20px rgba(139,92,246,0.4)",marginBottom:10}}>Go to Account Defense</button>
                <button onClick={()=>{setShowPay(false);setPayStep("offer");setTab("templates");}} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%",color:C.text2}}>See Message Templates</button>
              </div>
            )}
          </div>
        </div>
      )}
      {/* ── Platform Picker ─────────────────────────────────────────────────── */}
      {showPlatformPicker&&(
        <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={()=>setShowPlatformPicker(false)} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.78)"}}/>
          <div style={{position:"relative",background:"linear-gradient(180deg,#12151a,#0d0f13)",borderTop:"1px solid rgba(255,255,255,0.08)",borderRadius:"24px 24px 0 0",padding:24,paddingBottom:40,width:"100%",maxWidth:430,zIndex:1}}>
            <div style={{width:40,height:4,borderRadius:99,background:"rgba(255,255,255,0.15)",margin:"0 auto 20px"}}/>
            <div style={{fontSize:19,fontWeight:900,marginBottom:4}}>🚗 {t("Which app are you driving for?","¿Para qué app estás manejando?")}</div>
            <div style={{fontSize:13,color:C.text3,marginBottom:20}}>{t("Your shift will be focused on that platform.","Tu turno se enfocará en esa plataforma.")}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {PLATFORMS_DEFEND.map(p=>(
                <button key={p.id} onClick={()=>startShift(p.id)} style={{background:`${p.color}0F`,border:`1.5px solid ${p.color}40`,borderRadius:16,padding:"16px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",textAlign:"left",WebkitTapHighlightColor:"transparent"}}>
                  <div style={{width:44,height:44,borderRadius:13,background:`${p.color}20`,border:`1px solid ${p.color}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{p.e}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:16,fontWeight:800,color:p.color}}>{p.label}</div>
                    <div style={{fontSize:12,color:C.text3,marginTop:2}}>{t("Tap to start your shift","Toca para iniciar tu turno")}</div>
                  </div>
                  <div style={{fontSize:20,color:`${p.color}60`}}>›</div>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
</body>
