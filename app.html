      {h:"What Instacart shoppers actually do", body:"Instacart pays you to shop for customers at grocery stores, then deliver the bags to their home. You get a list of items, you find them in the store, scan them, check out, and deliver. The customer set up their order in advance and chose whether to allow substitutions. You are both the shopper and the delivery driver. The whole thing — shopping and delivering — is called a 'batch.'"},
      {h:"How to handle replacements", body:"If an item isn't available, the Instacart app will show you approved replacements or let you suggest one. Before you check out, always message the customer to let them know what you're substituting. Something simple like 'Hi! The brand you ordered is out of stock — I'm grabbing [this one] instead, hope that works!' Most customers appreciate the heads up and it protects your rating if they're not happy with the sub."},
      {h:"Your Batch ID — always note it", body:"Every Instacart order has a Batch ID. This is what support uses to find your record if anything goes wrong. Any time a delivery feels off — unhappy customer, wrong items, difficulty finding the address — take a screenshot of the Batch ID before you move on. You cannot file a useful support request without it."},
      {h:"The 4.7 rating — why it's the key number", body:"Instacart shoppers rated below 4.7 see fewer batches and lower-paying ones. Above 4.7 keeps you in good standing. Your rating is based on your last 100 customer ratings — not your last 100 orders. Since customers don't always leave a rating, your score reflects the last 100 times someone actually rated you, and Instacart automatically removes your two lowest ratings from that pool. Instacart also introduced a Cart Star tier system (Gold, Platinum, Diamond) in 2025 based on a Shopping Quality Score that tracks item fulfillment accuracy alongside your star rating. Bad ratings caused by store conditions, out-of-stock items, or app errors can sometimes be removed — but you need to ask support and explain clearly what happened."},
    ]
  },
  {
    e:"📦", t:"Flex — The Basics", sub:"Platform-specific things every Flex driver needs to know",
    secs:[
      {h:"What Flex delivery actually is", body:"Flex is a package delivery service where you work independently. Instead of food or groceries, you deliver boxes and packages in bulk batches called 'blocks.' You claim a block in the app for a specific time window, pick up packages from a delivery station, and deliver them to the addresses on your list. It's different from food delivery — you're covering a whole neighborhood in one shift, not one order at a time."},
      {h:"How blocks work and how to get them", body:"A 'block' is a scheduled delivery shift — usually 3 to 6 hours. You claim blocks in the Flex app ahead of time when they open up, or through 'instant offers' that appear last-minute. Popular blocks fill up fast, so check the app often. When you claim a block, you're committing to show up at the station at that time to pick up your packages. Missing a claimed block hurts your standing."},
      {h:"TBA numbers — what they are and why they matter", body:"Every package in your block has a TBA number — a unique tracking ID. These are how packages are identified in the system. If you ever have a problem with a delivery (missing package complaint, wrong address), support needs the TBA number to find the record. Get in the habit of photographing your manifest or noting TBA numbers on any delivery that feels off before you move on."},
      {h:"Your standing — what it means and how to protect it", body:"Flex tracks your reliability with a five-level standing system: Fantastic, Great, Fair, At Risk, and Deactivated. Standing updates daily and is visible in the app 48 hours after your first block. Missing blocks, canceling less than 45 minutes before a block starts, failing to return undeliverable packages, or receiving missing package complaints all hurt your standing. Good standing keeps you eligible for better blocks — At Risk standing can lead to deactivation. The best protection: show up for every block you claim, photo every drop-off in the app, and return undeliverables the same day with the correct reason code."},
    ]
  },
  {
    e:"🚙", t:"Lyft — The Basics", sub:"Platform-specific things every Lyft driver needs to know",
    secs:[
      {h:"How Lyft is different from delivery apps", body:"Lyft is a ride-share service — you carry people, not packages or food. A passenger requests a ride through the Lyft app, you drive to their pickup location, they get in, and you drive them to their destination. The biggest difference from delivery: customer service happens face-to-face, in your car, for the entire ride. Your vehicle is your workspace. How it looks, smells, and feels directly determines your rating and your income."},
      {h:"The Lyft rating system for drivers", body:"After every ride, passengers rate you 1 to 5 stars. Your score is the average of your last 100 rides. Lyft requires drivers to maintain at least 4.6 stars — below that, you risk deactivation. Serious Lyft drivers target 4.85 or higher, which unlocks priority access to better rides and higher earnings. The three biggest rating drivers: car cleanliness, not forcing conversation, and confirming the passenger's name professionally at pickup."},
      {h:"Confirming your passenger — and why you must always do it", body:"Before any passenger gets in your car, ask: 'What's your name?' and wait for them to answer. Do NOT say their name first — if you ask 'Are you Sarah?' a stranger could say yes and get in. This is both a safety rule and Lyft's official policy. If the name doesn't match, politely decline: 'I'm waiting for [correct name] — your driver might be just nearby.' This protects you, the real passenger, and your standing."},
      {h:"Lyft tiers — what they are and how to reach them", body:"Lyft has a rewards program with four tiers: Silver, Gold, Platinum, and Elite. Tiers are based on Tier Points (earned as roughly $1 per dollar in ride earnings, with a multiplier up to 3x for high acceptance rates) and a Driving Score. Silver requires a 60% Driving Score minimum; Gold, Platinum, and Elite require 80%+. Elite is reserved for the top 5% of drivers and requires maintaining the status for 3 consecutive months. Higher tiers unlock priority airport queue access, bonus earnings, and dedicated support. Check the Lyft app for the exact point thresholds in your market — they vary by region."},
    ]
  },
  {
    e:"🚗", t:"Uber — The Basics", sub:"Platform-specific things every Uber rideshare driver needs to know",
    secs:[
      {h:"How Uber rideshare works", body:"Uber is a rideshare platform — you transport passengers, not packages or food. A passenger requests a ride through the Uber app, you see their pickup location and the upfront fare before you accept, then drive to pick them up and take them to their destination. Unlike delivery, customer service happens face-to-face for the full duration of the ride. Your vehicle — how it looks, smells, and feels — directly affects your rating and income."},
      {h:"The Uber rating system", body:"Passengers rate you 1-5 stars after each ride. Uber does not publish a single official minimum rating, but the widely understood threshold is 4.6 stars — below that, you risk deactivation. Uber automatically excludes some low ratings caused by factors outside your control: traffic delays, navigation issues, price complaints, and ratings from passengers who consistently rate all drivers low. You can see your rating in the driver app under your profile."},
      {h:"Upfront pricing and surge — how you get paid", body:"Uber shows both you and the passenger the full trip fare before the ride begins. Surge pricing appears during busy periods as colored zones on your map — the closer you are to a high-demand area, the higher the multiplier. Working surge zones during peak hours (lunch, dinner, late Friday/Saturday night, bad weather) is one of the most reliable ways to significantly increase hourly earnings. You don't need to do anything special — just be logged in and accepting in a surge zone."},
      {h:"Confirming your passenger — always do this", body:"Before any passenger gets in your car, ask: 'What's your name?' and wait for them to answer. Never say the name first — if you ask 'Are you Mike?' a stranger could say yes and get in. This is both a safety practice and Uber's official policy. If the name doesn't match, politely decline: 'I'm waiting for [correct name].' This protects you, the real passenger, and your standing."},
      {h:"Uber Pro — levels and what they unlock", body:"Uber Pro has four tiers: Blue (all drivers), Gold, Platinum, and Diamond. You move up by earning points on trips and maintaining a 4.85+ rating with a cancellation rate below 4%. Higher tiers unlock cash back on gas, priority airport queue access, Costco membership, ASU tuition coverage, and dedicated support. Blue is where everyone starts — focus on clean, professional service first and the tiers will follow. Check the Uber app for current point thresholds, as they vary by market."},
    ]
  },
  {
    e:"🟣", t:"GoPuff — The Basics", sub:"Platform-specific things every GoPuff driver needs to know",
    secs:[
      {h:"How GoPuff delivery works", body:"GoPuff is different from DoorDash or Uber Eats. You don't pick up from restaurants. Instead, you collect pre-packed orders from a GoPuff facility (called a micro-fulfillment center) and deliver them to customers nearby. GoPuff stocks convenience items — snacks, drinks, household supplies, and alcohol in some markets. Orders are almost always packed and ready when you arrive at the facility. Your job is pickup, delivery, and documentation."},
      {h:"What to expect at the GoPuff facility", body:"When you arrive, check in through the app and collect the orders assigned to your run. Verify the bag or item count against what the app shows before you leave — GoPuff orders are pre-packed but errors happen, and a wrong or incomplete order creates complaints you'll be responsible for. GoPuff deliveries are typically short-distance (usually within a few miles of the facility), and you'll often complete multiple deliveries per run. Speed matters — GoPuff promises quick delivery."},
      {h:"GoPuff's standing system — how it works", body:"GoPuff does not publish a specific star-rating threshold for deactivation. Standing is based on overall delivery performance and adherence to Community Guidelines, which cover three areas: Safety, Respect, and Integrity. Consistent customer complaints, failed or incomplete deliveries, or violations of those guidelines are the main deactivation triggers. Photo every drop-off and keep GPS active — those are your core protection on every delivery."},
      {h:"Deactivation — causes and what to do", body:"The most common GoPuff deactivation causes are: background check errors (processed through Checkr), repeated customer complaints, or Community Guidelines violations. If your account is deactivated, contact GoPuff driver support and request a formal review, citing your delivery history and the specific situation. California drivers have a formal appeal right included in the deactivation email. If your deactivation was caused by a Checkr background check error, dispute it directly at consumer.checkr.com and reference that dispute in your GoPuff appeal — this creates a paper trail and gives the platform a reason to pause before making it permanent."},
    ]
  },
];

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]           = useState("tips");
  const [navPop, setNavPop]     = useState(null);
  function changeTab(id){
    setNavPop(id);
    setTab(id);
    setTimeout(()=>setNavPop(null), 400);
  }
  const [cfg, setCfg_]          = useState({name:""});
  const [pro, setPro]           = useState(false);
  const [loaded, setLoaded]     = useState(false);
  const [showIntro, setShowIntro] = useState(false);
  const [toast, setToast]       = useState(null);

  // Modals
  const [showPay, setShowPay]   = useState(false);
  const [payStep, setPayStep]   = useState("offer");
  const [showCfg, setShowCfg]   = useState(false);

  // Secret tap counter for settings
  const tapCount = useRef(0);
  const tapTimer = useRef(null);
  function handleSecretTap(){
    tapCount.current+=1;
    if(tapTimer.current) clearTimeout(tapTimer.current);
    if(tapCount.current>=5){tapCount.current=0;setShowCfg(o=>!o);}
    else{tapTimer.current=setTimeout(()=>{tapCount.current=0;},1500);}
  }

  // Tips state
  const [tipOpen, setTipOpen]   = useState(null);
  const [learnOpen, setLearnOpen] = useState(null);
  const [learnSub, setLearnSub] = useState(null);
  const [favTips, setFavTips]   = useState(new Set());

  // Basics
  const [basicsOpen, setBasicsOpen] = useState(null);
  const [basicsSub, setBasicsSub]   = useState(null);

  // Templates
  const [msgOpen, setMsgOpen]   = useState(null);
  const [subOpen, setSubOpen]   = useState(null);
  const [copied, setCopied]     = useState(null);
  const [templateSearch, setTemplateSearch] = useState("");
  const [favTemplates, setFavTemplates] = useState(new Set());

  // Training
  const [activeVideo, setActiveVideo] = useState(0);

  // Language
  const [lang, setLang] = useState("en");
  const t=(en,es)=>lang==="en"?en:es;

  // Quick Help
  const [showQuickHelp, setShowQuickHelp] = useState(false);
  const [qhActive, setQhActive] = useState(null);
  const [qhCopied, setQhCopied] = useState(false);

  // Fill-in appeal letters
  const [fillKey, setFillKey] = useState(null);
  const [fillVals, setFillVals] = useState({});

  // Shift Mode
  const [shiftMode, setShiftMode] = useState(false);
  const [shiftPlatform, setShiftPlatform] = useState(null);
  const [showPlatformPicker, setShowPlatformPicker] = useState(false);

  function startShift(platId){
    setShiftPlatform(platId);
    setShiftMode(true);
    setShowPlatformPicker(false);
    load(`dp3-checks-${platId}`, PLATFORM_CHECKLISTS[platId]||[]).then(saved=>{
      const base=(PLATFORM_CHECKLISTS[platId]||[]).map(c=>({...c,done:false}));
      setChecks(saved.length?saved.map((s,i)=>({...(base[i]||s),done:s.done})):base);
    });
  }

  function endShift(){
    setShiftMode(false);
    setShiftPlatform(null);
  }

  // User profile panel
  const [showProfile, setShowProfile] = useState(false);
  const [notifOn, setNotifOn]   = useState(false);
  const [notifPerm, setNotifPerm] = useState(()=>typeof Notification!=="undefined"?Notification.permission:"unsupported");
  const [faqOpen, setFaqOpen] = useState(null);

  // Defend
  const [defPlatform, setDefPlatform]   = useState(null);
  const [defSection, setDefSection]     = useState("habits");
  const [appealOpen, setAppealOpen]     = useState(null);
  const [appealSub, setAppealSub]       = useState(null);
  const [checks, setChecks]             = useState([]);
  const [noteInput, setNoteInput]       = useState("");
  const [notes, setNotes]               = useState([]);

  const STRIPE_LINK = "https://buy.stripe.com/cNieVd2z0acu3Wjfoi48000";
  const searchDebounce = useRef(null);
  const [searchDisplay, setSearchDisplay] = useState("");

  useEffect(()=>()=>{
    if(searchDebounce.current) clearTimeout(searchDebounce.current);
    if(tapTimer.current) clearTimeout(tapTimer.current);
  },[]);

  // Escape key closes paywall modal
  useEffect(()=>{
    const h=e=>{if(e.key==="Escape"&&showPay){setShowPay(false);setPayStep("offer");}};
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[showPay]);

  // Daily tip notification — fires once per day on app open if enabled + granted
  useEffect(()=>{
    if(!loaded||!notifOn) return;
    if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
    const today=new Date().toDateString();
    const last=localStorage.getItem("dp3-notif-last");
    if(last===today) return;
    const tip=ALL_TIPS[Math.floor(new Date().getDate()-1)%ALL_TIPS.length];
    try{
      new Notification("DropPilot — Tip of the Day",{body:`${tip.e} ${tip.t}: ${tip.s}`});
      localStorage.setItem("dp3-notif-last",today);
    }catch(e){}
  },[loaded,notifOn]);

  async function toggleNotif(){
    if(typeof Notification==="undefined"){showToast("Notifications not supported on this browser.");return;}
    if(!notifOn){
      const perm=await Notification.requestPermission();
      setNotifPerm(perm);
      if(perm==="granted"){
        setNotifOn(true); save("dp3-notif",true);
        const tip=ALL_TIPS[0];
        try{new Notification("DropPilot — Tip of the Day",{body:`${tip.e} ${tip.t}: ${tip.s}`});localStorage.setItem("dp3-notif-last",new Date().toDateString());}catch(e){}
        showToast("Tip of the Day enabled!");
      } else if(perm==="denied"){
        showToast("Blocked — enable notifications in browser settings.");
      }
    } else {
      setNotifOn(false); save("dp3-notif",false);
      showToast("Tip of the Day turned off.");
    }
  }

  useEffect(()=>{
    const VERIFY_URL = "/api/verify";
    const TOKEN_CHECK_URL = "/api/token-check";
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");

    const doLoad = (verifiedPro) => {
      Promise.all([
        load("dp3-cfg",{name:""}),
        load("dp3-elite",false),
        load("dp3-intro-seen",false),
        load("dp3-fav-tips",[]),
        load("dp3-fav-tpl",[]),
        load("dp3-notes",[]),
        load("dp3-notif",false),
        load("dp3-lang","en"),
      ]).then(([c,p,seen,ft,ftpl,n,notif,l])=>{
        setCfg_(c); setPro(verifiedPro||!!p); setLoaded(true);
        setFavTips(new Set(ft.filter(f=>typeof f==="number"&&f>=0&&f<ALL_TIPS.length)));
        setFavTemplates(new Set(ftpl.filter(k=>typeof k==="string")));
        setNotes(n);
        setNotifOn(!!notif);
        setLang(l||"en");
        if(verifiedPro){ setShowPay(true); setPayStep("done"); }
        else if(!seen) setShowIntro(true);
      });
    };

    const grantWithToken = (tok) => {
      save("dp3-token", tok);
      save("dp3-token-ts", Date.now());
      doLoad(true);
    };

    if(sessionId){
      history.replaceState(null,"",window.location.pathname);
      fetch(VERIFY_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({session_id:sessionId}),
      })
      .then(r=>r.json())
      .then(data=>{
        if(data.valid && data.token){ grantWithToken(data.token); }
        else { doLoad(false); }
      })
      .catch(()=>doLoad(false));
    } else {
      Promise.all([load("dp3-token",null), load("dp3-token-ts",0)]).then(([tok,ts])=>{
        if(tok){
          const age = Date.now() - ts;
          const SEVEN_DAYS = 7*24*60*60*1000;
          if(age < SEVEN_DAYS){
            save("dp3-token-ts", Date.now());
            doLoad(true);
          } else {
            fetch(TOKEN_CHECK_URL, {
              method:"POST",
              headers:{"Content-Type":"application/json"},
              body:JSON.stringify({token:tok}),
            })
            .then(r=>r.json())
            .then(data=>{
              if(data.valid){ save("dp3-token-ts",Date.now()); doLoad(true); }
              else { doLoad(false); }
            })
            .catch(()=>doLoad(true));
          }
        } else {
          doLoad(false);
        }
      });
    }
  },[]);

  const setCfg = useCallback(d=>{setCfg_(d); save("dp3-cfg",d);},[]);

  function copyMsg(text,key){
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>{setCopied(key);showToast("Copied to clipboard!");});}
    else{setCopied(key);showToast("Copied to clipboard!");}
  }

  function getPlaceholders(text){
    const found=[],seen=new Set();
    let m;const re=/\[([^\]]+)\]/g;
    while((m=re.exec(text))!==null){if(!seen.has(m[1])){found.push(m[1]);seen.add(m[1]);}}
    return found;
  }

  function applyFill(text,vals){
    return text.replace(/\[([^\]]+)\]/g,(_,k)=>vals[k]||`[${k}]`);
  }

  function toggleLang(){
    const nl=lang==="en"?"es":"en";
    setLang(nl); save("dp3-lang",nl);
    setMsgOpen(null); setSubOpen(null);
  }

  function toggleCheck(i){
    const updated=checks.map((c,idx)=>idx===i?{...c,done:!c.done}:c);
    setChecks(updated);
    if(defPlatform) save(`dp3-checks-${defPlatform}`,updated);
  }

  function selectPlatform(id){
    if(defPlatform===id){setDefPlatform(null);return;}
    setDefPlatform(id);
    setDefSection("habits");
    setAppealOpen(null);
    setAppealSub(null);
    load(`dp3-checks-${id}`,(PLATFORM_CHECKLISTS[id]||[]).map(c=>({...c,done:false}))).then(saved=>{
      setChecks(saved);
    });
  }

  function toggleFavTip(i){
    const next=new Set(favTips);
    if(next.has(i)){next.delete(i);}else{next.add(i);if(next.size===1)showToast("Tip saved! Upgrade to Elite for full access.");}
    setFavTips(next);
    save("dp3-fav-tips",[...next]);
  }

  function toggleFavTemplate(key){
    const next=new Set(favTemplates);
    next.has(key)?next.delete(key):next.add(key);
    setFavTemplates(next);
    save("dp3-fav-tpl",[...next]);
  }

  function addNote(){
    if(!noteInput.trim()) return;
    const newNote={text:noteInput.trim(),date:new Date().toLocaleDateString()};
    const updated=[newNote,...notes].slice(0,50);
    if(notes.length>=50) showToast("Note limit reached — oldest removed.");
    setNotes(updated);
    save("dp3-notes",updated);
    setNoteInput("");
  }

  function deleteNote(i){
    const updated=notes.filter((_,idx)=>idx!==i);
    setNotes(updated);
    save("dp3-notes",updated);
  }

  function handleSearchChange(val){
    setSearchDisplay(val);
    if(searchDebounce.current) clearTimeout(searchDebounce.current);
    searchDebounce.current=setTimeout(()=>setTemplateSearch(val),200);
  }

  // Filter templates by search
  const ACTIVE_MSG_CATS = lang==="en"?MSG_CATS:MSG_CATS_ES;
  const filteredCats = templateSearch.trim()
    ? ACTIVE_MSG_CATS.map(cat=>({
        ...cat,
        secs: cat.secs.filter(s=>
          s.h.toLowerCase().includes(templateSearch.toLowerCase()) ||
          s.msg.toLowerCase().includes(templateSearch.toLowerCase())
        )
      })).filter(cat=>cat.secs.length>0)
    : ACTIVE_MSG_CATS;

  if(!loaded) return(
    <div style={{background:C.bg,height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,fontFamily:C.sans}}>
      <div style={{width:60,height:60,borderRadius:20,background:`linear-gradient(135deg,${C.amber},${C.amberD})`,display:"flex",alignItems:"center",justifyContent:"center",animation:"floatY 2s ease-in-out infinite",boxShadow:`0 0 0 1px rgba(245,166,35,0.20),0 4px 14px rgba(245,166,35,0.30),0 14px 40px rgba(245,166,35,0.32),0 28px 72px rgba(245,166,35,0.20)`}}><svg width="32" height="32" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M1 10 L3 6 L8 4 L10 2 L12 4 L17 6 L19 10 L17.5 18 L2.5 18 Z" fill="white"/><path d="M10 2 L10 18" stroke="white" strokeWidth="0.8" opacity="0.4" strokeLinecap="round"/><path d="M8 4 L12 4" stroke="white" strokeWidth="1" opacity="0.6" strokeLinecap="round"/></svg></div>
      <div style={{color:C.amber,fontSize:17,fontWeight:700}}>Loading DropPilot...</div>
    </div>
  );

  if(showIntro) return <IntroAnimation onDone={()=>{setShowIntro(false);save("dp3-intro-seen",true);}}/>;

  return(
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:430,margin:"0 auto",fontFamily:C.sans,color:C.text,display:"flex",flexDirection:"column"}}>

      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}

      {/* ── Header ──────────────────────────────────────────────────────────── */}
      <div style={{background:"rgba(10,12,16,0.94)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"13px 18px",display:"flex",alignItems:"center",position:"sticky",top:0,zIndex:60}}>
        <div onClick={handleSecretTap} style={{display:"flex",alignItems:"center",gap:10,userSelect:"none",WebkitUserSelect:"none",cursor:"default",flex:1}}>
          <div className="glow" style={{width:38,height:38,borderRadius:12,background:shiftMode&&shiftPlatform?`linear-gradient(135deg,${PLATFORMS_DEFEND.find(p=>p.id===shiftPlatform)?.color||C.amber},${C.amberD})`:`linear-gradient(135deg,${C.amber},${C.amberD})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{shiftMode&&shiftPlatform?PLATFORMS_DEFEND.find(p=>p.id===shiftPlatform)?.e:<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M1 10 L3 6 L8 4 L10 2 L12 4 L17 6 L19 10 L17.5 18 L2.5 18 Z" fill="white"/><path d="M10 2 L10 18" stroke="white" strokeWidth="0.8" opacity="0.4" strokeLinecap="round"/><path d="M8 4 L12 4" stroke="white" strokeWidth="1" opacity="0.6" strokeLinecap="round"/></svg>}</div>
          <div>
            <div style={{fontSize:18,fontWeight:700,letterSpacing:"-0.3px",background:`linear-gradient(110deg,${C.text} 40%,${C.amber})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>DropPilot</div>
            {shiftMode&&shiftPlatform?(
              <div style={{fontSize:10,fontWeight:800,letterSpacing:"1px",textTransform:"uppercase",color:PLATFORMS_DEFEND.find(p=>p.id===shiftPlatform)?.color||C.amber}}>● {PLATFORMS_DEFEND.find(p=>p.id===shiftPlatform)?.label} Shift Active</div>
            ):(
              <div style={{fontSize:10,color:C.text3,letterSpacing:"1.5px",fontWeight:700,textTransform:"uppercase"}}>Customer Service · Gig Edition</div>
            )}
          </div>
        </div>
        {!shiftMode&&<button onClick={()=>setShowPlatformPicker(true)} aria-label="Start shift" style={{background:"rgba(245,166,35,0.1)",border:"1px solid rgba(245,166,35,0.3)",borderRadius:8,padding:"0 10px",height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:13,flexShrink:0,marginRight:6,gap:5,WebkitTapHighlightColor:"transparent"}}>
          <span>🚗</span><span style={{fontSize:11,fontWeight:800,color:C.amber,fontFamily:C.sans}}>Drive</span>

                  }} style={{background:qhCopied?C.green:C.blue,border:"none",borderRadius:13,padding:"14px",fontSize:14,fontWeight:800,cursor:"pointer",color:qhCopied?"#000":"#fff",width:"100%",transition:"background 0.25s cubic-bezier(0.22,1,0.36,1),box-shadow 0.25s cubic-bezier(0.22,1,0.36,1)",boxShadow:qhCopied?`0 0 0 1px ${C.green}40,0 4px 14px ${C.green}50,0 14px 36px ${C.green}40`:`0 0 0 1px ${C.blue}30,0 4px 14px ${C.blue}40,0 14px 36px ${C.blue}38,0 28px 64px ${C.blue}1f`}}>
                    {qhCopied?t("✓ Copied!","✓ ¡Copiado!"):t("Copy & Close","Copiar y cerrar")}
                  </button>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {/* ── Bottom Nav ──────────────────────────────────────────────────────── */}
      {shiftMode?(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(8,10,13,0.97)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderTop:`1px solid ${PLATFORMS_DEFEND.find(p=>p.id===shiftPlatform)?.color||C.amber}40`,display:"flex",gap:10,zIndex:100,padding:"10px 14px 20px"}}>
          <button onClick={()=>{if(!pro){setShowPay(true);setPayStep("offer");return;}setShowQuickHelp(true);setQhActive(null);setQhCopied(false);}} style={{flex:1,background:`${C.blue}15`,border:`1.5px solid ${C.blue}35`,borderRadius:15,padding:"14px 10px",display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
            <span style={{fontSize:20}}>⚡</span>
            <span style={{fontSize:14,fontWeight:800,color:C.blue}}>{t("Quick Script","Script Rápido")}</span>
          </button>
          <button onClick={endShift} style={{flex:1,background:"rgba(244,63,94,0.1)",border:"1.5px solid rgba(244,63,94,0.3)",borderRadius:15,padding:"14px 10px",display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
            <span style={{fontSize:20}}>🏁</span>
            <span style={{fontSize:14,fontWeight:800,color:C.red}}>{t("End Shift","Fin de Turno")}</span>
          </button>
        </div>
      ):(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(8,10,13,0.96)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",zIndex:100,paddingBottom:6,paddingTop:4}}>
          {[{id:"tips",l:"Earn",e:"⭐",ac:C.amber},{id:"templates",l:"Scripts",e:"💬",ac:C.blue},{id:"basics",l:"Basics",e:"📖",ac:C.teal},{id:"defend",l:"Defend",e:"🛡️",ac:C.purple},{id:"train",l:"Training",e:"🎓",ac:C.amber}].map(n=>{
            const active=tab===n.id;
            const popping=navPop===n.id;
            return(
              <button key={n.id} onClick={()=>changeTab(n.id)} style={{flex:1,background:"transparent",border:"none",cursor:"pointer",padding:"6px 1px 3px",display:"flex",flexDirection:"column",alignItems:"center",gap:1,position:"relative",transition:"all 0.18s"}}>
                {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:28,height:2,borderRadius:"0 0 4px 4px",background:n.ac,boxShadow:`0 0 8px ${n.ac},0 0 18px ${n.ac}80,0 2px 12px ${n.ac}60`}}/>}
                <div className={popping?"nav-pop":""} style={{width:40,height:28,borderRadius:10,background:active?`${n.ac}18`:"transparent",border:active?`1px solid ${n.ac}30`:"1px solid transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.18s,border 0.18s"}}>
                  <span style={{fontSize:active?18:15,transition:"font-size 0.18s"}}>{n.e}</span>
                </div>
                <span style={{fontSize:11,fontWeight:active?800:600,color:active?n.ac:C.text3,fontFamily:C.sans,letterSpacing:"0.1px"}}>{n.l}</span>
              </button>
            );
          })}
        </div>
      )}

      {/* ── Paywall Modal ────────────────────────────────────────────────────── */}
      {showPay&&(
        <div style={{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={()=>{setShowPay(false);setPayStep("offer");}} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.78)"}}/>
          <div style={{position:"relative",background:"linear-gradient(180deg,#12151a,#0d0f13)",borderTop:"1px solid rgba(255,255,255,0.08)",borderRadius:"24px 24px 0 0",padding:24,paddingBottom:40,width:"100%",maxWidth:430,zIndex:1,maxHeight:"88vh",overflowY:"auto"}}>
            <div style={{width:40,height:4,borderRadius:99,background:"rgba(255,255,255,0.15)",margin:"0 auto 22px"}}/>

            {payStep==="offer"&&(
              <div>
                <div style={{textAlign:"center",marginBottom:18}}>
                  <div style={{fontSize:44,marginBottom:10}}>🔒</div>
                  <div style={{fontSize:22,fontWeight:900,marginBottom:6}}>Become Elite</div>
                  <div style={{fontSize:14,color:C.text2,lineHeight:1.7}}>Everything you need to earn more, protect your account, and stay sharp — all in one place.</div>
                </div>

                <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:16,marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:12,marginBottom:12,borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                    <span style={{fontSize:15,fontWeight:700}}>Elite Access</span>
                    <span style={{fontSize:22,fontWeight:900,color:C.amber,fontFamily:C.sans}}>$10</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:9}}>
                    {["4 free tips + 6 more with full psychology breakdowns","7 in-depth learning sections — psychology, tip science, de-escalation & more","30 message templates with one-tap copy","5 training lessons — the science behind what earns more","Platform habits & appeal scripts for all 6 platforms","Per-delivery checklists + safety score per platform","Notes log for problem addresses and difficult customers","📡 Policy Watch — monthly platform policy updates"].map((f,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:12,color:C.text2}}>
                        <span style={{color:C.green,fontWeight:900,fontSize:13,flexShrink:0}}>✓</span>{f}
                      </div>
                    ))}
                  </div>
                </div>
                <button onClick={()=>{ window.location.href=STRIPE_LINK; }} style={{background:`linear-gradient(135deg,${C.amber},${C.amberD},${C.amberL})`,border:"none",borderRadius:16,padding:"17px",fontSize:16,fontWeight:900,cursor:"pointer",color:"#000",width:"100%",boxShadow:"0 0 0 1px rgba(245,166,35,0.30),0 4px 14px rgba(245,166,35,0.40),0 14px 40px rgba(245,166,35,0.45),0 28px 80px rgba(245,166,35,0.25)",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:8}}>
                  <span style={{fontSize:20}}>💳</span>
                  <div style={{textAlign:"left"}}>
                    <div>Become Elite — $10</div>
                    <div style={{fontSize:13,fontWeight:500,opacity:0.75,marginTop:2}}>Secure Stripe checkout · unlocks instantly on return</div>
                  </div>
                </button>
                <div style={{textAlign:"center",fontSize:12,color:C.text3,marginBottom:4}}>One-time payment · Lifetime access · No recurring charges, ever</div>
                <div style={{textAlign:"center",fontSize:11,color:"rgba(107,122,141,0.7)",marginTop:8,lineHeight:1.5,padding:"0 4px"}}>DropPilot is not affiliated with, endorsed by, or connected to DoorDash, Uber Eats, Walmart Spark, Instacart, Lyft, or Amazon Flex.</div>
              </div>
            )}

            {payStep==="done"&&(
              <div style={{textAlign:"center",padding:"10px 0"}}>
                <div style={{fontSize:64,marginBottom:16}}>🎉</div>
                <div style={{fontSize:24,fontWeight:900,marginBottom:8}}>You're Elite.</div>
                <div style={{fontSize:14,color:C.text2,marginBottom:26,lineHeight:1.7}}>You now have lifetime access to everything in DropPilot — every template, script, training lesson, and all future app feature updates. Yours forever.</div>
                <button onClick={()=>{setShowPay(false);setPayStep("offer");setTab("defend");}} style={{background:C.purple,border:"none",borderRadius:16,padding:"16px",fontSize:16,fontWeight:800,cursor:"pointer",width:"100%",color:"#fff",boxShadow:"0 0 0 1px rgba(139,92,246,0.30),0 4px 14px rgba(139,92,246,0.35),0 14px 40px rgba(139,92,246,0.38),0 28px 64px rgba(139,92,246,0.20)",marginBottom:10}}>Go to Account Defense</button>
                <button onClick={()=>{setShowPay(false);setPayStep("offer");setTab("templates");}} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%",color:C.text2}}>See Message Templates</button>
              </div>
            )}
          </div>
        </div>
      )}
      {/* ── Platform Picker ─────────────────────────────────────────────────── */}
      {showPlatformPicker&&(
        <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={()=>setShowPlatformPicker(false)} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.78)"}}/>
          <div style={{position:"relative",background:"linear-gradient(180deg,#12151a,#0d0f13)",borderTop:"1px solid rgba(255,255,255,0.08)",borderRadius:"24px 24px 0 0",padding:24,paddingBottom:40,width:"100%",maxWidth:430,zIndex:1}}>
            <div style={{width:40,height:4,borderRadius:99,background:"rgba(255,255,255,0.15)",margin:"0 auto 20px"}}/>
            <div style={{fontSize:19,fontWeight:900,marginBottom:4}}>🚗 {t("Which app are you driving for?","¿Para qué app estás manejando?")}</div>
            <div style={{fontSize:13,color:C.text3,marginBottom:20}}>{t("Your shift will be focused on that platform.","Tu turno se enfocará en esa plataforma.")}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {PLATFORMS_DEFEND.map(p=>(
                <button key={p.id} onClick={()=>startShift(p.id)} style={{background:`${p.color}0F`,border:`1.5px solid ${p.color}40`,borderRadius:16,padding:"16px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",textAlign:"left",WebkitTapHighlightColor:"transparent"}}>
                  <div style={{width:44,height:44,borderRadius:13,background:`${p.color}20`,border:`1px solid ${p.color}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{p.e}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:16,fontWeight:800,color:p.color}}>{p.label}</div>
                    <div style={{fontSize:12,color:C.text3,marginTop:2}}>{t("Tap to start your shift","Toca para iniciar tu turno")}</div>
                  </div>
                  <div style={{fontSize:20,color:`${p.color}60`}}>›</div>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(p){super(p); this.state={err:null};}
  static getDerivedStateFromError(err){return{err};}
  componentDidCatch(err,info){if(window.console)console.error("DropPilot error:",err,info);}
  render(){
    if(this.state.err){
      return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"32px 24px",background:"#07080A",color:"#EDF0F7",fontFamily:"system-ui,sans-serif",textAlign:"center"}},
        React.createElement("div",{style:{maxWidth:380}},
          React.createElement("div",{style:{fontSize:48,marginBottom:16}},"⚠️"),
          React.createElement("div",{style:{fontSize:20,fontWeight:800,marginBottom:8}},"Something went wrong"),
          React.createElement("div",{style:{fontSize:14,color:"#8B95A8",lineHeight:1.6,marginBottom:24}},"The app hit an unexpected error. Your saved progress is fine — try reloading. If this keeps happening, email support@droppilot.app."),
          React.createElement("button",{onClick:()=>window.location.reload(), style:{background:"linear-gradient(135deg,#F5A623,#C8820A)",border:"none",borderRadius:99,padding:"12px 28px",fontSize:14,fontWeight:800,color:"#000",cursor:"pointer"}},"Reload")
        )
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(ErrorBoundary,null,React.createElement(App)));

  </script>
